// ═══════════════════════════════════════════════════════════════════
// INCIDENCIAS — gestión clara con escalado visual
// ═══════════════════════════════════════════════════════════════════
function Incidencias({usuario}){
  const esAgente=usuario.rol==="agente";
  const esJefe=["jefe","director","ceo"].includes(usuario.rol);
  const esRolJefe=usuario.rol==="jefe";
  const miEquipo=usuario.equipo;

  const [incidencias,setIncidencias]=useState(INCIDENCIAS_SEED.map(i=>({
    ...i,historialEscalado:i.historialEscalado||[],
    escaladoA:i.escaladoA||null,informadoA:i.informadoA||[],
  })));
  const [sel,setSel]=useState(null);
  const [filtroTipo,setFiltroTipo]=useState("todas");
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});
  const fotoRef=React.useRef();

  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");

  const crearIncidencia=()=>{
    if(!form.tipo||!form.descripcion.trim()) return;
    const nueva={
      id:`inc${Date.now()}`,
      ...form,
      autor:usuario.id,
      equipo:usuario.equipo||"",
      agente:usuario.id,
      fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),
      estado:"abierta",
      historialEscalado:[],escaladoA:null,informadoA:[],
    };
    setIncidencias(p=>[nueva,...p]);
    fbEscribir("incidencias",nueva.id,nueva);
    setForm({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});
    setShowForm(false);
  };

  const addFoto=(e)=>{
    [...e.target.files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setForm(f=>({...f,fotos:[...(f.fotos||[]),ev.target.result]}));
      r.readAsDataURL(file);
    });
    e.target.value="";
  };

  // Actualizar incidencia y guardar en Firebase
  const upd=(id,changes)=>{
    setIncidencias(p=>p.map(i=>i.id===id?{...i,...changes}:i));
    const updated={...incidencias.find(i=>i.id===id),...changes};
    fbEscribir("incidencias",id,updated);
    if(sel?.id===id) setSel(updated);
  };

  const addHistorial=(inc,accion,nota="",fotos=[])=>{
    const h={accion,por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota,fotos};
    upd(inc.id,{historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const escalar=(inc,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`↑ Escalada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"escalada",escaladoA:destId,
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const informar=(inc,destId)=>{
    if((inc.informadoA||[]).includes(destId)) return;
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`ℹ️ Informado a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:"",fotos:[]};
    upd(inc.id,{informadoA:[...(inc.informadoA||[]),destId],
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const cerrar=(inc,nota)=>{
    const h={accion:"✅ Cerrada",por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"cerrada",historialEscalado:[...(inc.historialEscalado||[]),h]});
    setSel(null);
  };

  // Filtrar por rol
  const misMostrar=incidencias.filter(i=>{
    if(esAgente) return i.autor===usuario.id;
    if(esRolJefe) return i.equipo===miEquipo;
    return true;
  }).filter(i=>filtroTipo==="todas"||i.tipo===filtroTipo);

  const abiertas=misMostrar.filter(i=>i.estado!=="cerrada");
  const cerradas=misMostrar.filter(i=>i.estado==="cerrada");

  // ── DETALLE ────────────────────────────────────────────────────────
function DetIncidencia({sel,usuario,director,ceo,esJefe,esRolJefe,onBack,onEscalar,onInformar,onNota,onCerrar}){
  const tipo=INC_TIPOS[sel.tipo]||{label:sel.tipo,color:T.muted};
  const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
  const priColor=priColors[sel.prioridad]||T.muted;
  const autorU=USUARIOS.find(u=>u.id===sel.autor);
  const puedoEscalar=esJefe&&sel.estado!=="cerrada";
  const respTipo=USUARIOS.find(u=>u.tipologia===sel.tipo);
  const yaEscaladoRespTipo=sel.escaladoA===respTipo?.id;
  const yaInfDir=(sel.informadoA||[]).includes(director?.id);
  const yaInfCeo=(sel.informadoA||[]).includes(ceo?.id);
  const [nota,setNota]=useState("");
  const [notaCierre,setNotaCierre]=useState("");
  const [showCierre,setShowCierre]=useState(false);

  return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Incidencias" onBack={()=>setSel(null)}/>
        <div style={{padding:"16px"}}>

          {/* Ficha */}
          <div style={{background:"#fff",borderRadius:16,marginBottom:16,overflow:"hidden",
            border:`1px solid ${T.border}`,borderTop:`4px solid ${tipo.color}`}}>
            <div style={{padding:"16px"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:tipo.color,
                  background:tipo.color+"15",borderRadius:99,padding:"3px 10px"}}>{tipo.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:priColor,
                  background:priColor+"15",borderRadius:99,padding:"3px 10px"}}>
                  {sel.prioridad==="urgente"?"🔴 Urgente":sel.prioridad.charAt(0).toUpperCase()+sel.prioridad.slice(1)}
                </span>
                <span style={{fontSize:12,fontWeight:700,
                  color:sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber,
                  background:(sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber)+"15",
                  borderRadius:99,padding:"3px 10px"}}>
                  {sel.estado==="cerrada"?"✅ Cerrada":sel.estado==="escalada"?"↑ Escalada":"🔴 Abierta"}
                </span>
              </div>
              <p style={{margin:"0 0 8px",fontSize:16,fontWeight:800}}>{sel.clienteNombre||sel.cliente||"—"}</p>
              <p style={{margin:"0 0 10px",fontSize:13,color:T.text,lineHeight:1.6}}>{sel.descripcion||sel.desc}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>
                {autorU?.nombre||sel.autor} · {sel.fecha}
              </p>
              {sel.escaladoA&&(
                <div style={{marginTop:8,padding:"7px 10px",background:T.purpleL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.purple,fontWeight:700}}>
                    ↑ Escalada a: {USUARIOS.find(u=>u.id===sel.escaladoA)?.nombre}
                  </p>
                </div>
              )}
              {(sel.informadoA||[]).length>0&&(
                <div style={{marginTop:6,padding:"7px 10px",background:T.blueL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.blue,fontWeight:700}}>
                    ℹ️ Informado a: {(sel.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Acciones de escalado — solo para jefes */}
          {puedoEscalar&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Acciones de escalado
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {/* Escalar al responsable de tipología */}
                {esRolJefe&&respTipo&&!yaEscaladoRespTipo&&(
                  <button onClick={()=>escalar(sel,respTipo.id,"")}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${tipo.color}`,background:tipo.color+"10",
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{respTipo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Escalar a {respTipo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Responsable de {tipo.label}</p>
                    </div>
                    <span style={{color:tipo.color,fontWeight:700,fontSize:16}}>↑</span>
                  </button>
                )}
                {yaEscaladoRespTipo&&(
                  <div style={{padding:"10px 14px",background:T.greenL,borderRadius:10}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:T.green}}>
                      ✅ Ya escalada a {respTipo?.nombre}
                    </p>
                  </div>
                )}
                {/* Informar al director */}
                {director&&!yaInfDir&&(
                  <button onClick={()=>informar(sel,director.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.blue}`,background:T.blueL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{director.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Informar a {director.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Para su conocimiento y seguimiento</p>
                    </div>
                    <span style={{color:T.blue,fontSize:16}}>ℹ️</span>
                  </button>
                )}
                {yaInfDir&&<div style={{padding:"8px 14px",background:T.blueL,borderRadius:9}}>
                  <p style={{margin:0,fontSize:11,fontWeight:700,color:T.blue}}>ℹ️ {director.nombre} ya informado</p>
                </div>}
                {/* Elevar al CEO */}
                {(esRolJefe===false&&usuario.rol==="director")&&ceo&&!yaInfCeo&&(
                  <button onClick={()=>informar(sel,ceo.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.purple}`,background:T.purpleL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{ceo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Elevar al {ceo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Máxima prioridad</p>
                    </div>
                    <span style={{color:T.purple,fontSize:16}}>👑</span>
                  </button>
                )}
              </div>
            </div>
          )}

          {/* Añadir nota */}
          {sel.estado!=="cerrada"&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                💬 Añadir actualización
              </p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
                placeholder="Gestión realizada, estado actual…"
                style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
                  padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5,marginBottom:8}}/>
              <Btn full onClick={()=>{if(nota.trim()){addHistorial(sel,"💬 Nota",nota);setNota("");}}}
                color={T.navy} disabled={!nota.trim()}>
                Guardar nota
              </Btn>
            </div>
          )}

          {/* Cerrar */}
          {sel.estado!=="cerrada"&&(
            showCierre?(
              <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
                border:`1.5px solid ${T.green}`}}>
                <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:T.green}}>✅ Resolución</p>
                <textarea value={notaCierre} onChange={e=>setNotaCierre(e.target.value)} rows={3}
                  placeholder="Cómo se resolvió…"
                  style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
                    padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                    boxSizing:"border-box",fontFamily:"inherit",marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowCierre(false)}
                    style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                      background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={()=>cerrar(sel,notaCierre)}
                    style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                      background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✅ Confirmar cierre
                  </button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowCierre(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:12,
                  border:`2px solid ${T.green}`,background:T.greenL,
                  color:T.green,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✅ Marcar como resuelta
              </button>
            )
          )}

          {/* Historial */}
          {(sel.historialEscalado||[]).length>0&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial de gestión
              </p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i,arr)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:10,marginBottom:10,
                  borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 3px",fontSize:12,color:T.text}}>{h.nota}</p>}
                    {(h.fotos||[]).length>0&&(
                      <div style={{display:"flex",gap:6,margin:"4px 0"}}>
                        {h.fotos.map((f,j)=>(
                          <img key={j} src={f} alt="" style={{width:60,height:60,objectFit:"cover",
                            borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}}
                            onClick={()=>window.open(f)}/>
                        ))}
                      </div>
                    )}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
  );
}

  if(sel) return <DetIncidencia sel={sel} usuario={usuario} director={director} ceo={ceo} esJefe={esJefe} esRolJefe={esRolJefe} onBack={()=>setSel(null)} onEscalar={(destId,nota)=>{escalar(sel,destId,nota);setSel({...sel,escaladoA:destId,estado:"escalada"});}} onInformar={(destId)=>informar(sel,destId)} onNota={(nota)=>addHistorial(sel,"💬 Nota",nota)} onCerrar={(nota)=>cerrar(sel,nota)}/>;

  // ── LISTA ─────────────────────────────────────────────────────────
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🚨 Incidencias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis incidencias":esRolJefe?`Equipo ${miEquipo}`:"Todas"}
          </p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {abiertas.length>0&&(
            <div style={{background:T.red,color:"#fff",borderRadius:99,
              padding:"4px 14px",fontSize:13,fontWeight:800}}>
              {abiertas.length} abierta{abiertas.length>1?"s":""}
            </div>
          )}
          <button onClick={()=>setShowForm(s=>!s)}
            style={{background:T.red,border:"none",borderRadius:10,
              padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            + Nueva
          </button>
        </div>
      </div>

      {/* Formulario nueva incidencia */}
      {showForm&&(
        <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
          border:`2px solid ${T.red}`}}>
          <p style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:T.text}}>🚨 Nueva incidencia</p>

          {/* Cliente */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Cliente *</p>
            <input value={form.clienteNombre} onChange={e=>setForm(f=>({...f,clienteNombre:e.target.value}))}
              placeholder="Nombre del cliente afectado…"
              style={{width:"100%",border:`1.5px solid ${form.clienteNombre?T.navy:T.border}`,borderRadius:10,
                padding:"11px 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>

          {/* Tipo */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Tipo *</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {Object.entries(INC_TIPOS).map(([k,t])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,tipo:k}))}
                  style={{padding:"9px 12px",borderRadius:9,cursor:"pointer",fontSize:12,
                    border:`2px solid ${form.tipo===k?t.color:T.border}`,
                    background:form.tipo===k?t.color+"15":"#fff",
                    color:form.tipo===k?t.color:T.muted,
                    fontWeight:form.tipo===k?700:400}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Prioridad */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Prioridad</p>
            <div style={{display:"flex",gap:6}}>
              {[{k:"baja",l:"🟢 Baja",c:T.green},{k:"media",l:"🟡 Media",c:T.amber},
                {k:"alta",l:"🔴 Alta",c:T.red},{k:"urgente",l:"🚨 Urgente",c:"#7F1D1D"}].map(p=>(
                <button key={p.k} onClick={()=>setForm(f=>({...f,prioridad:p.k}))}
                  style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",fontSize:11,
                    border:`2px solid ${form.prioridad===p.k?p.c:T.border}`,
                    background:form.prioridad===p.k?p.c+"15":"#fff",
                    color:form.prioridad===p.k?p.c:T.muted,
                    fontWeight:form.prioridad===p.k?700:400}}>
                  {p.l}
                </button>
              ))}
            </div>
          </div>

          {/* Descripción */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción *</p>
            <textarea value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))}
              rows={4} placeholder="Describe el problema con detalle…"
              style={{width:"100%",border:`1.5px solid ${form.descripcion?T.navy:T.border}`,borderRadius:10,
                padding:"11px 12px",fontSize:13,resize:"none",outline:"none",
                boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
          </div>

          {/* Fotos */}
          <div style={{marginBottom:14}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📷 Fotos (opcional)</p>
            {(form.fotos||[]).length>0&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                {form.fotos.map((f,i)=>(
                  <div key={i} style={{position:"relative"}}>
                    <img src={f} alt="" style={{width:72,height:72,objectFit:"cover",
                      borderRadius:10,border:`1px solid ${T.border}`}}/>

      {/* Filtro por tipo */}
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>

          style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo==="todas"?700:400,
            border:`1.5px solid ${filtroTipo==="todas"?T.navy:T.border}`,
            background:filtroTipo==="todas"?T.navy:"#fff",color:filtroTipo==="todas"?"#fff":T.muted,cursor:"pointer"}}>
          Todas
        </button>
        {Object.entries(INC_TIPOS).map(([k,t])=>(
          <button key={k} onClick={()=>setFiltroTipo(k)}
            style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo===k?700:400,
              border:`1.5px solid ${filtroTipo===k?t.color:T.border}`,
              background:filtroTipo===k?t.color+"15":"#fff",color:filtroTipo===k?t.color:T.muted,cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Abiertas */}
      {abiertas.length>0&&(
        <div style={{marginBottom:20}}>
          {abiertas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
            const pColor=priColors[i.prioridad]||T.muted;
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                  cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${tipo.color}`,
                  boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:tipo.color,
                    background:tipo.color+"15",borderRadius:99,padding:"2px 8px"}}>{tipo.label}</span>
                  <span style={{fontSize:11,fontWeight:700,color:pColor,
                    background:pColor+"15",borderRadius:99,padding:"2px 8px"}}>
                    {i.prioridad==="urgente"?"🔴 Urgente":i.prioridad.charAt(0).toUpperCase()+i.prioridad.slice(1)}
                  </span>
                  {i.escaladoA&&<span style={{fontSize:11,fontWeight:700,color:T.purple,
                    background:T.purpleL,borderRadius:99,padding:"2px 8px"}}>
                    ↑ {USUARIOS.find(u=>u.id===i.escaladoA)?.nombre}
                  </span>}
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 3px",fontSize:14,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
                {(i.informadoA||[]).length>0&&(
                  <p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:600}}>
                    ℹ️ Informado a: {(i.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                )}
              </div>
            );
          })}
        </div>
      )}

      {abiertas.length===0&&(
        <div style={{textAlign:"center",padding:"40px 16px",color:T.muted,marginBottom:20}}>
          <p style={{fontSize:32,margin:"0 0 8px"}}>✅</p>
          <p style={{margin:0,fontSize:14}}>Sin incidencias abiertas</p>
        </div>
      )}

      {/* Cerradas */}
      {cerradas.length>0&&(
        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            ✅ Resueltas ({cerradas.length})
          </p>
          {cerradas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#F9FAFB",borderRadius:12,padding:"12px 14px",marginBottom:6,
                  cursor:"pointer",border:`1px solid ${T.border}`,opacity:.75}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}>
                  <Badge label={tipo.label} color={T.muted}/>
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:11,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CardScanner({onDatos, onClose}){
  const [preview,setPreview]=useState(null);
  const [texto,setTexto]=useState("");
  const [campos,setCampos]=useState(null);
  const fileRef=React.useRef();
  const textRef=React.useRef();

  const parsear=(txt)=>{
    if(!txt.trim()) return null;
    const lineas=txt.split(/\n/).map(l=>l.trim()).filter(Boolean);
    const email=(txt.match(/[\w.+\-]+@[\w\-]+\.[\w.]+/i)||[])[0]||"";
    const tels=txt.match(/(?:\+?[\d][\d\s().\-·•]{5,}[\d])/g)||[];
    const telefono=(tels[0]||"").replace(/\s+/g," ").trim();
    const web=(txt.match(/(?:https?:\/\/|www\.)[^\s,]+/i)||[])[0]||"";
    const sinC=lineas.filter(l=>!l.includes("@")&&!/\d{5,}/.test(l)&&!/https?:|www\./i.test(l));
    const empK=/\b(s\.?l\.?|s\.?a\.?|s\.?r\.?l\.?|ltd|gmbh|corp|inc|hermanos|hnos|cárnicas|carnicas|distribu|comercial|industria|alimentos|food|meat|group|ibéric)\b/i;
    const carK=/\b(director|gerente|jefe|responsable|manager|ventas|compras|departamento|dept|técnico|administra|coordinad|delegado|representante|asesor|consultor|ejecutiv|ceo|cto)\b/i;
    const empresa=sinC.find(l=>empK.test(l))||"";
    const cargo=sinC.find(l=>l!==empresa&&carK.test(l))||"";
    const nombre=sinC.find(l=>l!==empresa&&l!==cargo&&l.split(/\s+/).length>=2&&!/\d{3,}/.test(l)&&l.length>4)||sinC[0]||"";
    const dirK=/\b(calle|c\/|avda?|plaza|paseo|pol\.|poligono|nave|carretera|urb\.)\b/i;
    const dir=sinC.find(l=>dirK.test(l)&&l!==nombre&&l!==empresa&&l!==cargo)||"";
    return{nombre,empresa,cargo,telefono,email,web,direccion:dir};
  };

  const handleTexto=(val)=>{
    setTexto(val);
    setCampos(parsear(val));
  };

  const handleFile=(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ setPreview(ev.target.result); setTimeout(()=>textRef.current?.focus(),100); };
    reader.readAsDataURL(file);
  };

  const ok=campos&&Object.values(campos).some(v=>v&&v.trim());
  const FIELD_LABELS={nombre:"👤 Nombre",empresa:"🏢 Empresa",cargo:"💼 Cargo",telefono:"📞 Teléfono",email:"📧 Email",web:"🌐 Web",direccion:"📍 Dirección"};

  return(
    <div style={{position:"fixed",inset:0,background:"#000000CC",zIndex:300,display:"flex",alignItems:"flex-end"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:T.white,borderRadius:"20px 20px 0 0",padding:"20px 18px 36px",
        width:"100%",maxWidth:540,margin:"0 auto",maxHeight:"96vh",overflowY:"auto"}}>

        <div style={{width:40,height:4,borderRadius:99,background:T.border,margin:"0 auto 14px"}}/>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <p style={{margin:0,fontSize:17,fontWeight:900,color:T.text}}>📇 Añadir desde tarjeta</p>
          <button onClick={onClose} style={{background:T.bg,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:T.muted}}>✕</button>
        </div>

        {/* Foto + texto — side by side si hay foto */}
        {preview?(
          <div style={{display:"flex",gap:12,marginBottom:14,alignItems:"flex-start"}}>
            <div style={{position:"relative",width:110,flexShrink:0}}>
              <img src={preview} alt="tarjeta" style={{width:"100%",borderRadius:10,border:`1px solid ${T.border}`,display:"block"}}/>
              <button onClick={()=>fileRef.current.click()} title="Cambiar foto"
                style={{position:"absolute",bottom:4,right:4,background:T.navy,border:"none",borderRadius:6,padding:"3px 7px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                📷
              </button>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.navy}}>Copia el texto que ves en la tarjeta →</p>
              <textarea ref={textRef} value={texto} onChange={e=>handleTexto(e.target.value)}
                autoFocus rows={6}
                placeholder={"Nombre completo\nCargo\nEmpresa\nTeléfono\nEmail\nWeb · Dirección"}
                style={{width:"100%",border:`2px solid ${texto?T.blue:T.border}`,borderRadius:10,
                  padding:"10px",fontSize:13,resize:"none",outline:"none",boxSizing:"border-box",lineHeight:1.6}}/>
            </div>
          </div>
        ):(
          <div style={{marginBottom:14}}>
            {/* Botón foto */}
            <button onClick={()=>fileRef.current.click()}
              style={{width:"100%",padding:"14px",marginBottom:12,borderRadius:12,
                border:`2px dashed ${T.blue}`,background:T.blueL,color:T.blue,
                fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",gap:10,alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:24}}>📷</span> Hacer foto a la tarjeta (opcional)
            </button>
            <textarea ref={textRef} value={texto} onChange={e=>handleTexto(e.target.value)}
              rows={6} placeholder={"Escribe o pega el texto de la tarjeta:\n\nNombre completo\nCargo · Empresa\nTeléfono · Email"}
              style={{width:"100%",border:`2px solid ${texto?T.blue:T.border}`,borderRadius:10,
                padding:"12px",fontSize:13,resize:"none",outline:"none",boxSizing:"border-box",lineHeight:1.6}}/>
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>

        {/* Preview campos detectados */}
        {campos&&ok&&(
          <div style={{background:T.greenL,border:`1px solid ${T.green}55`,borderRadius:11,padding:"12px 14px",marginBottom:14}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:"#3730A3"}}>✅ Datos detectados — se rellenarán automáticamente:</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px"}}>
              {Object.entries(campos).filter(([,v])=>v).map(([k,v])=>(
                <div key={k}>
                  <span style={{fontSize:10,color:"#3730A3",fontWeight:700}}>{FIELD_LABELS[k]||k}: </span>
                  <span style={{fontSize:11,color:T.text}}>{v.length>25?v.slice(0,25)+"…":v}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Botón siempre visible */}
        <button
          onClick={()=>{ if(ok) onDatos(campos); }}
          disabled={!ok}
          style={{width:"100%",padding:"16px",borderRadius:13,border:"none",
            background:ok?T.green:"#CBD5E1",
            color:"#fff",fontWeight:800,fontSize:15,cursor:ok?"pointer":"default",
            transition:"background .2s"}}>
          {ok?"✅ Rellenar formulario con estos datos":"Escribe el texto de la tarjeta para continuar"}
        </button>

        {/* Ejemplo rápido */}
        <button onClick={()=>handleTexto("José Enrique Rodríguez Fernández\nDepartamento de Compras\nHermanos Barbancho SL\n0034 661 49 41 12 · 0034 957 14 02 44\nj.enrique@rodriguezbarbancho.com")}
          style={{width:"100%",marginTop:10,padding:"10px",borderRadius:10,border:`1px solid ${T.border}`,
            background:"#fff",color:T.muted,fontSize:12,cursor:"pointer",fontWeight:600}}>
          Ver ejemplo con tarjeta de Hermanos Barbancho →
        </button>
      </div>
    </div>
  );
}

// ── Firebase Storage — subir foto ─────────────────────────────────
async function subirFoto(base64, ruta){
  try{
    // Convertir base64 a Blob
    const [meta,data]=base64.split(",");
    const mime=meta.match(/:(.*?);/)?.[1]||"image/jpeg";
    const bytes=atob(data);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr],{type:mime});

    // Subir a Storage
    const rutaCodificada=encodeURIComponent(ruta);
    const r=await fetch(`${FB_STORAGE}?uploadType=media&name=${rutaCodificada}`,{
      method:"POST",
      headers:{"Content-Type":mime},
      body:blob,
    });
    if(!r.ok) throw new Error(`Storage error: ${r.status}`);
    const res=await r.json();
    // URL pública de descarga
    const token=res.downloadTokens;
    return `${FB_STORAGE}/${rutaCodificada}?alt=media&token=${token}`;
  }catch(e){
    console.warn("Error subiendo foto:",e.message);
    return null; // fallback: devuelve null, se queda base64 local
  }
}

// Subir múltiples fotos y devolver URLs
async function subirFotos(fotos=[], carpeta="general"){
  if(!fotos||fotos.length===0) return [];
  const urls=await Promise.all(
    fotos.map(async (f,i)=>{
      if(f.startsWith("https://")) return f; // ya es URL, no resubir
      const ext=f.includes("png")?"png":"jpg";
      const nombre=`${carpeta}/${Date.now()}_${i}.${ext}`;
      const url=await subirFoto(f,nombre);
      return url||f; // si falla, mantiene base64
    })
  );
  return urls;
}

// ── Firebase genérico ─────────────────────────────────────────────
async function fbLeer(coleccion, pageSize=200){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok) return [];
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];
      nextPage=data.nextPageToken||null;
      intentos++;
    }while(nextPage&&intentos<10);
    return docs;
  }catch(e){console.warn("FB leer:",e.message);return [];}

// Cargar TODOS los docs de una colección sin límite de páginas
async function fbLeerTodos(coleccion){
  try{
    let docs=[], nextPage=null, intentos=0;

      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;

    }while(nextPage&&intentos<50);

  }catch(e){console.warn("FB leerTodos:",e.message);return [];}

// Query Firestore por grupoAgente — solo trae los clientes del vendedor
async function fbQueryGrupoAgente(grupoAgente){
  try{
    const body={
      structuredQuery:{
        from:[{collectionId:"clientes"}],
        where:{fieldFilter:{field:{fieldPath:"grupoAgente"},op:"EQUAL",value:{stringValue:grupoAgente}}},
        limit:500
      }
    };
    const project="grupo-consolidado-crm";
    const url=`https://firestore.googleapis.com/v1/projects/${project}/databases/(default)/documents:runQuery`;
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) return [];
    const data=await r.json();
    return data.filter(d=>d.document).map(d=>fromFirestore(d.document));
  }catch(e){console.warn("FB query:",e.message);return [];}
}


// ── Serializar a formato Firestore ────────────────────────────────
function serializeToFirestore(datos){
  const fields={};
  const serialize=(v)=>{
    if(v===null||v===undefined) return {nullValue:null};
    if(typeof v==="boolean") return {booleanValue:v};
    if(typeof v==="number") return {doubleValue:v};
    if(typeof v==="string"){
      // Truncar strings muy largos (base64 imágenes) para no superar 1MB
      if(v.startsWith("data:image")&&v.length>5000) return {stringValue:"[imagen]"};
      return {stringValue:v};
    }
    if(Array.isArray(v)) return {arrayValue:{values:v.map(x=>serialize(x))}};
    if(typeof v==="object") return {mapValue:{fields:Object.fromEntries(
      Object.entries(v).map(([k,val])=>[k,serialize(val)])
    )}};
    return {stringValue:String(v)};
  };
  Object.entries(datos).forEach(([k,v])=>{ fields[k]=serialize(v); });
  return {fields};
}

// Escritura genérica — crea o sobreescribe documento
async function fbEscribir(coleccion, id, datos){
  try{
    const r=await fetch(`${FB_BASE}/${coleccion}/${id}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(serializeToFirestore(datos))
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const msg=e?.error?.message||e?.error?.status||r.status;
      console.warn(`🔴 Firebase [${coleccion}/${id}] error ${r.status}:`, msg);
      // Mostrar en pantalla para diagnóstico
      if(r.status===403||r.status===401){
        console.warn("⚠️ REGLAS FIREBASE: La base de datos no permite escritura anónima.");
        console.warn("Solución: Firebase Console → Firestore → Reglas → cambiar a allow read, write: if true;");
      }
    }
    return r.ok;
  }catch(e){
    console.warn("🔴 Firebase red error:", e.message);
    return false;
  }
}

function fromFirestore(doc) {
  if (!doc.fields) return {id: doc.name?.split("/").pop()};
  const obj = {id: doc.name?.split("/").pop()};
  Object.entries(doc.fields).forEach(([k, v]) => {
    if (v.stringValue !== undefined) obj[k] = v.stringValue;
    else if (v.integerValue !== undefined) obj[k] = parseInt(v.integerValue);
    else if (v.doubleValue !== undefined) obj[k] = v.doubleValue;
    else if (v.booleanValue !== undefined) obj[k] = v.booleanValue;
    else if (v.nullValue !== undefined) obj[k] = null;
    else if (v.arrayValue) obj[k] = (v.arrayValue.values || []).map(x =>
      x.stringValue ?? x.integerValue ?? x.doubleValue ?? x.booleanValue ??
      (x.mapValue ? fromFirestore({name:"", fields: x.mapValue.fields}) : null)
    );
    else if (v.mapValue) obj[k] = fromFirestore({name:"", fields: v.mapValue.fields});
  });
  return obj;
}

// Comprime imagen base64 para no superar el límite de Firestore (1MB/doc)
async function comprimirImagen(base64, maxWidth=600, quality=0.65) {
  return new Promise(res=>{
    try {
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1, maxWidth/img.width);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        res(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror=()=>res(base64);
      img.src=base64;
    } catch(e){ res(base64); }
  });
}

  const mediaRef=useRef(null);
  const chunksRef=useRef([]);

  const iniciarGrabacion=async()=>{
    setError(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/mp4"});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0) chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        setGrabando(false);
        setTranscribiendo(true);
        try{
          const blob=new Blob(chunksRef.current,{type:mr.mimeType});
          const base64=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.readAsDataURL(blob);});
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1000,
              messages:[{role:"user",content:[
                {type:"text",text:"Transcribe este audio exactamente en español. Devuelve SOLO el texto transcrito, sin comentarios, sin comillas, sin formato adicional. Si no hay audio o no se entiende, devuelve una cadena vacía."},
                {type:"document",source:{type:"base64",media_type:mr.mimeType,data:base64}}
              ]}]
            })
          });
          const data=await resp.json();
          const texto=(data.content?.[0]?.text||"").trim();
          if(texto){
            const actual=form.descripcionOportunidad||"";

        }catch(e){setError("Error al transcribir. Escribe manualmente.");}
        setTranscribiendo(false);
      };
      mr.start();
      mediaRef.current=mr;
      setGrabando(true);
    }catch(e){
      if(e.name==="NotAllowedError"||e.name==="PermissionDeniedError"){
        setError("⚠️ Permiso de micrófono denegado. En iOS: Ajustes → Safari → Micrófono → Permitir. En Chrome: haz clic en el candado de la barra de dirección → Micrófono → Permitir.");
      } else if(e.name==="NotFoundError"){
        setError("⚠️ No se detectó micrófono. Conecta uno e inténtalo de nuevo.");
      } else {
        setError("⚠️ El micrófono no está disponible aquí. Escribe la descripción manualmente — funcionará en la app de Vercel.");
      }
    }
  };

  const pararGrabacion=()=>{
    if(mediaRef.current&&mediaRef.current.state==="recording"){
      mediaRef.current.stop();
    }
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>

// WIZARD
function Wizard({usuario,opoEditar,onSave,onClose,datosEscaneados}){
  const esAgente=usuario?.rol==="agente";
  // Si vienen datos de tarjeta, arranca en paso 2 directamente
  const [paso,setPaso]=useState(datosEscaneados&&!opoEditar?2:1);
  const defaultAgenteId=esAgente?usuario.id:""; // agente siempre se auto-asigna
  const [form,setForm]=useState(opoEditar?{
    tipo:      opoEditar.tipo||"",
    tipologia: opoEditar.tipologia||"",
    nombre:    opoEditar.nombre||"",
    nif:       opoEditar.nif||"",
    contacto:  opoEditar.contacto||"",
    cargo:     opoEditar.cargo||"",
    tel:       opoEditar.tel||"",
    email:     opoEditar.email||"",
    web:       opoEditar.web||"",
    ciudad:    opoEditar.ciudad||"",
    dir:       opoEditar.dir||"",
    descripcionCliente:      opoEditar.descripcionCliente||"",
    tarjetaVisita:           opoEditar.tarjetaVisita||null,
    imagenes:                opoEditar.imagenes||[],
    descripcionOportunidad:  opoEditar.descripcionOportunidad||"",
    agenteId:                opoEditar.agenteId||defaultAgenteId,
  }:datosEscaneados?{
    tipo:"nuevo_cliente", tipologia:"", nif:"", dir:"", imagenes:[], tarjetaVisita:null,
    descripcionCliente:"", descripcionOportunidad:"", agenteId:defaultAgenteId,
    nombre:   datosEscaneados.empresa||datosEscaneados.nombre||"",
    contacto: datosEscaneados.nombre||"",
    cargo:    datosEscaneados.cargo||"",
    tel:      datosEscaneados.telefono||"",
    email:    datosEscaneados.email||"",
    web:      datosEscaneados.web||"",
    ciudad:   datosEscaneados.direccion||"",
  }:{tipo:"",tipologia:"",nombre:"",nif:"",contacto:"",cargo:"",tel:"",email:"",web:"",ciudad:"",dir:"",descripcionCliente:"",tarjetaVisita:null,imagenes:[],descripcionOportunidad:"",agenteId:defaultAgenteId});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=()=>{
    const ag=USUARIOS.find(v=>v.id===form.agenteId);
    const nombreCreador=usuario?.nombre||"Sistema";
    const semanaActual=14;
    const opoData={
      id:"OPO-"+Date.now(),
      ...form,
      estado:form.agenteId?"asignada":"sin_asignar",
      creadaPorNombre:nombreCreador,
      creadaPorId:usuario?.id||"",
      creadaEn:new Date().toLocaleDateString("es-ES"),
      semana:semanaActual,
      esOportunidad:true,
      notas:[],
      historial:[
        {accion:"Oportunidad creada",por:nombreCreador,fecha:new Date().toLocaleDateString("es-ES"),nota:form.descripcionOportunidad||""},
        ...(form.agenteId?[{accion:`Asignada a ${ag?.nombre||""}`,por:nombreCreador,fecha:new Date().toLocaleDateString("es-ES"),nota:""}]:[]),
      ],
    };
    onSave(opoData);
    onClose();
  };
  return(<div style={{position:"fixed",inset:0,background:"#00000099",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:8}}>
    <div style={{background:"#fff",borderRadius:20,width:"min(720px,96vw)",maxHeight:"96vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 32px 80px #0006"}}>
      <div style={{padding:"16px 22px 14px",borderBottom:`1px solid ${T.border}`,background:T.navy,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <p style={{margin:0,fontSize:15,fontWeight:800,color:"#fff"}}>{opoEditar?"✏️ Editar oportunidad":"🎯 Nueva oportunidad"}</p>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#9CA3AF",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",alignItems:"center"}}>
          {PASOS.map((p,i)=>{const done=paso>p.n,cur=paso===p.n;return <div key={p.n} style={{display:"flex",alignItems:"center",flex:1}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:done?T.green:cur?"#fff":T.navy,border:`2px solid ${done?T.green:cur?"#fff":"#334155"}`,color:done?"#fff":cur?T.navy:"#64748B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,transition:"all .3s"}}>{done?"✓":p.n}</div>
              <p style={{margin:"3px 0 0",fontSize:9,fontWeight:cur?700:400,color:cur?"#fff":"#64748B",whiteSpace:"nowrap"}}>{p.l}</p>
            </div>
            {i<PASOS.length-1&&<div style={{height:2,width:"100%",flex:.5,background:done?T.green:"#334155",marginBottom:14,transition:"background .3s"}}/>}
          </div>;})}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"22px 24px"}}>
        {paso===1&&<Paso1 form={form} upd={upd} onNext={()=>setPaso(2)}/>}
        {paso===2&&<Paso2 form={form} upd={upd} onNext={()=>setPaso(3)} onBack={()=>setPaso(1)} desdeTarjeta={!!datosEscaneados&&!opoEditar}/>}
        {paso===3&&<Paso3 form={form} upd={upd} onNext={()=>setPaso(4)} onBack={()=>setPaso(2)}/>}
        {paso===4&&<Paso4 form={form} upd={upd} onNext={()=>setPaso(esAgente?6:5)} onBack={()=>setPaso(3)}/>}
        {paso===5&&!esAgente&&<Paso5 form={form} upd={upd} onNext={()=>setPaso(6)} onBack={()=>setPaso(4)}/>}
        {paso===6&&<Paso6 form={form} usuario={usuario} onSave={save} onBack={()=>setPaso(esAgente?4:5)}/>}
      </div>
    </div>
  </div>);
}

  const notas=opo.notas||[];
  const hist=opo.historial||[];

  const nombreActual=usuario?.nombre||"Usuario";
  const esAgente=usuario?.rol==="agente";
  const esJefe=["jefe","director","ceo"].includes(usuario?.rol);

  // Solo jefe/director/CEO pueden reasignar — a cualquier agente de todos los equipos
  const agentesDisp=esJefe
    ? AGENTES                        // jefe/director/ceo: todos los agentes
    : [];

  const puedeReasignar=esJefe;

  const addNota=()=>{
    if(!nota.trim()) return;
    const n={id:"n"+Date.now(),texto:nota.trim(),por:nombreActual,fecha:new Date().toLocaleDateString("es-ES")};
    const entry={accion:"Seguimiento añadido",por:nombreActual,fecha:n.fecha,nota:n.texto};
    onUpdate({...opo,notas:[...notas,n],historial:[...hist,entry],estado:["ganada","perdida"].includes(opo.estado)?opo.estado:"seguimiento"});
    setNota("");
  };

  const asignar=()=>{
    if(!asignarId) return;
    const a=USUARIOS.find(v=>v.id===asignarId);
    const entry={accion:`Reasignada a ${a?.nombre}`,por:nombreActual,fecha:new Date().toLocaleDateString("es-ES"),nota:""};
    onUpdate({...opo,agenteId:asignarId,estado:"asignada",historial:[...hist,entry]});
    setShowAsignar(false);
  };

  const convertir=()=>{
    if(!tipologia) return;
    const tip=TIPOLOGIAS.find(t=>t.k===tipologia);
    const entry={accion:`✅ Convertida — ${tip?.icon} ${tip?.l} · Ruta ${ruta}`,por:"Demo User",fecha:new Date().toLocaleDateString("es-ES"),nota:"Seguimiento en informes semanales."};
    onUpdate({...opo,estado:"ganada",esOportunidad:false,tipoCliente:tipologia,rutaAsignada:parseInt(ruta),historial:[...hist,entry]});
    setShowCerrar(false);
    onClose();
  };

  const perder=()=>{
    const entry={accion:"❌ Oportunidad perdida",por:"Demo User",fecha:new Date().toLocaleDateString("es-ES"),nota:""};
    onUpdate({...opo,estado:"perdida",esOportunidad:false,historial:[...hist,entry]});
    onClose();
  };

  const inp2={width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontSize:13};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:8}}>
      <div style={{background:"#fff",borderRadius:18,width:"min(680px,98vw)",maxHeight:"94vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 32px 80px #0006"}}>

        <div style={{padding:"14px 20px",background:T.navy,flexShrink:0}}>
          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{padding:"3px 10px",borderRadius:6,background:est.bg,color:est.color,fontSize:11,fontWeight:700}}>{est.dot} {est.label}</span>
            <span style={{fontSize:11,color:"#94A3B8"}}>{tipo?.icon} {tipo?.l}</span>
            {opo.tipologia&&<span style={{fontSize:11,color:"#94A3B8"}}>· {TIPOLOGIAS.find(t=>t.k===opo.tipologia)?.icon} {TIPOLOGIAS.find(t=>t.k===opo.tipologia)?.l}</span>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><p style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:"#fff"}}>{opo.nombre}</p>
            <p style={{margin:0,fontSize:11,color:"#94A3B8"}}>Creada por {opo.creadaPorNombre} · {opo.creadaEn}</p></div>
            <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}>
              {onEdit&&(
                <button onClick={onEdit} style={{background:"#FFFFFF22",border:"1px solid #FFFFFF44",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",padding:"7px 14px",borderRadius:8,display:"flex",alignItems:"center",gap:6}}>
                  ✏️ Editar
                </button>
              )}
              <button onClick={onClose} style={{background:"none",border:"none",color:"#94A3B8",fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
          </div>
        </div>

        <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,background:T.bg,flexShrink:0,overflowX:"auto"}}>
          {[["info","📋 Info"],["notas",`📝 Notas${notas.length>0?` (${notas.length})`:""}`],["imagenes",`📷 Imgs${imgs.length>0?` (${imgs.length})`:""}`],["historial",`📅 Historia (${hist.length})`]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"10px 14px",border:"none",borderBottom:`2px solid ${tab===k?T.blue:"transparent"}`,background:"transparent",color:tab===k?T.blue:T.muted,fontWeight:tab===k?700:400,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

          {tab==="info"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:T.bg,borderRadius:12,padding:"14px 16px"}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🏢 Datos del cliente</p>
              {opo.tarjetaVisita&&(
                <div style={{marginBottom:12,borderRadius:10,overflow:"hidden",border:`1px solid ${T.border}`,background:"#f4f4f4",position:"relative"}}>
                  <img src={opo.tarjetaVisita} alt="Tarjeta" style={{width:"100%",maxHeight:180,objectFit:"contain",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"5px 10px",background:"rgba(0,0,0,.45)"}}>
                    <p style={{margin:0,fontSize:10,color:"#fff",fontWeight:600,letterSpacing:".05em"}}>📇 TARJETA DE VISITA</p>
                  </div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {[["Contacto",opo.contacto],["Cargo",opo.cargo],["Tel.",opo.tel],["Email",opo.email],["Ciudad",opo.ciudad]].filter(([,v])=>v).map(([k,v])=>(
                  <p key={k} style={{margin:0,fontSize:12,color:T.text}}><span style={{color:T.muted}}>{k}: </span><b>{v}</b></p>
                ))}
              </div>
              {opo.descripcionCliente&&<p style={{margin:"10px 0 0",fontSize:12,color:T.text,lineHeight:1.5,borderTop:`1px solid ${T.border}`,paddingTop:8}}>{opo.descripcionCliente}</p>}
            </div>
            <div style={{background:T.amberL,borderRadius:12,padding:"14px 16px",border:`1px solid ${T.amber}22`}}>
              <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.amber,textTransform:"uppercase"}}>🎯 Oportunidad</p>
              <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.7}}>{opo.descripcionOportunidad}</p>
            </div>
            <div style={{background:T.bg,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              {ag?<><Avt nombre={ag.nombre} color={ag.color} size={40}/><div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{ag.nombre}</p><p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{ag.equipo}</p></div></>
              :<><div style={{width:40,height:40,borderRadius:10,background:T.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👤</div><p style={{margin:0,fontSize:13,color:T.muted,fontStyle:"italic",flex:1}}>Sin agente asignado</p></>}
              {puedeReasignar&&(
                <button onClick={()=>setShowAsignar(s=>!s)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${T.border}`,background:"#fff",color:T.blue,fontSize:12,fontWeight:600,cursor:"pointer"}}>{ag?"Reasignar":"Asignar"}</button>

            {showAsignar&&<div style={{background:T.bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted}}>
                Asignar a:
              </p>
              <select value={asignarId} onChange={e=>setAsignarId(e.target.value)} style={{...inp2,marginBottom:8}}>
                <option value="">Sin asignar</option>
                {agentesDisp.map(v=><option key={v.id} value={v.id}>{v.nombre} ({v.equipo})</option>)}
              </select>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowAsignar(false)} style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                <button onClick={asignar} style={{flex:2,padding:"9px",borderRadius:8,border:"none",background:T.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Confirmar →</button>
              </div>
            </div>}
            {opo.estado==="ganada"&&<div style={{background:T.greenL,borderRadius:12,padding:"12px 14px",border:`1px solid #6EE7B7`,display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:22}}>✅</span>
              <div><p style={{margin:0,fontSize:13,fontWeight:700,color:T.green}}>Cliente convertido al CRM</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>Ruta {opo.rutaAsignada} · {TIPOLOGIAS.find(t=>t.k===opo.tipoCliente)?.icon} {TIPOLOGIAS.find(t=>t.k===opo.tipoCliente)?.l} · Seguimiento en informes semanales</p></div>
            </div>}
          </div>}

          {tab==="notas"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"#fff",borderRadius:10,border:`1px solid ${T.border}`,padding:"14px"}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nueva nota de seguimiento</p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={4}
                placeholder="Resultado de la visita, conversación, objeciones, siguientes pasos…"
                style={{...inp2,resize:"vertical",lineHeight:1.6,marginBottom:8}}/>
              <button onClick={addNota} disabled={!nota.trim()}
                style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:nota.trim()?T.blue:T.muted,color:"#fff",fontWeight:700,fontSize:13,cursor:nota.trim()?"pointer":"default"}}>
                💾 Guardar nota en Firebase
              </button>
            </div>
            {notas.length===0&&<p style={{textAlign:"center",padding:"30px",fontSize:13,color:T.muted,fontStyle:"italic"}}>Sin notas — añade la primera</p>}
            {[...notas].reverse().map(n=>(
              <div key={n.id} style={{background:T.bg,borderRadius:10,padding:"13px 15px",borderLeft:`3px solid ${T.blue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,flexWrap:"wrap",gap:4}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {USUARIOS.find(a=>a.nombre===n.por)&&<Avt nombre={n.por} color={USUARIOS.find(a=>a.nombre===n.por)?.color} size={22}/>}
                    <span style={{fontSize:12,fontWeight:700,color:T.blue}}>{n.por}</span>
                  </div>
                  <span style={{fontSize:11,color:T.muted}}>{n.fecha}</span>
                </div>
                <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.7}}>{n.texto}</p>
              </div>
            ))}
          </div>}

          {tab==="imagenes"&&<div>
            {imgs.length===0?<div style={{textAlign:"center",padding:"50px 20px",background:T.bg,borderRadius:12,border:`1px solid ${T.border}`}}>
              <p style={{fontSize:40,margin:"0 0 10px"}}>📷</p>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:T.text}}>Sin imágenes</p>
              <p style={{margin:0,fontSize:12,color:T.muted}}>Se añaden al crear la oportunidad</p>
            </div>:
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {imgs.map((img,i)=>(
                <div key={img.id||i} style={{borderRadius:12,overflow:"hidden",border:`1px solid ${T.border}`}}>
                  <div style={{position:"relative"}}>
                    <img src={img.src} alt="" style={{width:"100%",maxHeight:280,objectFit:"contain",background:"#f4f4f4",display:"block"}}/>
                    <div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"3px 10px"}}>
                      <span style={{fontSize:11,color:"#fff",fontWeight:600}}>Imagen {i+1}</span>
                    </div>
                  </div>
                  {img.nota&&<div style={{padding:"10px 14px",background:"#fff"}}>
                    <p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}><span style={{color:T.muted,fontWeight:700}}>Descripción: </span>{img.nota}</p>
                  </div>}
                </div>
              ))}
            </div>}
          </div>}

          {tab==="historial"&&<div style={{display:"flex",flexDirection:"column",gap:0}}>
            {[...hist].reverse().map((h,i)=>(
              <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginRight:12,flexShrink:0}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:h.accion.includes("✅")?"#ECFDF5":h.accion.includes("❌")?T.redL:h.accion.includes("creada")?T.purpleL:T.blueL,border:`2px solid ${h.accion.includes("✅")?T.green:h.accion.includes("❌")?T.red:h.accion.includes("creada")?T.purple:T.blue}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,zIndex:1}}>
                    {h.accion.includes("✅")?"✅":h.accion.includes("❌")?"❌":h.accion.includes("creada")?"🎯":h.accion.includes("Asignada")?"👤":"📝"}
                  </div>
                  {i<hist.length-1&&<div style={{width:2,flex:1,minHeight:20,background:T.border}}/>}
                </div>
                <div style={{flex:1,paddingBottom:16,paddingTop:4}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,flexWrap:"wrap",gap:4}}>
                    <span style={{fontSize:13,fontWeight:700,color:T.text}}>{h.accion}</span>
                    <span style={{fontSize:11,color:T.muted}}>{h.por} · {h.fecha}</span>
                  </div>
                  {h.nota&&<div style={{background:T.bg,borderRadius:8,padding:"8px 12px",fontSize:12,color:T.muted,lineHeight:1.5}}>{h.nota}</div>}
                </div>
              </div>
            ))}
          </div>}
        </div>

        <div style={{padding:"12px 20px",borderTop:`1px solid ${T.border}`,background:T.bg,flexShrink:0}}>
          {!["ganada","perdida"].includes(opo.estado)&&!showCerrar&&<div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowCerrar(true)} style={{flex:2,padding:"11px",borderRadius:9,border:"none",background:T.green,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>✅ Convertir a cliente CRM</button>
            <button onClick={perder} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:T.redL,color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>❌ Perdida</button>
            <button onClick={onClose} style={{padding:"11px 16px",borderRadius:9,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>
          </div>}
          {!["ganada","perdida"].includes(opo.estado)&&showCerrar&&<div style={{background:"#fff",borderRadius:12,padding:"14px",border:`1px solid ${T.green}44`}}>
            <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:T.green}}>✅ Selecciona tipología y ruta</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {TIPOLOGIAS.map(t=><button key={t.k} onClick={()=>setTipologia(t.k)} style={{padding:"7px 12px",borderRadius:8,border:`2px solid ${tipologia===t.k?T.green:T.border}`,background:tipologia===t.k?T.greenL:"#fff",color:tipologia===t.k?T.green:T.muted,fontWeight:tipologia===t.k?700:400,fontSize:12,cursor:"pointer"}}>{t.icon} {t.l}</button>)}
            </div>
            <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
              {[1,2,3,4,5].map(r=><button key={r} onClick={()=>setRuta(String(r))} style={{width:40,height:40,borderRadius:8,border:`2px solid ${ruta===String(r)?T.navy:T.border}`,background:ruta===String(r)?T.navy:"#fff",color:ruta===String(r)?"#fff":T.muted,fontWeight:800,fontSize:15,cursor:"pointer"}}>{r}</button>)}
              <span style={{fontSize:12,color:T.muted}}>← Ruta del agente</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowCerrar(false)} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              <button onClick={convertir} disabled={!tipologia} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:tipologia?T.green:T.muted,color:"#fff",fontWeight:800,fontSize:13,cursor:tipologia?"pointer":"default"}}>Confirmar →</button>
            </div>
          </div>}
          {opo.esOportunidad===false&&<button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:9,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>}
        </div>
      </div>
    </div>
  );
}
