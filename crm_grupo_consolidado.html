// INCIDENCIAS — gestión clara con escalado visual
// ═══════════════════════════════════════════════════════════════════
function Incidencias({usuario}){
  const esAgente=usuario.rol==="agente";
  const esJefe=["jefe","director","ceo"].includes(usuario.rol);
  const esRolJefe=usuario.rol==="jefe";
  const miEquipo=usuario.equipo;

  const [incidencias,setIncidencias]=useState(INCIDENCIAS_SEED.map(i=>({
    ...i,historialEscalado:i.historialEscalado||[],
    escaladoA:i.escaladoA||null,informadoA:i.informadoA||[],
  })));
  const [sel,setSel]=useState(null);
  const [filtroTipo,setFiltroTipo]=useState("todas");
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});
  const fotoRef=React.useRef();

  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");

  const crearIncidencia=()=>{
    if(!form.tipo||!form.descripcion.trim()) return;
    const nueva={
      id:`inc${Date.now()}`,
      ...form,
      autor:usuario.id,
      equipo:usuario.equipo||"",
      agente:usuario.id,
      fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),
      estado:"abierta",
      historialEscalado:[],escaladoA:null,informadoA:[],
    };
    setIncidencias(p=>[nueva,...p]);
    fbEscribir("incidencias",nueva.id,nueva);
    setForm({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});
    setShowForm(false);
  };

  const addFoto=(e)=>{
    [...e.target.files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setForm(f=>({...f,fotos:[...(f.fotos||[]),ev.target.result]}));
      r.readAsDataURL(file);
    });
    e.target.value="";
  };

  // Actualizar incidencia y guardar en Firebase
  const upd=(id,changes)=>{
    setIncidencias(p=>p.map(i=>i.id===id?{...i,...changes}:i));
    const updated={...incidencias.find(i=>i.id===id),...changes};
    fbEscribir("incidencias",id,updated);
    if(sel?.id===id) setSel(updated);
  };

  const addHistorial=(inc,accion,nota="",fotos=[])=>{
    const h={accion,por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota,fotos};
    upd(inc.id,{historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const escalar=(inc,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`↑ Escalada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"escalada",escaladoA:destId,
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const informar=(inc,destId)=>{
    if((inc.informadoA||[]).includes(destId)) return;
    const dest=USUARIOS.find(u=>u.id===destId);
    const h={accion:`ℹ️ Informado a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:"",fotos:[]};
    upd(inc.id,{informadoA:[...(inc.informadoA||[]),destId],
      historialEscalado:[...(inc.historialEscalado||[]),h]});
  };

  const cerrar=(inc,nota)=>{
    const h={accion:"✅ Cerrada",por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota,fotos:[]};
    upd(inc.id,{estado:"cerrada",historialEscalado:[...(inc.historialEscalado||[]),h]});
    setSel(null);
  };

  // Filtrar por rol
  const misMostrar=incidencias.filter(i=>{
    if(esAgente) return i.autor===usuario.id;
    if(esRolJefe) return i.equipo===miEquipo;
    return true;
  }).filter(i=>filtroTipo==="todas"||i.tipo===filtroTipo);

  const abiertas=misMostrar.filter(i=>i.estado!=="cerrada");
  const cerradas=misMostrar.filter(i=>i.estado==="cerrada");

  // ── DETALLE ────────────────────────────────────────────────────────
function DetIncidencia({sel,usuario,director,ceo,esJefe,esRolJefe,onBack,onEscalar,onInformar,onNota,onCerrar}){
  const tipo=INC_TIPOS[sel.tipo]||{label:sel.tipo,color:T.muted};
  const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
  const priColor=priColors[sel.prioridad]||T.muted;
  const autorU=USUARIOS.find(u=>u.id===sel.autor);
  const puedoEscalar=esJefe&&sel.estado!=="cerrada";
  const respTipo=USUARIOS.find(u=>u.tipologia===sel.tipo);
  const yaEscaladoRespTipo=sel.escaladoA===respTipo?.id;
  const yaInfDir=(sel.informadoA||[]).includes(director?.id);
  const yaInfCeo=(sel.informadoA||[]).includes(ceo?.id);
  const [nota,setNota]=useState("");
  const [notaCierre,setNotaCierre]=useState("");
  const [showCierre,setShowCierre]=useState(false);

  return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Incidencias" onBack={()=>setSel(null)}/>
        <div style={{padding:"16px"}}>

          {/* Ficha */}
          <div style={{background:"#fff",borderRadius:16,marginBottom:16,overflow:"hidden",
            border:`1px solid ${T.border}`,borderTop:`4px solid ${tipo.color}`}}>
            <div style={{padding:"16px"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:tipo.color,
                  background:tipo.color+"15",borderRadius:99,padding:"3px 10px"}}>{tipo.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:priColor,
                  background:priColor+"15",borderRadius:99,padding:"3px 10px"}}>
                  {sel.prioridad==="urgente"?"🔴 Urgente":sel.prioridad.charAt(0).toUpperCase()+sel.prioridad.slice(1)}
                </span>
                <span style={{fontSize:12,fontWeight:700,
                  color:sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber,
                  background:(sel.estado==="cerrada"?T.green:sel.estado==="escalada"?T.purple:T.amber)+"15",
                  borderRadius:99,padding:"3px 10px"}}>
                  {sel.estado==="cerrada"?"✅ Cerrada":sel.estado==="escalada"?"↑ Escalada":"🔴 Abierta"}
                </span>
              </div>
              <p style={{margin:"0 0 8px",fontSize:16,fontWeight:800}}>{sel.clienteNombre||sel.cliente||"—"}</p>
              <p style={{margin:"0 0 10px",fontSize:13,color:T.text,lineHeight:1.6}}>{sel.descripcion||sel.desc}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>
                {autorU?.nombre||sel.autor} · {sel.fecha}
              </p>
              {sel.escaladoA&&(
                <div style={{marginTop:8,padding:"7px 10px",background:T.purpleL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.purple,fontWeight:700}}>
                    ↑ Escalada a: {USUARIOS.find(u=>u.id===sel.escaladoA)?.nombre}
                  </p>
                </div>
              )}
              {(sel.informadoA||[]).length>0&&(
                <div style={{marginTop:6,padding:"7px 10px",background:T.blueL,borderRadius:8}}>
                  <p style={{margin:0,fontSize:11,color:T.blue,fontWeight:700}}>
                    ℹ️ Informado a: {(sel.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Acciones de escalado — solo para jefes */}
          {puedoEscalar&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Acciones de escalado
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {/* Escalar al responsable de tipología */}
                {esRolJefe&&respTipo&&!yaEscaladoRespTipo&&(
                  <button onClick={()=>escalar(sel,respTipo.id,"")}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${tipo.color}`,background:tipo.color+"10",
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{respTipo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Escalar a {respTipo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Responsable de {tipo.label}</p>
                    </div>
                    <span style={{color:tipo.color,fontWeight:700,fontSize:16}}>↑</span>
                  </button>
                )}
                {yaEscaladoRespTipo&&(
                  <div style={{padding:"10px 14px",background:T.greenL,borderRadius:10}}>
                    <p style={{margin:0,fontSize:12,fontWeight:700,color:T.green}}>
                      ✅ Ya escalada a {respTipo?.nombre}
                    </p>
                  </div>
                )}
                {/* Informar al director */}
                {director&&!yaInfDir&&(
                  <button onClick={()=>informar(sel,director.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.blue}`,background:T.blueL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{director.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Informar a {director.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Para su conocimiento y seguimiento</p>
                    </div>
                    <span style={{color:T.blue,fontSize:16}}>ℹ️</span>
                  </button>
                )}
                {yaInfDir&&<div style={{padding:"8px 14px",background:T.blueL,borderRadius:9}}>
                  <p style={{margin:0,fontSize:11,fontWeight:700,color:T.blue}}>ℹ️ {director.nombre} ya informado</p>
                </div>}
                {/* Elevar al CEO */}
                {(esRolJefe===false&&usuario.rol==="director")&&ceo&&!yaInfCeo&&(
                  <button onClick={()=>informar(sel,ceo.id)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",
                      borderRadius:12,border:`1.5px solid ${T.purple}`,background:T.purpleL,
                      cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:24}}>{ceo.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>Elevar al {ceo.nombre}</p>
                      <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>Máxima prioridad</p>
                    </div>
                    <span style={{color:T.purple,fontSize:16}}>👑</span>
                  </button>
                )}
              </div>
            </div>
          )}

          {/* Añadir nota */}
          {sel.estado!=="cerrada"&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
              border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                💬 Añadir actualización
              </p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
                placeholder="Gestión realizada, estado actual…"
                style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
                  padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5,marginBottom:8}}/>
              <Btn full onClick={()=>{if(nota.trim()){addHistorial(sel,"💬 Nota",nota);setNota("");}}}
                color={T.navy} disabled={!nota.trim()}>
                Guardar nota
              </Btn>
            </div>
          )}

          {/* Cerrar */}
          {sel.estado!=="cerrada"&&(
            showCierre?(
              <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:12,
                border:`1.5px solid ${T.green}`}}>
                <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:T.green}}>✅ Resolución</p>
                <textarea value={notaCierre} onChange={e=>setNotaCierre(e.target.value)} rows={3}
                  placeholder="Cómo se resolvió…"
                  style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,
                    padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
                    boxSizing:"border-box",fontFamily:"inherit",marginBottom:8}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowCierre(false)}
                    style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                      background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={()=>cerrar(sel,notaCierre)}
                    style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                      background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✅ Confirmar cierre
                  </button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowCierre(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:12,
                  border:`2px solid ${T.green}`,background:T.greenL,
                  color:T.green,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✅ Marcar como resuelta
              </button>
            )
          )}

          {/* Historial */}
          {(sel.historialEscalado||[]).length>0&&(
            <div style={{background:"#fff",borderRadius:16,padding:"16px",border:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial de gestión
              </p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i,arr)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:10,marginBottom:10,
                  borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 3px",fontSize:12,color:T.text}}>{h.nota}</p>}
                    {(h.fotos||[]).length>0&&(
                      <div style={{display:"flex",gap:6,margin:"4px 0"}}>
                        {h.fotos.map((f,j)=>(
                          <img key={j} src={f} alt="" style={{width:60,height:60,objectFit:"cover",
                            borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}}
                            onClick={()=>window.open(f)}/>
                        ))}
                      </div>
                    )}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
  );
}

  if(sel) return <DetIncidencia sel={sel} usuario={usuario} director={director} ceo={ceo} esJefe={esJefe} esRolJefe={esRolJefe} onBack={()=>setSel(null)} onEscalar={(destId,nota)=>{escalar(sel,destId,nota);setSel({...sel,escaladoA:destId,estado:"escalada"});}} onInformar={(destId)=>informar(sel,destId)} onNota={(nota)=>addHistorial(sel,"💬 Nota",nota)} onCerrar={(nota)=>cerrar(sel,nota)}/>;

  // ── LISTA ─────────────────────────────────────────────────────────
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🚨 Incidencias</p>

            {esAgente?"Mis incidencias":esRolJefe?`Equipo ${miEquipo}`:"Todas"}

            <div style={{background:T.red,color:"#fff",borderRadius:99,

              {abiertas.length} abierta{abiertas.length>1?"s":""}

              {Object.entries(INC_TIPOS).map(([k,t])=>(

                    background:form.tipo===k?t.color+"15":"#fff",

                    fontWeight:form.tipo===k?700:400}}>

            </div>

            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Prioridad</p>

              {[{k:"baja",l:"🟢 Baja",c:T.green},{k:"media",l:"🟡 Media",c:T.amber},
                {k:"alta",l:"🔴 Alta",c:T.red},{k:"urgente",l:"🚨 Urgente",c:"#7F1D1D"}].map(p=>(
                <button key={p.k} onClick={()=>setForm(f=>({...f,prioridad:p.k}))}
                  style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",fontSize:11,
                    border:`2px solid ${form.prioridad===p.k?p.c:T.border}`,
                    background:form.prioridad===p.k?p.c+"15":"#fff",
                    color:form.prioridad===p.k?p.c:T.muted,
                    fontWeight:form.prioridad===p.k?700:400}}>
                  {p.l}
                </button>
              ))}
            </div>
          </div>

          {/* Descripción */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Descripción *</p>
            <textarea value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))}
              rows={4} placeholder="Describe el problema con detalle…"
              style={{width:"100%",border:`1.5px solid ${form.descripcion?T.navy:T.border}`,borderRadius:10,
                padding:"11px 12px",fontSize:13,resize:"none",outline:"none",
                boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
          </div>

          {/* Fotos */}
          <div style={{marginBottom:14}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>📷 Fotos (opcional)</p>
            {(form.fotos||[]).length>0&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                {form.fotos.map((f,i)=>(
                  <div key={i} style={{position:"relative"}}>
                    <img src={f} alt="" style={{width:72,height:72,objectFit:"cover",
                      borderRadius:10,border:`1px solid ${T.border}`}}/>
                    <button onClick={()=>setForm(fm=>({...fm,fotos:fm.fotos.filter((_,j)=>j!==i)}))}
                      style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",
                        background:T.red,border:"none",color:"#fff",fontSize:11,
                        cursor:"pointer",fontWeight:700}}>✕</button>
                  </div>
                ))}
              </div>
            )}
            <button onClick={()=>fotoRef.current.click()}
              style={{padding:"9px 16px",borderRadius:9,border:`1.5px dashed ${T.border}`,
                background:T.bg,color:T.muted,fontSize:13,cursor:"pointer"}}>
              📷 Añadir fotos
            </button>
            <input ref={fotoRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={addFoto}/>
          </div>

          {/* Botones */}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShowForm(false);setForm({tipo:"",prioridad:"media",clienteNombre:"",descripcion:"",fotos:[]});}}
              style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${T.border}`,
                background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Cancelar
            </button>
            <button onClick={crearIncidencia}
              disabled={!form.tipo||!form.descripcion.trim()||!form.clienteNombre.trim()}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",
                background:form.tipo&&form.descripcion.trim()&&form.clienteNombre.trim()?T.red:"#CBD5E1",
                color:"#fff",fontWeight:700,fontSize:14,
                cursor:form.tipo&&form.descripcion.trim()&&form.clienteNombre.trim()?"pointer":"default"}}>
              🚨 Crear incidencia
            </button>
          </div>
        </div>
      )}

      {/* Filtro por tipo */}
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setFiltroTipo("todas")}
          style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo==="todas"?700:400,
            border:`1.5px solid ${filtroTipo==="todas"?T.navy:T.border}`,
            background:filtroTipo==="todas"?T.navy:"#fff",color:filtroTipo==="todas"?"#fff":T.muted,cursor:"pointer"}}>
          Todas
        </button>
        {Object.entries(INC_TIPOS).map(([k,t])=>(
          <button key={k} onClick={()=>setFiltroTipo(k)}
            style={{padding:"7px 14px",borderRadius:99,flexShrink:0,fontSize:11,fontWeight:filtroTipo===k?700:400,
              border:`1.5px solid ${filtroTipo===k?t.color:T.border}`,
              background:filtroTipo===k?t.color+"15":"#fff",color:filtroTipo===k?t.color:T.muted,cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Abiertas */}
      {abiertas.length>0&&(
        <div style={{marginBottom:20}}>
          {abiertas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            const priColors={urgente:"#7F1D1D",alta:T.red,media:T.amber,baja:T.green};
            const pColor=priColors[i.prioridad]||T.muted;
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                  cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${tipo.color}`,
                  boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:tipo.color,
                    background:tipo.color+"15",borderRadius:99,padding:"2px 8px"}}>{tipo.label}</span>
                  <span style={{fontSize:11,fontWeight:700,color:pColor,
                    background:pColor+"15",borderRadius:99,padding:"2px 8px"}}>
                    {i.prioridad==="urgente"?"🔴 Urgente":i.prioridad.charAt(0).toUpperCase()+i.prioridad.slice(1)}
                  </span>
                  {i.escaladoA&&<span style={{fontSize:11,fontWeight:700,color:T.purple,
                    background:T.purpleL,borderRadius:99,padding:"2px 8px"}}>
                    ↑ {USUARIOS.find(u=>u.id===i.escaladoA)?.nombre}
                  </span>}
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 3px",fontSize:14,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
                {(i.informadoA||[]).length>0&&(
                  <p style={{margin:"4px 0 0",fontSize:10,color:T.blue,fontWeight:600}}>
                    ℹ️ Informado a: {(i.informadoA||[]).map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(", ")}
                  </p>
                )}
              </div>
            );
          })}
        </div>
      )}

      {abiertas.length===0&&(
        <div style={{textAlign:"center",padding:"40px 16px",color:T.muted,marginBottom:20}}>
          <p style={{fontSize:32,margin:"0 0 8px"}}>✅</p>
          <p style={{margin:0,fontSize:14}}>Sin incidencias abiertas</p>
        </div>
      )}

      {/* Cerradas */}
      {cerradas.length>0&&(
        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            ✅ Resueltas ({cerradas.length})
          </p>
          {cerradas.map(i=>{
            const tipo=INC_TIPOS[i.tipo]||{label:i.tipo,color:T.muted};
            return(
              <div key={i.id} onClick={()=>setSel(i)}
                style={{background:"#F9FAFB",borderRadius:12,padding:"12px 14px",marginBottom:6,
                  cursor:"pointer",border:`1px solid ${T.border}`,opacity:.75}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}>
                  <Badge label={tipo.label} color={T.muted}/>
                  <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{i.fecha}</span>
                </div>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700}}>{i.clienteNombre||i.cliente}</p>
                <p style={{margin:0,fontSize:11,color:T.muted,overflow:"hidden",
                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.descripcion||i.desc}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PanelAdmin({onBack}){

    {id:3,nombre:"Resp WIKUK", rol:"jefe",    equipo:"WIKUK",   user:"rwikuk",pass:"Rw2025!",  activo:true},
    {id:4,nombre:"Resp INTERKEY",rol:"jefe",  equipo:"INTERKEY",user:"rinter",pass:"Ri2025!",  activo:true},
    {id:5,nombre:"David Mag",  rol:"agente",  equipo:"WIKUK",   user:"davidmag",pass:"Dm2025!",activo:true},
    {id:6,nombre:"Carlos G.",  rol:"agente",  equipo:"INTERKEY",user:"carlosg",pass:"Cg2025!", activo:true},

  const [showPassId,setShowPassId]=useState(null);

  const genPass=()=>{
    const c="abcdefghijkmnpqrstuvwxyz23456789";
    return Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join("")+"!";
  };

  const addUser=()=>{
    if(!form.nombre||!form.user)return;
    const pass=form.pass||genPass();
    setUsuarios(uu=>[...uu,{id:Date.now(),...form,pass,activo:true}]);
    setForm({nombre:"",rol:"agente",equipo:"WIKUK",user:"",pass:""});
    setFormOpen(false);
  };

  const jerarquia=[
    {rol:"ceo",     usuarios:usuarios.filter(u=>u.rol==="ceo")},
    {rol:"director",usuarios:usuarios.filter(u=>u.rol==="director")},
    {rol:"jefe",    usuarios:usuarios.filter(u=>u.rol==="jefe")},
    {rol:"agente",  usuarios:usuarios.filter(u=>u.rol==="agente")},
    {rol:"rrhh",    usuarios:usuarios.filter(u=>u.rol==="rrhh")},
  ];

  return(

        <div>
          <p style={{margin:0,fontSize:20,fontWeight:900,color:T.text}}>⚙️ Panel Administrador</p>
          <p style={{margin:0,fontSize:12,color:T.muted}}>Gestión de usuarios y jerarquía</p>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:24,background:T.bg,borderRadius:12,padding:4}}>
        {[["jerarquia","🏗 Jerarquía"],["usuarios","👥 Usuarios"],["claves","🔑 Claves"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"9px",borderRadius:9,border:"none",
              background:tab===k?T.white:"transparent",
              color:tab===k?T.navy:T.muted,fontWeight:tab===k?700:400,
              fontSize:12,cursor:"pointer",boxShadow:tab===k?"0 1px 4px #0002":"none"}}>
            {l}
          </button>
        ))}
      </div>

      {/* TAB: JERARQUÍA */}
      {tab==="jerarquia"&&(
        <div>
          <p style={{margin:"0 0 16px",fontSize:13,color:T.muted}}>Así está organizado el equipo ahora mismo:</p>
          {jerarquia.filter(g=>g.usuarios.length>0).map(g=>{
            const info=ROL_INFO[g.rol];
            return(
              <div key={g.rol} style={{marginBottom:16}}>
                {/* Nivel */}
                <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
                  <div style={{width:36,height:36,borderRadius:10,background:info.color+"18",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{info.icon}</div>
                  <div>
                    <p style={{margin:0,fontSize:13,fontWeight:800,color:T.text}}>{info.label}</p>
                    <p style={{margin:0,fontSize:11,color:T.muted}}>{info.desc}</p>
                  </div>
                </div>
                {/* Usuarios en este rol */}
                <div style={{marginLeft:24,borderLeft:`2px solid ${info.color}44`,paddingLeft:16}}>
                  {g.usuarios.map(u=>(
                    <div key={u.id} style={{display:"flex",gap:10,alignItems:"center",
                      padding:"9px 12px",borderRadius:10,background:T.white,
                      border:`1px solid ${T.border}`,marginBottom:6}}>
                      <span style={{fontSize:16}}>{info.icon}</span>
                      <div style={{flex:1}}>
                        <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{u.nombre}</p>
                        {u.equipo&&<Badge label={u.equipo} color={u.equipo==="WIKUK"?T.green:T.amber}/>}
                      </div>
                      <span style={{fontSize:11,color:u.activo?T.green:T.red,fontWeight:700}}>
                        {u.activo?"● Activo":"● Inactivo"}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* TAB: USUARIOS */}
      {tab==="usuarios"&&(
        <div>
          {/* Formulario nuevo usuario */}
          {formOpen?(
            <Card style={{marginBottom:16,border:`2px solid ${T.blue}`}}>
              <p style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:T.text}}>➕ Nuevo usuario</p>

                <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Nombre completo</p>
                <input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}
                  placeholder="Ej: María López"
                  style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>

              <div style={{marginBottom:10}}>
                <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Rol</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {Object.entries(ROL_INFO).map(([k,v])=>(
                    <button key={k} onClick={()=>setForm(f=>({...f,rol:k}))}
                      style={{padding:"8px 13px",borderRadius:9,border:`2px solid ${form.rol===k?v.color:T.border}`,
                        background:form.rol===k?v.color+"15":"#fff",
                        color:form.rol===k?v.color:T.muted,fontSize:12,fontWeight:form.rol===k?700:400,cursor:"pointer"}}>
                      {v.icon} {v.label}
                    </button>
                  ))}
                </div>
              </div>

              {["agente","jefe"].includes(form.rol)&&(
                <div style={{marginBottom:10}}>
                  <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Equipo</p>
                  <div style={{display:"flex",gap:8}}>
                    {["WIKUK","INTERKEY"].map(eq=>(
                      <button key={eq} onClick={()=>setForm(f=>({...f,equipo:eq}))}
                        style={{flex:1,padding:"10px",borderRadius:9,border:`2px solid ${form.equipo===eq?(eq==="WIKUK"?T.green:T.amber):T.border}`,
                          background:form.equipo===eq?(eq==="WIKUK"?T.greenL:T.amberL):"#fff",
                          color:form.equipo===eq?(eq==="WIKUK"?T.greenD:T.amber):T.muted,fontWeight:form.equipo===eq?700:400,cursor:"pointer"}}>
                        {eq}
                      </button>
                    ))}
                  </div>
                </div>

              <div style={{marginBottom:14}}>
                <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Usuario (login)</p>
                <input value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value.toLowerCase().replace(/\s/g,".")}))}
                  placeholder="ej: maria.lopez"
                  style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>

              <div style={{display:"flex",gap:8}}>
                <Btn small outline color={T.muted} onClick={()=>setFormOpen(false)}>Cancelar</Btn>

                </Btn>
              </div>
            </Card>
          ):(
            <button onClick={()=>setFormOpen(true)}
              style={{width:"100%",padding:"14px",borderRadius:13,border:`2px dashed ${T.blue}`,
                background:T.blueL,color:T.blue,fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:16}}>
              ➕ Añadir usuario
            </button>
          )}

          {/* Lista usuarios */}
          {usuarios.map(u=>{
            const info=ROL_INFO[u.rol]||{icon:"👤",color:T.muted};
            return(
              <Card key={u.id} style={{marginBottom:8,padding:"13px 16px"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:info.color+"18",

                    {info.icon}
                  </div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{u.nombre}</p>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3}}>
                      <Badge label={info.label} color={info.color}/>
                      {u.equipo&&<Badge label={u.equipo} color={u.equipo==="WIKUK"?T.green:T.amber}/>}
                    </div>
                  </div>
                  <button onClick={()=>setUsuarios(uu=>uu.map(x=>x.id===u.id?{...x,activo:!x.activo}:x))}
                    style={{background:"none",border:"none",cursor:"pointer",fontSize:12,
                      color:u.activo?T.green:T.red,fontWeight:700,flexShrink:0}}>
                    {u.activo?"● Activo":"● Inactivo"}
                  </button>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* TAB: CLAVES */}
      {tab==="claves"&&(
        <div>
          <div style={{background:T.amberL,border:`1.5px solid ${T.amber}`,borderRadius:12,padding:"12px 14px",marginBottom:16,display:"flex",gap:8}}>
            <span style={{fontSize:20}}>⚠️</span>
            <p style={{margin:0,fontSize:12,color:"#92400E",fontWeight:600}}>Estas contraseñas son confidenciales. Solo compártelas con la persona correspondiente de forma privada.</p>
          </div>
          {usuarios.map(u=>{
            const info=ROL_INFO[u.rol]||{icon:"👤",color:T.muted};
            const visible=showPassId===u.id;
            return(
              <Card key={u.id} style={{marginBottom:8,padding:"14px 16px"}}>
                <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:visible?10:0}}>
                  <span style={{fontSize:18}}>{info.icon}</span>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text}}>{u.nombre}</p>
                    <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>@{u.user}</p>
                  </div>
                  <button onClick={()=>setShowPassId(v=>v===u.id?null:u.id)}
                    style={{padding:"7px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,
                      background:"#fff",color:T.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    {visible?"Ocultar 🙈":"Ver clave 👁"}
                  </button>
                </div>
                {visible&&(
                  <div style={{background:T.navy,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <p style={{margin:0,flex:1,fontSize:16,fontWeight:800,color:"#fff",fontFamily:"monospace",letterSpacing:1}}>{u.pass}</p>
                    <button onClick={()=>{navigator.clipboard?.writeText(u.pass);}}
                      style={{background:"#ffffff22",border:"none",borderRadius:7,padding:"6px 10px",
                        color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      Copiar
                    </button>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Widget compacto para dashboards
function TareasWidget({ onNav, usuario }) {
  const [tareas, setTareas] = useState([]);
  const [cargando, setCargando] = useState(true);

  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const agentesEquipo = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario?.equipo : true)
  );

  const misIds = new Set([
    (usuario?.id||"").toUpperCase(),
    (usuario?.user||"").toUpperCase(),
    (usuario?.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));

  const filtrar = (lista) => {
    if (esCeo || esDir) return lista;
    if (esJefe) {
      return lista.filter(t => {
        if (!t.agente) return true; // sin asignar → jefe las ve
        return agentesEquipo.some(a =>
          a.id.toUpperCase() === (t.agente||"").toUpperCase() ||
          (a.grupoAgente||"").toUpperCase() === (t.agente||"").toUpperCase()
        );
      });
    }
    // Agente: solo las suyas, nunca sin_asignar
    if (!esAgente) return lista;
    return lista.filter(t => t.agente && misIds.has(t.agente.toUpperCase()));
  };

  useEffect(() => {
    fbLeer("tareas").then(data => {
      const src = data.length > 0 ? data : TAREAS_SEED;
      const pendientes = src.filter(t => t.estado==="pendiente" && !t.eliminada);
      const filtradas  = filtrar(pendientes);
      // Urgentes y sin_asignar primero
      filtradas.sort((a,b) => {
        const sinA = !a.agente ? -1 : 0;
        const sinB = !b.agente ? -1 : 0;
        if (sinA !== sinB) return sinA - sinB;
        const ord = { urgente:0, alta:1, normal:2 };
        return (ord[a.prioridad]||2) - (ord[b.prioridad]||2);
      });
      setTareas(filtradas);
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(()=>{}).finally(()=>setCargando(false));
  }, [usuario?.id]);

  if (cargando || tareas.length === 0) return null;

  const urgentes    = tareas.filter(t => t.prioridad==="urgente").length;
  const sinAsignar  = tareas.filter(t => !t.agente).length;

  return (
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{margin:0,fontSize:10,fontWeight:700,color:"#64748B",
          textTransform:"uppercase",letterSpacing:".12em"}}>
          {esJefeOmas ? "Tareas del equipo" : "Mis acciones"}
        </p>
        <div style={{display:"flex",gap:5}}>
          {esJefeOmas && sinAsignar > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#D97706",background:"#FFFBEB",
              borderRadius:99,padding:"2px 8px"}}>
              ⚠️ {sinAsignar} sin asignar
            </span>
          )}
          {urgentes > 0 && (
            <span style={{fontSize:11,fontWeight:700,color:"#EF4444",background:"#FEF2F2",
              borderRadius:99,padding:"2px 8px"}}>
              🔴 {urgentes} urgente{urgentes>1?"s":""}
            </span>
          )}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid #E2E8F0",
        boxShadow:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06)"}}>
        {tareas.slice(0,5).map((t,i) => {
          const cfg    = PRIORIDAD_CFG[t.prioridad] || PRIORIDAD_CFG.normal;
          const agObj  = esJefeOmas ? USUARIOS.find(u =>
            u.id.toUpperCase()===(t.agente||"").toUpperCase() ||
            (u.grupoAgente||"").toUpperCase()===(t.agente||"").toUpperCase()
          ) : null;
          const sinAg  = !t.agente;
          return (
            <div key={t.id} onClick={()=>onNav("tareas")}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",
                borderBottom:i<Math.min(tareas.length,5)-1?"1px solid #F1F5F9":"none",
                cursor:"pointer",
                background:sinAg?"#FFFBEB":"#fff"}}>
              <span style={{fontSize:13,flexShrink:0}}>{sinAg?"⚠️":cfg.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:"#0F172A",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {t.titulo}
                </p>
                <div style={{display:"flex",gap:5,alignItems:"center",marginTop:1}}>
                  {t.cliente&&<p style={{margin:0,fontSize:11,color:"#94A3B8",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{t.cliente}</p>}
                  {esJefeOmas && (
                    agObj
                      ? <span style={{fontSize:10,fontWeight:700,color:agObj.color,
                          background:agObj.color+"18",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          {agObj.icon} {agObj.nombre}
                        </span>
                      : <span style={{fontSize:10,fontWeight:700,color:"#D97706",
                          background:"#FEF3C7",borderRadius:99,padding:"1px 6px",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          Sin asignar →
                        </span>
                  )}
                </div>
              </div>
              {t.vence && (
                <span style={{fontSize:10,fontWeight:700,color:sinAg?"#D97706":cfg.color,
                  background:sinAg?"#FEF3C7":cfg.bg,borderRadius:6,
                  padding:"2px 6px",flexShrink:0,whiteSpace:"nowrap"}}>
                  {t.vence}
                </span>
              )}
            </div>
          );
        })}
        <div onClick={()=>onNav("tareas")} style={{padding:"9px 16px",textAlign:"center",
          fontSize:12,color:"#3B82F6",fontWeight:600,cursor:"pointer",background:"#F8FAFC",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {esJefeOmas && sinAsignar>0
            ? <><span style={{color:"#D97706"}}>⚠️ {sinAsignar} sin asignar</span> · <span>Ver todas ({tareas.length}) →</span></>
            : <span>Ver todas ({tareas.length}) →</span>
          }
        </div>
      </div>
    </div>
  );
}

// Sección completa de gestión de tareas
function GestorTareas({ usuario }) {
  const esCeo      = usuario?.rol === "ceo";
  const esDir      = usuario?.rol === "director";
  const esJefe     = usuario?.rol === "jefe";
  const esAgente   = usuario?.rol === "agente";
  const esJefeOmas = esCeo || esDir || esJefe;

  const misIds = new Set([
    (usuario.id||"").toUpperCase(),
    (usuario.user||"").toUpperCase(),
    (usuario.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));

  // Agentes disponibles para asignación
  const agentesAsig = USUARIOS.filter(u =>
    u.rol === "agente" && (esJefe ? u.equipo === usuario.equipo : true)
  );

  const [tareas,     setTareas]     = useState([]);
  const [filtro,     setFiltro]     = useState("pendiente");
  const [agFiltro,   setAgFiltro]   = useState("todos"); // filtro por agente (managers)
  const [showForm,   setShowForm]   = useState(false);
  const [editTarea,  setEditTarea]  = useState(null);
  const [asignando,  setAsignando]  = useState(null); // tarea a reasignar
  const [form, setForm] = useState({
    titulo:"", descripcion:"", cliente:"", prioridad:"normal",
    vence:"", tipo:"contacto", agenteId:"",
  });

  // ── Filtro jerárquico ──────────────────────────────────────────
  const esMia = (t) => {
    if (esCeo || esDir) return true;
    if (esJefe) {
      const agT = (t.agente||"").toUpperCase();
      const esMiEquipo = agentesAsig.some(a =>
        a.id.toUpperCase()===agT || (a.grupoAgente||"").toUpperCase()===agT
      );
      const sinAsignar = !t.agente;
      return esMiEquipo || sinAsignar;
    }
    // Agente: NUNCA ve sin_asignar
    if (!t.agente) return false;
    return misIds.has(t.agente.toUpperCase());
  };

  const cargar = () => {
    fbLeer("tareas").then(data => {
      const todas = (data.length > 0 ? data : TAREAS_SEED).filter(t => !t.eliminada);
      setTareas(todas.filter(esMia));
      if (data.length === 0) TAREAS_SEED.forEach(t => fbEscribir("tareas", t.id, t));
    }).catch(() => setTareas(TAREAS_SEED.filter(esMia)));
  };

  useEffect(() => { cargar(); }, [usuario.id]);

  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const guardar = () => {
    if (!form.titulo.trim()) return;
    const hoy = new Date().toLocaleDateString("es-ES");
    const miId = usuario.grupoAgente || usuario.user || usuario.id;
    const agenteDestino = esJefeOmas ? (form.agenteId || "") : miId;
    const t = editTarea
      ? {...editTarea, ...form, agente: agenteDestino}
      : { id:`tsk${Date.now()}`, ...form, agente:agenteDestino,
          creadaPor:usuario.id, creadaPorNombre:usuario.nombre,
          estado:"pendiente", creadaEn:hoy };
    fbEscribir("tareas", t.id, t).then(() => {
      setTareas(prev => editTarea ? prev.map(x=>x.id===t.id?t:x) : [t,...prev]);
      setShowForm(false); setEditTarea(null);
      setForm({titulo:"",descripcion:"",cliente:"",prioridad:"normal",vence:"",tipo:"contacto",agenteId:""});
    });
  };

  const asignar = (tarea, agenteId) => {
    const updated = {...tarea, agente:agenteId,
      asignadoEn:new Date().toLocaleDateString("es-ES"),
      asignadoPor:usuario.nombre};
    fbEscribir("tareas", tarea.id, updated).then(() => {
      setTareas(prev => prev.map(t => t.id===tarea.id ? updated : t));
      setAsignando(null);
    });
  };

  const marcarHecha = (tarea) => {
    const u = {...tarea, estado:"hecha", hechaEn:new Date().toLocaleDateString("es-ES")};
    fbEscribir("tareas", tarea.id, u).then(() =>
      setTareas(prev => prev.map(t => t.id===tarea.id ? u : t))
    );
  };

  const eliminar = (id) => {
    fbEscribir("tareas", id, {id, eliminada:true}).then(() =>
      setTareas(prev => prev.filter(t => t.id !== id))
    );
  };

  const abrirEditar = (t) => {
    setEditTarea(t);
    setForm({titulo:t.titulo,descripcion:t.descripcion||"",cliente:t.cliente||"",
      prioridad:t.prioridad||"normal",vence:t.vence||"",tipo:t.tipo||"contacto",
      agenteId:t.agente||""});
    setShowForm(true);
  };

  // ── Datos derivados ────────────────────────────────────────────
  const sinAsignar = tareas.filter(t=>!t.agente&&!t.eliminada&&t.estado==="pendiente");
  const pendCount  = tareas.filter(t=>!t.eliminada&&t.estado==="pendiente").length;
  const urgCount   = tareas.filter(t=>!t.eliminada&&t.estado==="pendiente"&&t.prioridad==="urgente").length;
  const hechasCount= tareas.filter(t=>!t.eliminada&&t.estado==="hecha").length;

  const filtradas = tareas
    .filter(t => !t.eliminada)
    .filter(t => filtro==="todas" ? true : t.estado===filtro)
    .filter(t => agFiltro==="todos" ? true
      : agFiltro==="sin_asignar" ? !t.agente
      : (t.agente||"").toUpperCase()===(agFiltro||"").toUpperCase()
        || USUARIOS.find(u=>u.id===agFiltro)?.grupoAgente===(t.agente||""))
    .sort((a,b) => ({urgente:0,alta:1,normal:2}[a.prioridad]||2) - ({urgente:0,alta:1,normal:2}[b.prioridad]||2));

  const inp = {width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,padding:"10px 12px",
    fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
  const TIPO_ICON = {muestra:"📦",precio:"💶",contacto:"📞",coordinacion:"🔄",otro:"📌"};

  return (
    <div style={{padding:"16px",paddingBottom:100}}>

      {/* ── KPI cards ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[
          {n:pendCount, l:"Pendientes", c:T.amber},
          {n:urgCount,  l:"Urgentes",   c:T.red},
          {n:hechasCount,l:"Hechas",    c:T.green},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <p style={{margin:"0 0 2px",fontSize:22,fontWeight:800,color:s.c}}>{s.n}</p>
            <p style={{margin:0,fontSize:10,color:T.muted}}>{s.l}</p>
          </div>
        ))}
      </div>

      {/* ── Sin asignar — alerta managers ── */}
      {esJefeOmas && sinAsignar.length > 0 && (
        <div style={{background:"#FFFBEB",border:`1.5px solid ${T.amber}`,borderRadius:12,
          padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:"#92400E"}}>
              {sinAsignar.length} tarea{sinAsignar.length>1?"s":""} sin asignar
            </p>
            <p style={{margin:0,fontSize:11,color:"#B45309"}}>Requieren agente responsable</p>
          </div>
          <button onClick={()=>setAgFiltro(agFiltro==="sin_asignar"?"todos":"sin_asignar")}
            style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${T.amber}`,
              background:agFiltro==="sin_asignar"?T.amber:"#fff",
              color:agFiltro==="sin_asignar"?"#fff":"#92400E",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            {agFiltro==="sin_asignar"?"Ver todas":"Ver →"}
          </button>
        </div>
      )}

      {/* ── Tarjetas de agente (managers) ── */}
      {esJefeOmas && (
        <div style={{marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:6}}>
            {/* Card Todos */}
            <div onClick={()=>setAgFiltro("todos")}
              style={{background:"#fff",borderRadius:11,padding:"10px 12px",cursor:"pointer",
                border:`2px solid ${agFiltro==="todos"?T.navy:T.border}`,
                gridColumn:"1/-1"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>🌐</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text}}>
                    {esCeo||esDir?"Todos los equipos":`Equipo ${usuario.equipo}`}
                  </p>
                  <p style={{margin:0,fontSize:10,color:T.muted}}>
                    {pendCount} pendientes · {urgCount} urgentes · {sinAsignar.length} sin asignar
                  </p>
                </div>
                {agFiltro==="todos"&&<span style={{color:T.navy,fontWeight:800}}>✓</span>}
              </div>
            </div>

            {/* Tarjeta por agente */}
            {agentesAsig.map(ag => {
              const agTareas = tareas.filter(t => !t.eliminada &&
                ((t.agente||"").toUpperCase()===ag.id.toUpperCase() ||
                 (t.agente||"").toUpperCase()===(ag.grupoAgente||"").toUpperCase())
              );
              const agPend = agTareas.filter(t=>t.estado==="pendiente");
              const agUrg  = agPend.filter(t=>t.prioridad==="urgente");
              const sel    = agFiltro===ag.id;
              return (
                <div key={ag.id} onClick={()=>setAgFiltro(sel?"todos":ag.id)}
                  style={{background:"#fff",borderRadius:11,padding:"10px 12px",cursor:"pointer",
                    border:`2px solid ${sel?ag.color:T.border}`,
                    background:sel?ag.color+"08":"#fff",
                    opacity:agTareas.length?1:0.45}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{width:28,height:28,borderRadius:7,background:ag.color+"20",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                      {ag.icon||"🧑‍💼"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ag.nombre}</p>
                      <p style={{margin:0,fontSize:10,color:T.muted}}>{ag.equipo}</p>
                    </div>
                    {sel&&<span style={{fontSize:11,color:ag.color,fontWeight:800}}>✓</span>}

                  <div style={{display:"flex",gap:4}}>
                    <span style={{flex:1,textAlign:"center",padding:"4px 2px",background:"#FFF7ED",
                      borderRadius:6,fontSize:13,fontWeight:800,color:T.amber}}>{agPend.length}</span>

                  <div style={{display:"flex",gap:4,marginTop:2}}>

                  </div>
                </div>
              );
            })}
          </div>
        </div>

                border:`1.5px solid ${filtro===k?T.navy:T.border}`,
                background:filtro===k?T.navy:"#fff",color:filtro===k?"#fff":T.muted,
                fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>{l}</button>

        </div>
        <button onClick={()=>{setEditTarea(null);setForm({titulo:"",descripcion:"",cliente:"",prioridad:"normal",vence:"",tipo:"contacto",agenteId:""});setShowForm(true);}}

            padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}}>
          + Nueva
        </button>
      </div>

      {/* ── Formulario nueva / editar ── */}
      {showForm && (
        <div style={{background:"#fff",border:`1.5px solid ${T.border}`,borderRadius:14,padding:16,marginBottom:12}}>
          <p style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:T.text}}>

            <div style={{display:"flex",gap:8}}>
              <select style={{...inp,flex:1}} value={form.prioridad} onChange={e=>upd("prioridad",e.target.value)}>
                <option value="urgente">🔴 Urgente</option>
                <option value="alta">🟡 Alta</option>
                <option value="normal">🔵 Normal</option>
              </select>
              <select style={{...inp,flex:1}} value={form.tipo} onChange={e=>upd("tipo",e.target.value)}>
                <option value="muestra">📦 Muestra</option>
                <option value="precio">💶 Precio</option>
                <option value="contacto">📞 Contacto</option>
                <option value="coordinacion">🔄 Coordinación</option>
                <option value="otro">📌 Otro</option>
              </select>
            </div>
            <input style={inp} placeholder="Fecha límite (dd/mm/aaaa)" value={form.vence} onChange={e=>upd("vence",e.target.value)}/>

const OPO_FB_PROJECT="grupo-consolidado-crm";
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${OPO_FB_PROJECT}/databases/(default)/documents`;
const FB_STORAGE = `https://firebasestorage.googleapis.com/v0/b/${OPO_FB_PROJECT}.appspot.com/o`;

// ── Firebase Storage — subir foto ─────────────────────────────────
async function subirFoto(base64, ruta){
  try{
    // Convertir base64 a Blob
    const [meta,data]=base64.split(",");
    const mime=meta.match(/:(.*?);/)?.[1]||"image/jpeg";
    const bytes=atob(data);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr],{type:mime});

    // Subir a Storage
    const rutaCodificada=encodeURIComponent(ruta);
    const r=await fetch(`${FB_STORAGE}?uploadType=media&name=${rutaCodificada}`,{
      method:"POST",
      headers:{"Content-Type":mime},
      body:blob,
    });
    if(!r.ok) throw new Error(`Storage error: ${r.status}`);
    const res=await r.json();
    // URL pública de descarga
    const token=res.downloadTokens;
    return `${FB_STORAGE}/${rutaCodificada}?alt=media&token=${token}`;
  }catch(e){
    console.warn("Error subiendo foto:",e.message);
    return null; // fallback: devuelve null, se queda base64 local
  }
}

// Subir múltiples fotos y devolver URLs
async function subirFotos(fotos=[], carpeta="general"){
  if(!fotos||fotos.length===0) return [];
  const urls=await Promise.all(
    fotos.map(async (f,i)=>{
      if(f.startsWith("https://")) return f; // ya es URL, no resubir
      const ext=f.includes("png")?"png":"jpg";
      const nombre=`${carpeta}/${Date.now()}_${i}.${ext}`;
      const url=await subirFoto(f,nombre);
      return url||f; // si falla, mantiene base64
    })
  );
  return urls;
}

// ── Firebase genérico ─────────────────────────────────────────────
async function fbLeer(coleccion, pageSize=200){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok) return [];
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];
      nextPage=data.nextPageToken||null;
      intentos++;
    }while(nextPage&&intentos<10);
    return docs;
  }catch(e){console.warn("FB leer:",e.message);return [];}
}

// Cargar TODOS los docs de una colección sin límite de páginas
async function fbLeerTodos(coleccion){
  try{
    let docs=[], nextPage=null, intentos=0;
    do{
      const url=`${FB_BASE}/${coleccion}?pageSize=300${nextPage?"&pageToken="+nextPage:""}`;
      const r=await fetch(url);
      if(!r.ok) break;
      const data=await r.json();
      if(data.documents) docs=[...docs,...data.documents.map(fromFirestore)];

}

// Query Firestore por grupoAgente — solo trae los clientes del vendedor
async function fbQueryGrupoAgente(grupoAgente){
  try{
    const body={
      structuredQuery:{
        from:[{collectionId:"clientes"}],
        where:{fieldFilter:{field:{fieldPath:"grupoAgente"},op:"EQUAL",value:{stringValue:grupoAgente}}},
        limit:500
      }
    };
    const project="grupo-consolidado-crm";
    const url=`https://firestore.googleapis.com/v1/projects/${project}/databases/(default)/documents:runQuery`;
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) return [];
    const data=await r.json();
    return data.filter(d=>d.document).map(d=>fromFirestore(d.document));
  }catch(e){console.warn("FB query:",e.message);return [];}
}


// ── Serializar a formato Firestore ────────────────────────────────
function serializeToFirestore(datos){
  const fields={};
  const serialize=(v)=>{
    if(v===null||v===undefined) return {nullValue:null};
    if(typeof v==="boolean") return {booleanValue:v};
    if(typeof v==="number") return {doubleValue:v};
    if(typeof v==="string"){
      // Truncar strings muy largos (base64 imágenes) para no superar 1MB
      if(v.startsWith("data:image")&&v.length>5000) return {stringValue:"[imagen]"};
      return {stringValue:v};
    }
    if(Array.isArray(v)) return {arrayValue:{values:v.map(x=>serialize(x))}};
    if(typeof v==="object") return {mapValue:{fields:Object.fromEntries(
      Object.entries(v).map(([k,val])=>[k,serialize(val)])
    )}};
    return {stringValue:String(v)};
  };
  Object.entries(datos).forEach(([k,v])=>{ fields[k]=serialize(v); });
  return {fields};
}

// Escritura genérica — crea o sobreescribe documento
async function fbEscribir(coleccion, id, datos){
  try{
    const r=await fetch(`${FB_BASE}/${coleccion}/${id}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(serializeToFirestore(datos))
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const msg=e?.error?.message||e?.error?.status||r.status;
      console.warn(`🔴 Firebase [${coleccion}/${id}] error ${r.status}:`, msg);
      // Mostrar en pantalla para diagnóstico
      if(r.status===403||r.status===401){
        console.warn("⚠️ REGLAS FIREBASE: La base de datos no permite escritura anónima.");
        console.warn("Solución: Firebase Console → Firestore → Reglas → cambiar a allow read, write: if true;");
      }
    }
    return r.ok;
  }catch(e){
    console.warn("🔴 Firebase red error:", e.message);
    return false;
  }
}

function fromFirestore(doc) {
  if (!doc.fields) return {id: doc.name?.split("/").pop()};
  const obj = {id: doc.name?.split("/").pop()};
  Object.entries(doc.fields).forEach(([k, v]) => {
    if (v.stringValue !== undefined) obj[k] = v.stringValue;
    else if (v.integerValue !== undefined) obj[k] = parseInt(v.integerValue);
    else if (v.booleanValue !== undefined) obj[k] = v.booleanValue;
    else if (v.doubleValue !== undefined) obj[k] = parseFloat(v.doubleValue);
    else if (v.nullValue !== undefined) obj[k] = null;
    else if (v.arrayValue) obj[k] = (v.arrayValue.values||[]).map(x=>x.stringValue||x.integerValue||x.booleanValue||"");
  });
  return obj;
}

async function fbCargar() {
  try {
    let docs = [], nextPage = null, intentos = 0;
    do {
      const url = `${FB_BASE}/oportunidades?pageSize=100${nextPage ? "&pageToken=" + nextPage : ""}`;
      const r = await fetch(url);
      const data = await r.json();
      if (data.documents) docs = [...docs, ...data.documents.map(fromFirestore)];
      nextPage = data.nextPageToken || null;
      intentos++;
    } while (nextPage && intentos < 5);
    return docs;
  } catch(e) { console.warn("FB read:", e.message); return []; }
}
