      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{k:"recuperacion",icon:"🔄",label:"Recuperar cliente"},{k:"nuevo",icon:"🌱",label:"Cliente nuevo"}].map(t=>(
          <button key={t.k} onClick={()=>setForm(f=>({...f,tipo:t.k}))}
            style={{flex:1,padding:"11px",borderRadius:11,cursor:"pointer",fontSize:12,
              border:`2px solid ${form.tipo===t.k?T.amber:T.border}`,
              background:form.tipo===t.k?T.amberL:"#fff",
              color:form.tipo===t.k?T.amber:T.muted,fontWeight:form.tipo===t.k?700:400}}>

        ))}
      </div>

      {/* Acción y objetivo */}
      <div style={{marginBottom:12}}>
        <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Acción propuesta</p>

      <div style={{marginBottom:20}}>
        <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Objetivo</p>
        <input value={form.objetivo} onChange={e=>setForm(f=>({...f,objetivo:e.target.value}))}
          placeholder="Recuperar pedido mensual, reactivar cuenta…" style={ISt}/>
      </div>

      {/* ── ARTÍCULOS CON OFERTA ── */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🏷️ Artículos con precio oferta
          </p>
          {(form.ofertas||[]).length>0&&(
            <span style={{background:T.amber,color:"#fff",borderRadius:99,
              fontSize:10,fontWeight:800,padding:"2px 8px"}}>{form.ofertas.length}</span>
          )}
        </div>

        {/* Ofertas añadidas */}
        {(form.ofertas||[]).map((o,i)=>(
          <div key={o.id||i} style={{background:"#fff",borderRadius:11,padding:"11px 14px",
            marginBottom:8,border:`1px solid ${T.border}`,
            borderLeft:`3px solid ${T.amber}`,
            display:"flex",gap:10,alignItems:"center"}}>
            <div style={{flex:1,minWidth:0}}>
              {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.amber,fontWeight:700}}>{o.codigo}</p>}
              <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.nombre}</p>
              <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center"}}>
                {o.precioBase&&<span style={{fontSize:11,color:T.muted,textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg tarifa</span>}
                {o.dto&&<span style={{fontSize:11,fontWeight:700,color:T.red}}>-{o.dto}%</span>}
                {o.precioFinal&&<span style={{fontSize:13,fontWeight:800,color:T.green}}>{o.precioFinal}€/kg</span>}
              </div>
              {o.nota&&<p style={{margin:"2px 0 0",fontSize:11,color:T.muted,fontStyle:"italic"}}>{o.nota}</p>}
            </div>
            <button onClick={()=>setForm(f=>({...f,ofertas:(f.ofertas||[]).filter(x=>x.id!==o.id)}))}
              style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:18,flexShrink:0}}>🗑</button>
          </div>
        ))}

        {/* Formulario nueva oferta */}
        <div style={{background:T.bg,borderRadius:12,padding:"14px",border:`1.5px dashed ${T.amber}66`}}>
          {/* Buscador producto */}
          <div style={{display:"flex",gap:6,marginBottom:formOf.codigo?4:8}}>
            <input value={formOf.nombre}
              onChange={e=>setFormOf(f=>({...f,nombre:e.target.value,codigo:"",precioBase:""}))}
              placeholder="Busca o escribe el artículo…" style={{...ISt,flex:1,padding:"9px 11px"}}/>
            <button onClick={()=>setShowProd(s=>!s)}
              style={{padding:"0 13px",borderRadius:9,border:`1.5px solid ${T.amber}`,
                background:"#fff",color:T.amber,fontWeight:700,cursor:"pointer",fontSize:16}}>🔍</button>

            <div style={{border:`1.5px solid ${T.amber}`,borderRadius:9,background:"#fff",

                placeholder="Nombre o código de artículo…"

                  borderBottom:`1px solid ${T.border}`}}/>

                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                      <p style={{margin:0,fontSize:10,color:T.muted}}>{p.codigo} · {p.cat}</p>
                    </div>
                    {p.precio&&<span style={{fontSize:12,fontWeight:700,color:T.green,flexShrink:0}}>{p.precio}€/kg</span>}

            </div>
          )}

          {/* Precio tarifa + descuento */}
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Precio tarifa €/kg</p>
              <input value={formOf.precioBase} onChange={e=>setFormOf(f=>({...f,precioBase:e.target.value}))}

            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Dto. solicitado %</p>
              <input type="number" value={formOf.dto} onChange={e=>setFormOf(f=>({...f,dto:e.target.value}))}
                placeholder="0" style={{...ISt,padding:"10px 12px"}}/>
            </div>
          </div>

          {/* Precio calculado */}
          {precioFinal&&(
            <div style={{background:T.greenL,borderRadius:9,padding:"9px 14px",
              marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <span>✓</span>
              <div>
                <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>
                  Precio oferta: {precioFinal}€/kg
                </p>
                {formOf.dto&&<p style={{margin:0,fontSize:11,color:T.green}}>
                  Descuento del {formOf.dto}% sobre tarifa {formOf.precioBase}€/kg
                </p>}
              </div>
            </div>
          )}

          <input value={formOf.nota} onChange={e=>setFormOf(f=>({...f,nota:e.target.value}))}
            placeholder="Nota (condición, volumen mínimo…)" style={{...ISt,marginBottom:8}}/>

          <button onClick={addOferta} disabled={!formOf.nombre.trim()}
            style={{width:"100%",padding:"11px",borderRadius:9,border:"none",
              background:formOf.nombre.trim()?T.amber:"#CBD5E1",
              color:"#fff",fontWeight:700,fontSize:13,
              cursor:formOf.nombre.trim()?"pointer":"default"}}>
            + Añadir artículo con oferta
          </button>
        </div>
      </div>

      {/* Guardar */}
      <div style={{display:"flex",gap:8}}>
        {estrategia&&<button onClick={()=>setEditando(false)}
          style={{flex:1,padding:"12px",borderRadius:11,border:`1px solid ${T.border}`,
            background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
          Cancelar
        </button>}
        <button onClick={()=>{if(!form.texto.trim()) return;onGuardar(form);setEditando(false);}}
          disabled={!form.texto.trim()}
          style={{flex:2,padding:"12px",borderRadius:11,border:"none",
            background:form.texto.trim()?T.amber:"#CBD5E1",
            color:"#fff",fontWeight:700,fontSize:14,
            cursor:form.texto.trim()?"pointer":"default"}}>
          ✓ Solicitar estrategia
        </button>
      </div>
    </div>
  );
}

      const r=new FileReader();
      r.onload=ev=>setForm(f=>({...f,fotos:[...(f.fotos||[]),ev.target.result]}));

            style={{...ISt,resize:"none",lineHeight:1.5,fontFamily:"inherit",marginBottom:12}}/>

          {/* Fotos */}

            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              {form.fotos.map((f,i)=>(
                <div key={i} style={{position:"relative",flexShrink:0}}>
                  <img src={f} alt="" style={{width:80,height:80,objectFit:"cover",
                    borderRadius:10,border:`1px solid ${T.border}`}}/>
                  <button onClick={()=>setForm(fm=>({...fm,fotos:fm.fotos.filter((_,j)=>j!==i)}))}
                    style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",
                      background:"#EF4444",border:"none",color:"#fff",fontSize:11,
                      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
                    ✕
                  </button>
                </div>
              ))}
              <div onClick={()=>fotoRef.current.click()}
                style={{width:80,height:80,borderRadius:10,border:`2px dashed ${T.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:"pointer",fontSize:24,color:T.muted,background:T.bg}}>
                +
              </div>
            </div>
          )}
          {(form.fotos||[]).length===0&&(
            <div onClick={()=>fotoRef.current.click()}
              style={{border:`2px dashed ${T.border}`,borderRadius:10,padding:"16px",
                textAlign:"center",cursor:"pointer",background:T.bg,marginBottom:12}}>
              <span style={{fontSize:28,display:"block",marginBottom:4}}>📷</span>
              <p style={{margin:0,fontSize:12,color:T.muted,fontWeight:600}}>
                Toca para añadir fotos
              </p>
              <p style={{margin:"2px 0 0",fontSize:10,color:T.muted}}>
                Puedes seleccionar varias
              </p>
            </div>
          )}
          <input ref={fotoRef} type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={addFoto}/>

          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShow(false);setForm({tipo:"",prioridad:"media",descripcion:"",fotos:[]}); }}
              style={{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${T.border}`,
                background:"#fff",color:T.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Cancelar
            </button>
            <button onClick={()=>{
              if(!form.tipo||!form.descripcion.trim()) return;
              onAdd(form);
              setForm({tipo:"",prioridad:"media",descripcion:"",fotos:[]});
              setShow(false);
            }} disabled={!form.tipo||!form.descripcion.trim()}
              style={{flex:2,padding:"11px",borderRadius:10,border:"none",
                background:form.tipo&&form.descripcion.trim()?T.red:"#CBD5E1",
                color:"#fff",fontWeight:700,fontSize:13,
                cursor:form.tipo&&form.descripcion.trim()?"pointer":"default"}}>
              🚨 Registrar incidencia
            </button>
          </div>
        </div>
      )}

      {!show&&(
        <button onClick={()=>setShow(true)}
          style={{width:"100%",padding:"13px",borderRadius:12,marginTop:8,
            border:`2px dashed ${T.red}66`,background:"#FFF1F2",
            color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          + Registrar incidencia
        </button>
      )}
    </div>
  );
}

      )}
      {muestras.length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>

        <div>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🎯 Estrategia solicitada
          </p>
          <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",
            border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.amber}`}}>
            <Badge label={estrategia.tipo==="recuperacion"?"🔄 Recuperación":"🌱 Nuevo"} color={T.amber}/>

            {estrategia.objetivo&&<p style={{margin:0,fontSize:11,color:T.muted}}>🎯 {estrategia.objetivo}</p>}

        <div style={{marginTop:estrategia?16:0}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            🚨 Incidencias ({incidencias.length})
          </p>
          {incidencias.map((inc,i)=>{
            const col=inc.estado==="cerrada"?T.muted:T.red;

                marginBottom:6,border:`1px solid ${T.border}`,
                borderLeft:`4px solid ${col}`,opacity:inc.estado==="cerrada"?.6:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

  );
}


// ─── APP PRINCIPAL ────────────────────────────────────────────────
function App(props){
  const [usuario,setUsuario]=useState(function(){
    // Auto-login desde portal: initializar directamente sin useEffect
    return (props&&props._autoLogin)?props._autoLogin:null;
  });
  const [section,setSection]=useState("dashboard");
  const [adminOpen,setAdminOpen]=useState(false);

  // Actividad diaria compartida entre GestorClientes e Informe
  const [actividadSemana,setActividadSemana]=useState({});
  const onActividad=(cid,data)=>setActividadSemana(a=>({...a,[cid]:data}));

  // ── Datos desde Firebase ──────────────────────────────────────────
  const [muestrasDB,setMuestrasDB]=useState(MUESTRAS_SEED);
  const [estrategiasDB,setEstrategiasDB]=useState(ESTRATEGIAS_SEED);
  const [incidenciasDB,setIncidenciasDB]=useState(INCIDENCIAS_SEED);
  const [fbCargando,setFbCargando]=useState(false);
  const [fbStatus,setFbStatus]=useState(""); // "ok" | "error" | ""
  const [oportunidadesDB,setOportunidadesDB]=useState(OPORTUNIDADES_SEED);
  const [clientesDB,setClientesDB]=useState(null); // null = aún no cargado

  // Cargar clientes del usuario — query específica por grupoAgente (mucho más rápido)
  useEffect(()=>{
    if(!usuario) return;
    // Obtener el vendedor del usuario desde el hash de la URL o localStorage
    let miVendedor=null;
    try{
      const hash=decodeURIComponent(window.location.hash.replace('#',''));
      if(hash.includes('|')) miVendedor=hash.split('|')[1];
    }catch(e){}
    if(!miVendedor){
      try{
        const pu=JSON.parse(localStorage.getItem('gc_portal_user')||'{}');
        miVendedor=pu.catalogoVendedor||null;
      }catch(e){}
    }

    if(miVendedor){
      // Query directa solo para este vendedor — evita cargar 6000+ docs
      fbQueryGrupoAgente(miVendedor).then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);
        const porGrupo={[miVendedor]:activos};
        const porAgente={};
        activos.forEach(c=>{const ag=c.agente||c.agenteId;if(ag){if(!porAgente[ag])porAgente[ag]=[];porAgente[ag].push(c);}});
        setClientesDB({_porGrupo:porGrupo,_porAgente:porAgente,_todos:activos,_vendedor:miVendedor});
      }).catch(()=>{});
    } else if(["director","ceo"].includes(usuario.rol)){
      // Director/CEO: carga todos (paginado completo)
      fbLeerTodos("clientes").then(clientes=>{
        const activos=clientes.filter(c=>c.activo!==false);
        const porGrupo={};const porAgente={};
        activos.forEach(c=>{
          if(c.grupoAgente){if(!porGrupo[c.grupoAgente])porGrupo[c.grupoAgente]=[];porGrupo[c.grupoAgente].push(c);}
          const ag=c.agente||c.agenteId;if(ag){if(!porAgente[ag])porAgente[ag]=[];porAgente[ag].push(c);}
        });
        setClientesDB({_porGrupo:porGrupo,_porAgente:porAgente,_todos:activos});
      }).catch(()=>{});
    }
  },[usuario?.id]);

  useEffect(()=>{
    if(!usuario) return;
    setFbCargando(true);
    Promise.all([
      fbLeer("muestras"),
      fbLeer("estrategias"),
      fbLeer("incidencias"),
      fbLeer("visitas"),
      fbCargar(), // oportunidades
    ]).then(([muestras,estrategias,incidencias,visitas,opos])=>{
      if(muestras.length>0) setMuestrasDB(muestras.filter(m=>!m.eliminada));
      if(estrategias.length>0) setEstrategiasDB(estrategias.filter(e=>!e.eliminada));
      if(incidencias.length>0) setIncidenciasDB(incidencias);
      if(opos.length>0){
        const norm=opos.map(o=>({...o,agente:o.agente||o.agenteId,agenteId:o.agenteId||o.agente}));
        const fbIds=new Set(norm.map(o=>o.id));
        setOportunidadesDB([...norm,...OPORTUNIDADES_SEED.filter(o=>!fbIds.has(o.id))]);
      }

      // Reconstruir actividadSemana desde Firebase para el agente actual
      if(usuario?.rol==="agente"){
        const actRec={};
        // Visitas
        visitas.filter(v=>v.agente===usuario.id).forEach(v=>{
          if(!actRec[v.clienteId]) actRec[v.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[v.clienteId].visitas=[...(actRec[v.clienteId].visitas||[]),v];
        });
        // Muestras
        muestras.filter(m=>m.agente===usuario.id&&!m.eliminada).forEach(m=>{
          if(!actRec[m.clienteId]) actRec[m.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[m.clienteId].muestras=[...(actRec[m.clienteId].muestras||[]),m];
        });
        // Estrategias
        estrategias.filter(e=>e.agente===usuario.id&&!e.eliminada).forEach(e=>{
          if(!actRec[e.clienteId]) actRec[e.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[e.clienteId].estrategia=e;
        });
        // Incidencias
        incidencias.filter(i=>i.agente===usuario.id).forEach(i=>{
          if(!actRec[i.clienteId]) actRec[i.clienteId]={visitas:[],muestras:[],estrategia:null,incidencias:[]};
          actRec[i.clienteId].incidencias=[...(actRec[i.clienteId].incidencias||[]),i];
        });
        if(Object.keys(actRec).length>0) setActividadSemana(actRec);
      }

      setFbStatus("ok");
    }).catch(e=>{console.warn("Firebase error:",e);setFbStatus("error");})
    .finally(()=>setFbCargando(false));
  },[usuario?.id]);

  const handleLogin=(u)=>{
    setUsuario(u);
    setSection("dashboard");
    if(u.rol==="admin") setAdminOpen(true);
  };

  if(!usuario) return <Login onLogin={handleLogin}/>;

  if(adminOpen) return <PanelAdmin onBack={()=>{setAdminOpen(false);setUsuario(null);}}/>;

  const esAgente=usuario.rol==="agente";
  const esJefe=usuario.rol==="jefe";
  const esDir=["director","ceo"].includes(usuario.rol);
  const esJefeOmas=esJefe||esDir;
  const miEquipo=usuario.equipo;

  // Helper: obtener clientes de un agente
  // Firebase usa grupoAgente (= catalogoVendedor del portal, ej: "CARLOSG", "DAVIDMAG")
  const getClientesPara=(agenteId)=>{
    if(clientesDB){
      // Obtener catalogoVendedor — 3 fuentes en orden de prioridad:
      // 1. URL hash: crm_grupo_consolidado.html#crmId|CARLOSG
      let catalogoVendedor=null;
      try{
        const hash=decodeURIComponent(window.location.hash.replace('#',''));
        if(hash.includes('|')) catalogoVendedor=hash.split('|')[1];
      }catch(e){}
      // 2. localStorage (guardado por el portal)
      if(!catalogoVendedor){
        try{
          const pu=JSON.parse(localStorage.getItem('gc_portal_user')||'{}');
          catalogoVendedor=pu.catalogoVendedor||null;
        }catch(e){}
      }

      if(catalogoVendedor&&clientesDB._porGrupo&&clientesDB._porGrupo[catalogoVendedor]){
        return clientesDB._porGrupo[catalogoVendedor];
      }
      // 3. Fallback: buscar por agente ID directo
      if(clientesDB._porAgente&&clientesDB._porAgente[agenteId]){
        return clientesDB._porAgente[agenteId];
      }
      // 4. Fallback: filtrar por equipo del usuario
      if(usuario.equipo&&clientesDB._todos){
        const porEquipo=clientesDB._todos.filter(c=>c.equipo===usuario.equipo);
        if(porEquipo.length>0) return porEquipo;
      }
      // 5. CEO/Director: todos los clientes
      if(["director","ceo"].includes(usuario.rol)&&clientesDB._todos){
        return clientesDB._todos;
      }
    }
    return CLIENTES_POR_AGENTE[agenteId]||[];
  };

  // Clientes del usuario actual
  const misClientesFB=getClientesPara(usuario.id);

  // Filtros por rol usando datos de Firebase
  const pend=muestrasDB.filter(m=>
    m.estado==="pendiente"&&(esAgente?m.agente===usuario.id:
    esJefe?USUARIOS.find(u=>u.id===m.agente)?.equipo===miEquipo:true)
  ).length;

  const estEnCurso=esAgente
    ? estrategiasDB.filter(e=>e.estado==="en_curso"&&e.agente===usuario.id).length
    : esJefe
    ? estrategiasDB.filter(e=>e.estado==="pendiente_aprobacion"&&USUARIOS.find(u=>u.id===e.agente)?.equipo===miEquipo&&!e.escaladoA).length
    : estrategiasDB.filter(e=>e.estado==="pendiente_aprobacion"&&e.escaladoA===usuario.id).length;

  const incAbiertas=incidenciasDB.filter(i=>
    i.estado==="abierta"&&(esAgente?i.autor===usuario.id:
    esJefe?i.equipo===miEquipo:true)
  ).length;

  // Badge oportunidades — datos reales de Firebase
  const opsAbiertas=oportunidadesDB.filter(o=>{
    const cerrada=["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e);
    if(cerrada) return false;
    if(esAgente) return o.agente===usuario.id||o.agenteId===usuario.id;
    if(esJefe){const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente));return ag?.equipo===miEquipo;}
    return true;
  }).length;

  const urgCount=0; // badge dinámico — cargado en TareasWidget
  const NAV_AGENTE=[
    {id:"dashboard",    icon:"🏠",label:"Inicio",      color:usuario.color},
    {id:"clientes",     icon:"📋",label:"Clientes",    color:T.blue},
    {id:"informe",      icon:"📤",label:"Informe",     color:T.navy},
    {id:"oportunidades",icon:"💼",label:"Ops",         color:T.navy,  badge:opsAbiertas},
    {id:"muestras",     icon:"📦",label:"Muestras",    color:T.purple, badge:pend},
    {id:"proyectos",    icon:"📁",label:"Proyectos",   color:T.purple},
    {id:"estrategias",  icon:"🎯",label:"Estrategias", color:T.green,  badge:estEnCurso},
    {id:"incidencias",  icon:"🚨",label:"Incidencias", color:T.red,    badge:incAbiertas},
    {id:"historial",    icon:"📅",label:"Historial",    color:T.purple},
    {id:"tareas",       icon:"📌",label:"Tareas",        color:T.red},
    {id:"ia",           icon:"🤖",label:"IA",             color:T.purple},
  ];

  const NAV_JEFE=[
    {id:"dashboard",    icon:"📊",label:"Mi equipo",   color:usuario.color},
    {id:"historial",    icon:"📅",label:"Historial",   color:T.purple},
    {id:"tareas",       icon:"📌",label:"Tareas",      color:T.red,   badge:urgCount},
    {id:"clientes_eq",  icon:"📋",label:"Clientes",    color:T.blue},
    {id:"estrategias",  icon:"🎯",label:"Estrategias", color:T.green, badge:estEnCurso},
    {id:"oportunidades",icon:"💼",label:"Ops",         color:T.navy,  badge:opsAbiertas},
    {id:"proyectos",    icon:"📁",label:"Proyectos",   color:T.purple},
    {id:"incidencias",  icon:"🚨",label:"Incidencias", color:T.red,   badge:incAbiertas},
    {id:"usuarios",     icon:"👥",label:"Equipo",      color:T.blue},
    {id:"ia",           icon:"🤖",label:"IA",          color:T.purple},
  ];

  const NAV_DIR=[
    {id:"dashboard",    icon:"📊",label:"Dashboard",    color:usuario.color},
    {id:"historial",    icon:"📅",label:"Historial",    color:T.purple},
    {id:"tareas",       icon:"📌",label:"Tareas",       color:T.red,   badge:urgCount},
    {id:"clientes_eq",  icon:"📋",label:"Clientes",     color:T.blue},
    {id:"estrategias",  icon:"🎯",label:"Estrategias",  color:T.green, badge:estEnCurso},
    {id:"oportunidades",icon:"💼",label:"Ops",          color:T.navy,  badge:opsAbiertas},
    {id:"proyectos",    icon:"📁",label:"Proyectos",    color:T.purple},
    {id:"incidencias",  icon:"🚨",label:"Incidencias",  color:T.red,   badge:incAbiertas},
    {id:"usuarios",     icon:"👥",label:"Equipo",       color:T.blue},
    {id:"ia",           icon:"🤖",label:"IA",           color:T.purple},
  ];

  const nav=esAgente?NAV_AGENTE:esJefe?NAV_JEFE:NAV_DIR;

  // Dashboard del jefe: solo su equipo
  const DashJefe=()=>{
    const agentesEquipo=USUARIOS.filter(u=>u.rol==="agente"&&u.equipo===miEquipo);
    const n=agentesEquipo.length||1;
    const semana=14;
    const vMesEq=n*24500,vMesObjEq=n*28750;
    const vAnualEq=n*187400,vAnualObjEq=n*345000;
    const mbMesEq=34.2,mbMesObjEq=32,mbAnualEq=33.8,mbAnualObjEq=32;
    const pctVM=Math.round(vMesEq/vMesObjEq*100);
    const pctVA=Math.round(vAnualEq/vAnualObjEq*100);
    const pctMM=Math.round(mbMesEq/mbMesObjEq*100);
    const pctMA=Math.round(mbAnualEq/mbAnualObjEq*100);

    const opsEq=(oportunidadesDB||OPORTUNIDADES_SEED).filter(o=>{
      const ag=agentesEquipo.find(a=>a.id===o.agente||a.id===o.agenteId);
      return ag&&!["ganada","perdida","cerrada_ganada","cerrada_perdida"].some(e=>o.etapa===e||o.estado===e);
    });
    const incEq=incidenciasDB.filter(i=>i.equipo===miEquipo&&i.estado==="abierta");
    const estEq=estrategiasDB.filter(e=>e.estado==="en_curso"&&agentesEquipo.find(a=>a.id===e.agente));
    const mEq=muestrasDB.filter(m=>agentesEquipo.find(a=>a.id===m.agente));
    const proyEq=PROYECTOS_SEED.filter(p=>p.estado==="activo"&&agentesEquipo.find(a=>p.equipo?.includes(a.id)));

    const Ring=({pct,size=52,stroke=5})=>{
      const r=size/2-stroke;
      const circ=2*Math.PI*r;
      const fill=circ*(1-Math.min(pct,100)/100);
      const c=pct>=100?"#22C55E":pct>=80?"#F59E0B":"#EF4444";
      return(

function HistorialSemanal({ usuario }) {
  const esCeo      = usuario.rol === "ceo";
  const esDirector = usuario.rol === "director";
  const esJefe     = usuario.rol === "jefe";
  const esAgentRol = usuario.rol === "agente";
  const esJefeOmas = esCeo || esDirector || esJefe;

  const SEMANA_ACTUAL = (()=>{
    const d=new Date(); const s=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
  })();

  const [semana,      setSemana]      = React.useState(SEMANA_ACTUAL);
  const [equipoSel,   setEquipoSel]   = React.useState("todos");
  const [agenteSel,   setAgenteSel]   = React.useState(null);
  const [tabSel,      setTabSel]      = React.useState("resumen");
  const [visitas,     setVisitas]     = React.useState([]);
  const [muestras,    setMuestras]    = React.useState([]);
  const [oportunidades,setOportunidades]=React.useState([]);
  const [informes,    setInformes]    = React.useState([]);
  const [cargando,    setCargando]    = React.useState(true);

  const miEquipo = usuario.equipo;
  const misIds = new Set([
    (usuario.id||"").toUpperCase(),
    (usuario.user||"").toUpperCase(),
    (usuario.grupoAgente||"").toUpperCase(),
  ].filter(Boolean));

  const agentesEquipo = USUARIOS.filter(u =>
    u.rol==="agente" && (esJefe ? u.equipo===miEquipo : true)
  );

  const esMio = (doc) => {
    if (esCeo || esDirector) return true;
    if (esJefe) {
      const agDoc=(doc.agente||doc.agenteId||doc.agenteGrupo||"").toLowerCase();
      const esMiEquipo=agentesEquipo.some(id=>id.id.toLowerCase()===agDoc||(id.grupoAgente||"").toLowerCase()===agDoc);
      const esMiCreacion=misIds.has((doc.creadoPor||"").toUpperCase())||doc.creadoPor===usuario.id;
      return esMiEquipo||esMiCreacion;
    }
    const esMiDoc=misIds.has((doc.agente||doc.agenteGrupo||"").toUpperCase());
    const esVisitaDirectorAMiCliente=
      (doc.creadoPor==="dir"||doc.creadoPorNombre==="Jefe de Ventas")&&
      misIds.has((doc.agenteAsignado||doc.grupoAgente||"").toUpperCase());
    return esMiDoc||esVisitaDirectorAMiCliente;
  };

  React.useEffect(()=>{
    setCargando(true);
    Promise.all([
      fbLeer("visitas"),
      fbLeer("muestras"),
      fbLeer("oportunidades"),
      fbLeer("informes"),
    ]).then(([vis,mues,ops,infs])=>{
      setVisitas(vis.filter(v=>esMio(v)&&!v.eliminada));
      setMuestras(mues.filter(m=>esMio(m)&&!m.eliminada));
      setOportunidades(ops.filter(o=>esMio(o)&&!o.eliminada));
      setInformes(esJefeOmas?infs:infs.filter(i=>esMio(i)));
    }).catch(()=>{}).finally(()=>setCargando(false));
  },[usuario.id]);

  const semanaLabel = s => {
    const d=new Date(2026,0,1);
    d.setDate(d.getDate()+(s-1)*7);
    return d.toLocaleDateString("es-ES",{month:"short",day:"numeric"});
  };

  const visSemana = visitas.filter(v=>{
    if(Number(v.semana)!==semana) return false;
    const agV=v.agente||v.agenteId||"";
    const agObj=USUARIOS.find(u=>u.id===agV||u.grupoAgente===agV);
    if(agenteSel){
      const selObj=USUARIOS.find(u=>u.id===agenteSel);
      const match=agV.toUpperCase()===(agenteSel||"").toUpperCase()||
        (selObj&&selObj.grupoAgente&&selObj.grupoAgente===agV);
      if(!match) return false;
    }
    if(equipoSel!=="todos"&&agObj?.equipo!==equipoSel) return false;
    return true;
  });
  const muesSemana = muestras.filter(m=>Number(m.semana)===semana);
  const opsSemana  = oportunidades.filter(o=>Number(o.semana)===semana);

  // Todas las visitas de la semana sin filtro agente/equipo (para cards de agente)
  const visSemanaTodas = visitas.filter(v=>Number(v.semana)===semana);
  const opsSemanaTodas = oportunidades.filter(o=>Number(o.semana)===semana);

  // Informes de esta semana
  const infsSemana = informes.filter(i=>Number(i.semana)===semana);
  const agentesConInforme = new Set(infsSemana.map(i=>i.agente));
  const agentesTotales = esJefeOmas
    ? USUARIOS.filter(u=>u.rol==="agente"&&(esJefe?u.equipo===miEquipo:true)&&
        (equipoSel==="todos"?true:u.equipo===equipoSel)).length
    : 1;
  const miInforme = !esJefeOmas && infsSemana.find(i=>i.agente===usuario.id);
  const todosCerrado = agentesTotales>0 && agentesConInforme.size>=agentesTotales;
  const alguoEnvio   = agentesConInforme.size>0;
  const estadoColor  = todosCerrado?T.green:alguoEnvio?T.amber:semana<SEMANA_ACTUAL?T.red:T.muted;
  const estadoIcon   = todosCerrado?"✅":alguoEnvio?"⚠️":semana<SEMANA_ACTUAL?"❌":"📋";
  const estadoLabel  = esJefeOmas
    ? (todosCerrado?agentesConInforme.size+"/"+agentesTotales+" informes enviados"
      :alguoEnvio?agentesConInforme.size+"/"+agentesTotales+" informes enviados"
      :semana<SEMANA_ACTUAL?"Ningún informe enviado":"Semana en curso")
    : (miInforme?"Informe enviado el "+miInforme.fechaEnvio
      :semana<SEMANA_ACTUAL?"Informe pendiente":"Semana en curso");

  const TABS=[
    {id:"resumen",   label:"📊 Resumen"},
    {id:"visitas",   label:"👥 Visitas ("+visSemana.length+")"},
    ...(esJefeOmas?[{id:"oportunidades",label:"💼 Ops ("+opsSemana.length+")"}]:[{id:"muestras",label:"📦 Muestras ("+muesSemana.length+")"}]),
    {id:"evolucion", label:"📈 Evolución"},
  ];

  const RES_COLORS={pedido:T.green,seguimiento:T.amber,primera_visita:T.blue,no_contesta:"#E2E8F0",sin_contacto:"#E2E8F0"};
  const RES_LABEL ={pedido:"Pedido",seguimiento:"Seguim.",primera_visita:"1ª visita",no_contesta:"No contesta",sin_contacto:"Sin contacto"};

  // Donut SVG
  const DonutChart=({data,total,label})=>{
    const r=52,circ=2*Math.PI*r,cx=64,cy=64;
    let offset=0;
    return(
      <svg width={128} height={128} viewBox="0 0 128 128">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F1F5F9" strokeWidth={14}/>
        {data.map(({pct,color},i)=>{
          const dash=circ*pct/100;
          const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={14}
            strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={-offset*circ/100}
            strokeLinecap="butt" style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%"}}/>;
          offset+=pct; return el;
        })}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="22" fontWeight="800" fill="#0F172A">{total}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fontSize="11" fill="#94A3B8">{label}</text>
      </svg>
    );
  };

  const agentesActivos=[...new Set(visSemana.map(v=>v.agente||v.agenteId).filter(Boolean))].length;

  if(cargando) return <div style={{padding:40,textAlign:"center",color:T.muted}}>⏳ Cargando historial…</div>;

  return(
    <div style={{padding:"16px",paddingBottom:100}}>

      {/* Selector de semana con estado de informe */}
      {(()=>{
        return(
        <div style={{background:"#fff",border:"1.5px solid "+estadoColor+"30",borderRadius:14,padding:"12px 16px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setSemana(s=>Math.max(1,s-1))}
              style={{width:36,height:36,borderRadius:9,border:"1.5px solid "+T.border,
                background:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <p style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:T.text}}>Semana {semana}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>
                {"~"+semanaLabel(semana)+" · 2026"}
                {semana===SEMANA_ACTUAL&&<span style={{color:T.blue,fontWeight:600}}> · En curso</span>}
              </p>
            </div>
            <button onClick={()=>setSemana(s=>Math.min(SEMANA_ACTUAL,s+1))}
              style={{width:36,height:36,borderRadius:9,border:"1.5px solid "+T.border,
                background:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>›</button>
          </div>
          <div style={{marginTop:10,padding:"8px 12px",borderRadius:9,background:estadoColor+"12",
            display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{estadoIcon}</span>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:12,fontWeight:600,color:estadoColor}}>{estadoLabel}</p>
              {esJefeOmas&&agentesConInforme.size>0&&(
                <p style={{margin:"2px 0 0",fontSize:10,color:T.muted}}>
                  {[...agentesConInforme].map(id=>USUARIOS.find(u=>u.id===id)?.nombre||id).join(" · ")}
                </p>
              )}
              {esJefeOmas&&agentesConInforme.size<agentesTotales&&alguoEnvio&&(
                <p style={{margin:"2px 0 0",fontSize:10,color:T.red}}>
                  {"Pendientes: "+USUARIOS.filter(u=>u.rol==="agente"&&(esJefe?u.equipo===miEquipo:true)&&
                    (equipoSel==="todos"?true:u.equipo===equipoSel)&&!agentesConInforme.has(u.id))
                    .map(u=>u.nombre).join(", ")}
                </p>
              )}
            </div>
            {esJefeOmas&&agentesTotales>1&&(
              <div style={{width:44,height:44,flexShrink:0,position:"relative"}}>
                <svg viewBox="0 0 44 44" style={{width:44,height:44,transform:"rotate(-90deg)"}}>
                  <circle cx="22" cy="22" r="16" fill="none" stroke={T.border} strokeWidth="5"/>
                  <circle cx="22" cy="22" r="16" fill="none" stroke={estadoColor} strokeWidth="5"
                    strokeDasharray={2*Math.PI*16*Math.min(agentesConInforme.size/agentesTotales,1)+" "+2*Math.PI*16}/>
                </svg>
                <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
                  fontSize:10,fontWeight:800,color:estadoColor}}>
                  {Math.round(agentesConInforme.size/agentesTotales*100)+"%"}
                </span>
              </div>
            )}
          </div>
        </div>
        );
      })()}

      {/* KPI cards */}
      {(()=>{
        const kpis=esJefeOmas?[
          {n:visSemana.length,    l:"Visitas",       c:T.blue,  sub:agentesActivos+" agentes"},
          {n:opsSemana.length,    l:"Oportunidades", c:T.purple,sub:"abiertas"},
          {n:visSemana.filter(v=>v.resultado==="pedido"||v.resultado==="seguimiento").length,
           l:"Con seguim.",c:T.green,sub:"esta semana"},
        ]:[
          {n:visSemana.length,    l:"Visitas",       c:T.blue, sub:visSemana.filter(v=>v.resultado==="pedido").length+" pedidos"},
          {n:muesSemana.length,   l:"Muestras",      c:T.amber,sub:"enviadas"},
          {n:opsSemana.length,    l:"Ops abiertas",  c:T.purple,sub:"pipeline"},
        ];
        return(
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            {kpis.map(k=>(
              <div key={k.l} style={{background:"#fff",border:"1px solid "+T.border,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
                <p style={{margin:"0 0 2px",fontSize:20,fontWeight:800,color:k.c}}>{k.n}</p>
                <p style={{margin:"0 0 1px",fontSize:10,color:T.muted}}>{k.l}</p>
                <p style={{margin:0,fontSize:9,color:T.muted}}>{k.sub}</p>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Filtro equipo + tarjetas agente (solo managers) */}
      {esJefeOmas&&(
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[{k:"todos",l:"🌐 Todos",c:"#0F1E2E"},{k:"WIKUK",l:"🟢 WIKUK",c:T.green},{k:"INTERKEY",l:"🟡 INTERKEY",c:T.amber}]
              .filter(e=>esJefe?e.k==="todos"||e.k===miEquipo:true)
              .map(e=>{
                const eqV=visSemanaTodas.filter(v=>e.k==="todos"?true:USUARIOS.find(u=>u.id===(v.agente||v.agenteId))?.equipo===e.k);
                const sel=equipoSel===e.k;
                return(
                  <button key={e.k} onClick={()=>{setEquipoSel(e.k);setAgenteSel(null);}}
                    style={{flex:1,padding:"7px 10px",borderRadius:10,cursor:"pointer",
                      border:"2px solid "+(sel?e.c:T.border),background:sel?e.c+"12":"#fff"}}>
                    <span style={{fontSize:12,fontWeight:700,color:sel?e.c:T.text,display:"block"}}>{e.l}</span>
                    <span style={{fontSize:10,color:sel?e.c:T.muted}}>{eqV.length}v</span>
                  </button>
                );
              })
            }
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {USUARIOS.filter(u=>u.rol==="agente"&&(esJefe?u.equipo===miEquipo:true)&&
              (equipoSel==="todos"?true:u.equipo===equipoSel)).map(ag=>{
              const agV=visSemanaTodas.filter(v=>(v.agente||v.agenteId)===ag.id||(ag.grupoAgente&&v.agente===ag.grupoAgente));
              const agO=opsSemanaTodas.filter(o=>(o.agente||o.agenteId)===ag.id);
              const ped=agV.filter(v=>v.resultado==="pedido").length;
              const seg=agV.filter(v=>["seguimiento","primera_visita"].includes(v.resultado)).length;
              const sel=agenteSel===ag.id;
              return(
                <div key={ag.id} onClick={()=>setAgenteSel(sel?null:ag.id)}
                  style={{background:"#fff",borderRadius:14,padding:12,cursor:"pointer",
                    border:"2px solid "+(sel?ag.color:T.border),opacity:agV.length>0?1:0.45}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:32,height:32,borderRadius:8,background:ag.color+"20",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{ag.icon||"🧑‍💼"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:12,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ag.nombre}</p>
                      <p style={{margin:0,fontSize:10,color:T.muted}}>{ag.equipo}</p>
                    </div>
                    {sel&&<span style={{color:ag.color,fontWeight:800}}>✓</span>}
                  </div>
                  {agV.length>0?(
                    <>
                      <div style={{display:"flex",gap:4,marginBottom:6}}>
                        {[{n:agV.length,l:"vis",c:T.blue},{n:ped,l:"ped",c:T.green},{n:agO.length,l:"ops",c:T.purple}].map(m=>(
                          <div key={m.l} style={{flex:1,textAlign:"center",background:"#F8FAFC",borderRadius:6,padding:"4px 2px"}}>
                            <p style={{margin:0,fontSize:14,fontWeight:800,color:m.c}}>{m.n}</p>
                            <p style={{margin:0,fontSize:8,color:T.muted}}>{m.l}</p>
                          </div>
                        ))}
                      </div>
                      {agV.length>0&&(
                        <div style={{height:5,borderRadius:99,overflow:"hidden",display:"flex",gap:1}}>
                          {ped>0&&<div style={{flex:ped,background:T.green}}/>}
                          {seg>0&&<div style={{flex:seg,background:T.amber}}/>}
                          {(agV.length-ped-seg)>0&&<div style={{flex:agV.length-ped-seg,background:"#E2E8F0"}}/>}
                        </div>
                      )}
                    </>
                  ):(
                    <p style={{margin:0,fontSize:11,color:T.muted,textAlign:"center"}}>Sin actividad</p>
                  )}
                </div>
              );
            })}
          </div>
          {agenteSel&&(()=>{
            const ag=USUARIOS.find(u=>u.id===agenteSel);
            return ag?(
              <div style={{marginTop:10,padding:"8px 14px",background:ag.color+"12",borderRadius:10,
                display:"flex",alignItems:"center",gap:8,border:"1.5px solid "+ag.color+"40"}}>
                <span style={{fontSize:16}}>{ag.icon}</span>
                <p style={{margin:0,fontSize:13,fontWeight:600,color:ag.color}}>Viendo solo: {ag.nombre}</p>
                <button onClick={()=>setAgenteSel(null)} style={{marginLeft:"auto",background:"none",border:"none",fontSize:18,cursor:"pointer",color:T.muted}}>×</button>
              </div>
            ):null;
          })()}
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTabSel(t.id)}
            style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid "+(tabSel===t.id?T.navy:T.border),
              background:tabSel===t.id?T.navy:"#fff",color:tabSel===t.id?"#fff":T.muted,
              fontSize:12,fontWeight:tabSel===t.id?700:400,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab: Resumen */}
      {tabSel==="resumen"&&(
        <div>
          {visSemana.length>0?(
            <div style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid "+T.border,marginBottom:12}}>
              <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:T.text}}>Visitas por resultado</p>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                {(()=>{
                  const groups={};
                  visSemana.forEach(v=>{const r=v.resultado||"sin_contacto";groups[r]=(groups[r]||0)+1;});
                  const data=Object.entries(groups).map(([r,n])=>({r,n,pct:Math.round(n/visSemana.length*100),color:RES_COLORS[r]||T.muted}));
                  return(<>
                    <DonutChart data={data} total={visSemana.length} label="visitas"/>
                    <div style={{flex:1}}>
                      {data.map(d=>(
                        <div key={d.r} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <div style={{width:10,height:10,borderRadius:2,background:d.color,flexShrink:0}}/>
                          <span style={{fontSize:11,color:T.muted,flex:1}}>{RES_LABEL[d.r]||d.r}</span>
                          <span style={{fontSize:11,fontWeight:700,color:T.text}}>{d.n}</span>
                        </div>
                      ))}
                    </div>
                  </>);
                })()}
              </div>
            </div>
          ):(
            <div style={{textAlign:"center",padding:"40px 0",color:T.muted}}>
              <p style={{fontSize:32,margin:"0 0 8px"}}>📊</p>
              <p>Sin actividad registrada esta semana</p>
            </div>
          )}
        </div>
      )}

      {/* Tab: Visitas */}
      {tabSel==="visitas"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {visSemana.length===0&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin visitas esta semana</div>}
          {visSemana.map((v,i)=>{
            const ag=esJefeOmas?USUARIOS.find(u=>u.id===(v.agente||v.agenteId)||u.grupoAgente===(v.agente||"")):null;
            const rc=RES_COLORS[v.resultado]||T.muted;
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",
                border:"1px solid "+T.border,borderLeft:"4px solid "+rc}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{v.clienteNombre||v.empresa||"—"}</p>
                    <p style={{margin:"0 0 4px",fontSize:11,color:T.muted}}>{v.ciudad||v.contacto||""}</p>
                    {v.nota&&<p style={{margin:0,fontSize:11,color:"#475569",lineHeight:1.5}}>{v.nota}</p>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:700,color:rc,background:rc+"18",borderRadius:6,padding:"2px 8px",display:"block",marginBottom:4}}>
                      {RES_LABEL[v.resultado]||v.resultado||"—"}
                    </span>
                    {ag&&<span style={{fontSize:10,color:ag.color,fontWeight:600}}>{ag.nombre}</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Tab: Oportunidades (managers) */}
      {tabSel==="oportunidades"&&esJefeOmas&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {opsSemana.length===0&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin oportunidades esta semana</div>}
          {opsSemana.map((o,i)=>{
            const ag=USUARIOS.find(u=>u.id===(o.agenteId||o.agente)||u.grupoAgente===(o.agenteId||o.agente||""));
            return(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid "+T.border}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{o.nombre||o.cliente||"—"}</p>
                    <p style={{margin:0,fontSize:11,color:T.muted}}>{o.ciudad||""}</p>
                  </div>
                  {ag&&<span style={{fontSize:10,fontWeight:700,color:ag.color,background:ag.color+"18",
                    borderRadius:99,padding:"2px 8px"}}>{ag.nombre}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Tab: Muestras (agente) */}
      {tabSel==="muestras"&&!esJefeOmas&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {muesSemana.length===0&&<div style={{textAlign:"center",padding:32,color:T.muted}}>Sin muestras esta semana</div>}
          {muesSemana.map((m,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid "+T.border}}>
              <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{m.empresa||m.cliente||"—"}</p>
              <p style={{margin:0,fontSize:11,color:T.muted}}>{m.producto||""}</p>
            </div>
          ))}
        </div>
      )}

      {/* Tab: Evolución — barras SVG por semana */}
      {tabSel==="evolucion"&&(
        <div style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid "+T.border}}>
          <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:T.text}}>Visitas últimas 8 semanas</p>
          {(()=>{
            const semanas=Array.from({length:8},(_,i)=>semana-7+i).filter(s=>s>0);
            const data=semanas.map(s=>({s,n:visitas.filter(v=>Number(v.semana)===s).length}));
            const maxN=Math.max(...data.map(d=>d.n),1);
            const barH=80;
            return(
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:barH+30}}>
                {data.map(d=>{
                  const h=d.n>0?Math.max(d.n/maxN*barH,8):4;
                  const isCurrent=d.s===semana;
                  return(
                    <div key={d.s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      {d.n>0&&<span style={{fontSize:10,fontWeight:700,color:isCurrent?T.navy:T.muted}}>{d.n}</span>}
                      <div style={{width:"100%",height:h,borderRadius:4,
                        background:isCurrent?T.navy:d.n>0?T.blue+"60":T.border}}/>
                      <span style={{fontSize:9,color:T.muted}}>S{d.s}</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ASISTENTE IA — Managed Agents (se restaurará en siguiente paso)
// ══════════════════════════════════════════════════════════════════
function AsistenteIA({ usuario, clientesFB, oportunidadesDB }) {
  const [apiKey,   setApiKey]   = React.useState(()=>sessionStorage.getItem("ant_key")||"");
  const [conectado,setConectado]= React.useState(()=>!!sessionStorage.getItem("ant_key"));
  const [msgs,     setMsgs]     = React.useState([]);
  const [input,    setInput]    = React.useState("");
  const [cargando, setCargando] = React.useState(false);
  const endRef = React.useRef(null);

  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const conectar = () => {
    if(!apiKey.trim().startsWith("sk-ant")) return alert("Clave inválida — debe empezar por sk-ant");
    sessionStorage.setItem("ant_key", apiKey.trim());
    setConectado(true);
  };

  const contextSistema = React.useMemo(()=>{
    const misOps = (oportunidadesDB||[]).filter(o=>
      o.agente===usuario.id||o.agenteId===usuario.id||
      ["director","ceo"].includes(usuario.rol)
    ).slice(0,20);
    const misClientes = (clientesFB||[]).slice(0,30);
    const opsStr = misOps.length>0
      ? "Oportunidades activas ("+misOps.length+"):\n"
        + misOps.map(o=>"- "+(o.nombre||o.cliente)+": "+(o.estado||o.etapa)+", "+(o.valor||"")+"€").join("\n")
      : "";
    const cliStr = misClientes.length>0
      ? "Clientes recientes ("+misClientes.length+"):\n"
        + misClientes.map(c=>"- "+(c.NOMBRE||c.nombre)).slice(0,15).join("\n")
      : "";
    return "Eres un asistente comercial experto para Grupo Consolidado (WIKUK + INTERKEY), empresa de ingredientes y tripas para la industria cárnica española.\n\n"
      + "Usuario: "+usuario.nombre+" | Rol: "+usuario.rol+" | Equipo: "+(usuario.equipo||"dirección")+"\n\n"
      + (opsStr ? opsStr+"\n\n" : "")
      + (cliStr ? cliStr+"\n\n" : "")
      + "Ayuda con: análisis de clientes, redactar emails comerciales, propuestas, estrategias de recuperación, preparar informes. Responde siempre en español, de forma concisa y práctica.";
  },[usuario,clientesFB,oportunidadesDB]);

  const enviar = async () => {
    if(!input.trim()||cargando) return;
    const userMsg = {role:"user", content:input.trim()};
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setInput("");
    setCargando(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": sessionStorage.getItem("ant_key"),
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true",
        },
        body: JSON.stringify({
          model:"claude-opus-4-5",
          max_tokens:1024,
          system: contextSistema,
          messages: newMsgs,
        })
      });
      const data = await r.json();
      if(data.error) throw new Error(data.error.message);
      const reply = data.content?.[0]?.text || "Sin respuesta";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    } catch(e) {
      setMsgs(p=>[...p,{role:"assistant",content:`❌ Error: ${e.message}`}]);
    }
    setCargando(false);
  };

  const desconectar = () => {
    sessionStorage.removeItem("ant_key");
    setConectado(false); setApiKey(""); setMsgs([]);
  };

  if(!conectado) return (
    <div style={{padding:"32px 20px",maxWidth:480,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:64,marginBottom:12}}>🤖</div>
        <p style={{margin:"0 0 6px",fontSize:22,fontWeight:900,color:"#0F172A"}}>Asistente IA</p>
        <p style={{margin:0,fontSize:13,color:"#64748B"}}>Powered by Claude · Anthropic</p>
      </div>
      <div style={{background:"#F0F9FF",borderRadius:12,padding:"14px 16px",marginBottom:20,fontSize:12,color:"#0369A1"}}>
        <p style={{margin:"0 0 6px",fontWeight:700}}>¿Qué puede hacer?</p>
        {"Consultar y analizar clientes · Redactar emails y propuestas · Sugerir estrategias · Preparar informes semanales".split(" · ").map(t=>(
          <p key={t} style={{margin:"3px 0"}}>• {t}</p>
        ))}
      </div>
      <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#0F172A"}}>API Key de Anthropic</p>
      <input
        type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
        placeholder="sk-ant-..." onKeyDown={e=>e.key==="Enter"&&conectar()}
        style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",
          fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12,fontFamily:"monospace"}}
      />
      <button onClick={conectar}
        style={{width:"100%",padding:"14px",background:"#0F172A",color:"#fff",border:"none",
          borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
        Conectar asistente →
      </button>
      <p style={{margin:"12px 0 0",fontSize:11,color:"#94A3B8",textAlign:"center"}}>
        La clave se guarda solo en este navegador (sessionStorage)
      </p>
    </div>
  );

  const SUGERENCIAS = [
    "¿Qué clientes llevan más de 3 meses sin comprar?",
    "Redacta un email de seguimiento para Guissona",
    "¿Cuáles son mis oportunidades más urgentes?",
    "Prepara un resumen de actividad de esta semana",
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)",padding:"0 0 0 0"}}>
      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #E2E8F0",display:"flex",
        alignItems:"center",gap:10,background:"#fff",flexShrink:0}}>
        <span style={{fontSize:24}}>🤖</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:"#0F172A"}}>Asistente IA</p>
          <p style={{margin:0,fontSize:11,color:"#22C55E"}}>● Conectado · Claude claude-sonnet-4-20250514</p>
        </div>
        <button onClick={desconectar}
          style={{fontSize:11,color:"#94A3B8",background:"none",border:"1px solid #E2E8F0",
            borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>
          Desconectar
        </button>
      </div>

      {/* Mensajes */}
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {msgs.length===0 && (
          <div>
            <p style={{textAlign:"center",color:"#94A3B8",fontSize:13,margin:"20px 0 16px"}}>
              Hola {usuario.nombre.split(" ")[0]}, ¿en qué puedo ayudarte?
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {SUGERENCIAS.map(s=>(
                <button key={s} onClick={()=>{setInput(s);}}
                  style={{padding:"10px 12px",borderRadius:10,border:"1.5px solid #E2E8F0",
                    background:"#fff",fontSize:11,color:"#475569",cursor:"pointer",
                    textAlign:"left",lineHeight:1.4}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,
              background:m.role==="user"?"#0F172A":"#F1F5F9",
              color:m.role==="user"?"#fff":"#0F172A",
              fontSize:13,lineHeight:1.6,
              borderBottomRightRadius:m.role==="user"?2:12,
              borderBottomLeftRadius:m.role==="assistant"?2:12,
              whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}
        {cargando&&(
          <div style={{display:"flex",gap:6,padding:"10px 14px",background:"#F1F5F9",
            borderRadius:12,width:"fit-content",alignItems:"center"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#94A3B8",
                animation:`bounce 1s ${i*0.2}s infinite`}}/>
            ))}
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"12px 16px",borderTop:"1px solid #E2E8F0",background:"#fff",
        display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&enviar()}
          placeholder="Escribe tu pregunta..."
          disabled={cargando}
          style={{flex:1,padding:"10px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",
            fontSize:13,outline:"none",fontFamily:"inherit"}}
        />
        <button onClick={enviar} disabled={cargando||!input.trim()}
          style={{padding:"10px 18px",background:cargando||!input.trim()?"#E2E8F0":"#0F172A",
            color:cargando||!input.trim()?"#94A3B8":"#fff",border:"none",
            borderRadius:10,fontSize:13,fontWeight:700,cursor:cargando?"not-allowed":"pointer"}}>
          {cargando?"...":"↑"}
        </button>
      </div>
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}`}</style>
    </div>
  );
}

// ── Montar la app ──────────────────────────────────────────────────
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);

(function(){
  // Buscar usuario del portal por 3 vías:
  // 1. URL hash: crm_grupo_consolidado.html#wk1
  // 2. localStorage gc_portal_user (compartido entre parent e iframe mismo dominio)
  // 3. postMessage del portal

  function buildUserFromPortal(pu){
    // Construir usuario CRM desde datos del portal
    if(!pu) return null;
    var crmId=pu.crmId||pu.id||pu.username;
    if(!crmId) return null;
    // Primero buscar en USUARIOS fijos
    var fixed=USUARIOS.find(function(u){return u.id===crmId;});
    if(fixed) return fixed;
    // Crear usuario dinámico
    var rol=pu.rol||'agente';
    if(rol==='crm_director'||rol==='director') rol='director';
    else if(rol==='crm_jefe'||rol==='jefe') rol='jefe';
    else rol='agente';
    return {
      id: crmId,
      nombre: pu.nombre||pu.username||crmId,
      rol: rol,
      equipo: pu.equipo||null,
      color: pu.color||'#64748B',
      icon: '🧑‍💼',
      catalogoVendedor: pu.catalogoVendedor||null
    };
  }

  function getAutoUser(){
    // Prioridad 1: localStorage del portal (más fiable — tiene todos los datos)
    try{
      var stored=localStorage.getItem('gc_portal_user');
      if(stored){
        var pu=JSON.parse(stored);
        var u=buildUserFromPortal(pu);
        if(u) return u;
      }
    }catch(e){}

    // Prioridad 2: URL hash — formato #crmId o #crmId|vendedor
    try{
      var hash=window.location.hash.replace('#','');
      if(hash){
        var decoded=decodeURIComponent(hash);
        var crmId=decoded.includes('|')?decoded.split('|')[0].trim():decoded.trim();
        var found=USUARIOS.find(function(u){return u.id===crmId;});
        if(found) return found;
      }
    }catch(e){}

    return null;
  }

  var autoUser=getAutoUser();
  root.render(React.createElement(App,{_autoLogin:autoUser||null}));

  // Vía 3: postMessage (por si las otras fallan — el portal lo envía al cargar)
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='PORTAL_USER'){
      var pu=e.data.user;
      var crmUser=buildUserFromPortal(pu);
      if(crmUser){
        root.render(React.createElement(App,{_autoLogin:crmUser}));
      }
    }
  });
})();
  </script>
</body>
