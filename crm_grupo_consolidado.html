            const f=e.target.files[0];
            if(f){const r=new FileReader();r.onload=ev=>setForm(fn=>({...fn,tarjeta:ev.target.result}));r.readAsDataURL(f);}
          }}/>
      </div>

      {/* Campos */}
      {[
        {k:"nombre",   label:"Nombre empresa *",   ph:"Cárnicas Bernal SL"},
        {k:"contacto", label:"Persona de contacto", ph:"José García"},
        {k:"telefono", label:"Teléfono",            ph:"+34 612 345 678"},
        {k:"email",    label:"Email",               ph:"contacto@empresa.com"},
        {k:"poblacion",label:"Población / Ciudad",  ph:"Córdoba"},
        {k:"empresa",  label:"Razón social",        ph:"Cárnicas Bernal SL"},
      ].map(f=>(
        <div key={f.k} style={{marginBottom:12}}>
          <p style={{margin:"0 0 5px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{f.label}</p>
          <input value={form[f.k]} onChange={e=>setForm(fn=>({...fn,[f.k]:e.target.value}))}
            placeholder={f.ph} style={ISt}/>
        </div>
      ))}

      <button onClick={()=>onGuardar(form)} disabled={!form.nombre.trim()}
        style={{width:"100%",padding:"14px",borderRadius:12,border:"none",marginTop:8,
          background:form.nombre.trim()?T.navy:"#CBD5E1",
          color:"#fff",fontWeight:700,fontSize:15,
          cursor:form.nombre.trim()?"pointer":"default"}}>
        Guardar y registrar visita →
      </button>
    </div>
  );
}

// Componente fila cliente con nota y histórico
function ClienteRow({nombre,visita,ops,onSave}){
  const [open,setOpen]=useState(false);
  const [nota,setNota]=useState(visita?.nota||"");
  const [resultado,setResultado]=useState(visita?.resultado||"");

  const op=ops.find(o=>o.k===resultado);
  const hist=visita?.historial||[];

  const guardar=()=>{
    if(!resultado) return;
    onSave({resultado,nota,fecha:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"})});
    setOpen(false);
  };

  return(
    <Card style={{marginBottom:10,padding:0,overflow:"hidden"}}>
      {/* Cabecera */}
      <div onClick={()=>setOpen(!open)}
        style={{padding:"14px 16px",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
        <div style={{width:40,height:40,borderRadius:10,
          background:op?op.color+"15":T.bg,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏪</div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text,
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nombre}</p>
          <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
            {op?<Badge label={op.label} color={op.color}/>
            :<span style={{fontSize:11,color:T.muted}}>Sin marcar</span>}
            {visita?.nota&&<span style={{fontSize:10,color:T.muted,fontStyle:"italic",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>
              · {visita.nota}
            </span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {hist.length>0&&(
            <span style={{fontSize:10,fontWeight:700,color:T.blue,
              background:T.blueL,borderRadius:99,padding:"2px 7px"}}>{hist.length}</span>
          )}
          <span style={{fontSize:18,color:T.muted,display:"inline-block",
            transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .2s"}}>›</span>
        </div>
      </div>

      {open&&(
        <div style={{borderTop:`1px solid ${T.border}`,padding:"14px 16px 16px"}}>

          {/* Selección resultado */}
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            Resultado de la visita
          </p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
            {ops.map(o=>(
              <button key={o.k} onClick={()=>setResultado(o.k)}
                style={{padding:"10px",borderRadius:10,
                  border:`2px solid ${resultado===o.k?o.color:T.border}`,
                  background:resultado===o.k?o.color+"15":"#fff",
                  color:resultado===o.k?o.color:T.text,
                  fontSize:12,fontWeight:resultado===o.k?700:400,cursor:"pointer",textAlign:"center"}}>
                {o.label}
              </button>
            ))}
          </div>

          {/* Nota */}
          <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
            Nota / comentario
          </p>
          <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={2}
            placeholder="¿Qué ha pasado? ¿Próximos pasos? ¿Interés en productos?…"
            style={{width:"100%",border:`1.5px solid ${nota?T.blue:T.border}`,borderRadius:10,
              padding:"10px 12px",fontSize:13,resize:"none",outline:"none",
              boxSizing:"border-box",lineHeight:1.5,fontFamily:"inherit",
              marginBottom:10}}/>

          <button onClick={guardar} disabled={!resultado}
            style={{width:"100%",padding:"12px",borderRadius:11,border:"none",
              background:resultado?T.navy:"#CBD5E1",color:"#fff",
              fontWeight:700,fontSize:13,cursor:resultado?"pointer":"default"}}>
            {resultado?"✓ Guardar visita":"Selecciona el resultado primero"}
          </button>

          {/* Histórico de visitas anteriores */}
          {hist.length>0&&(
            <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                🕐 Historial ({hist.length} visita{hist.length!==1?"s":""})
              </p>
              {hist.map((h,i)=>{
                const hop=ops.find(o=>o.k===h.resultado);
                return(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                    <div style={{width:28,height:28,borderRadius:8,background:hop?hop.color+"15":T.bg,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,flexShrink:0}}>{hop?.label?.split(" ")[0]||"📌"}</div>
                    <div style={{flex:1}}>
                      {hop&&<Badge label={hop.label} color={hop.color}/>}
                      {h.nota&&<p style={{margin:"3px 0 0",fontSize:12,color:T.text,lineHeight:1.4}}>{h.nota}</p>}
                      <p style={{margin:"3px 0 0",fontSize:10,color:T.muted}}>{h.fecha}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

function Informe({usuario}){
  const clientes=CLIENTES_POR_AGENTE[usuario.id]||[];
  const semana=14;
  const [step,setStep]=useState(0);
  const [ventas,setVentas]=useState({venta:"",mb:"",promo:"",liq:""});
  const [visitas,setVisitas]=useState({});
  const [muestras,setMuestras]=useState([]);
  const [enviado,setEnviado]=useState(false);

  // Ruta seleccionada y cliente seleccionado
  const [rutaSel,setRutaSel]=useState(null);
  const [clienteSel,setClienteSel]=useState(null);
  const [formV,setFormV]=useState({resultado:"pedido",notas:""});
  const [showNuevo,setShowNuevo]=useState(false);
  const [nuevosCreados,setNuevosCreados]=useState([]);
  const fotoRef=React.useRef();

  const guardarNuevo=(formData)=>{
    if(!formData.nombre.trim()) return;
    const nuevoC={
      id:`NUEVO-${Date.now()}`,
      nombre:formData.nombre.trim(),
      contacto:formData.contacto,
      telefono:formData.telefono,
      email:formData.email,
      poblacion:formData.poblacion,
      empresa:formData.empresa,
      ruta:rutaSel,
      agente:usuario.id,
      equipo:usuario.equipo||"",
      fechaAlta:new Date().toLocaleDateString("es-ES"),
      semana,
      esNuevo:true
    };
    fbEscribir("clientes", nuevoC.id, nuevoC);
    setNuevosCreados(p=>[...p,nuevoC]);
    setClienteSel(nuevoC);
    setFormV({resultado:"primera_visita",notas:""});
    setShowNuevo(false);
  };

  const RESULTADOS=[
    {k:"pedido",           label:"✅ Pedido",          color:T.green},
    {k:"llamada",          label:"📞 Llamada",          color:T.blue},
    {k:"visita_sin_pedido",label:"👋 Visita s/pedido",  color:T.amber},
    {k:"no_contesta",      label:"📵 No contesta",      color:T.muted},
    {k:"primera_visita",   label:"🆕 Primera visita",   color:T.purple},
  ];

  const PASOS=[
    {id:"ventas",      icon:"💰",label:"Ventas"},
    {id:"visitas",     icon:"👥",label:"Visitas"},
    {id:"recuperacion",icon:"🎯",label:"Recuperac."},
    {id:"muestras",    icon:"📦",label:"Muestras"},
    {id:"resumen",     icon:"📤",label:"Enviar"},
  ];

  const [avances,setAvances]=useState({}); // {[estrategiaId]: {resultado, nota}}
  const misEstrategias=ESTRATEGIAS_SEED.filter(e=>e.agente===usuario.id&&e.estado==="en_curso");

  const rutasDisp=[...new Set(clientes.map(c=>c.ruta||0).filter(r=>r>0))].sort((a,b)=>a-b);
  const visitasDone=Object.keys(visitas).length;
  const ventasOk=ventas.venta&&ventas.mb;

  const guardarVisita=()=>{
    if(!clienteSel||!formV.resultado) return;
    const fecha=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"});
    const visitaDoc={
      clienteId:clienteSel.id,
      clienteNombre:clienteSel.nombre,
      resultado:formV.resultado,
      notas:formV.notas,
      fecha,
      semana,
      agente:usuario.id,
      equipo:usuario.equipo||"",
    };
    // Guardar visita en Firebase
    fbEscribir("visitas", `${usuario.id}_${clienteSel.id}_sem${semana}`, visitaDoc);

    setVisitas(prev=>{
      const existing=prev[clienteSel.id];
      const historial=existing
        ?[...(existing.historial||[]),{resultado:existing.resultado,notas:existing.notas||"",fecha:existing.fecha}]
        :[];
      return{...prev,[clienteSel.id]:{clienteNombre:clienteSel.nombre,resultado:formV.resultado,notas:formV.notas,fecha,historial}};
    });
    setFormV({resultado:"pedido",notas:""});
    setClienteSel(null);
  };

  if(enviado){
    return(
      <div style={{padding:"40px 24px",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:16}}>🎉</div>
        <p style={{margin:"0 0 8px",fontSize:22,fontWeight:900,color:T.text}}>¡Informe enviado!</p>
        <p style={{margin:"0 0 24px",fontSize:14,color:T.muted}}>Semana 14 registrada correctamente</p>
        <Card style={{textAlign:"left",marginBottom:16}}>
          {[
            {icon:"💰",label:"Ventas",v:`${fmt(parseInt(ventas.venta)||0)}€`},
            {icon:"📊",label:"MB",v:`${ventas.mb||0}%`},
            {icon:"👥",label:"Visitas",v:`${visitasDone}/${clientes.length}`},
            {icon:"📦",label:"Muestras",v:`${muestras.reduce((s,m)=>s+(parseInt(m.uds)||0),0)} uds`},
          ].map(r=>(
            <div key={r.label} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:13,color:T.muted}}>{r.icon} {r.label}</span>
              <span style={{fontSize:13,fontWeight:700,color:T.text}}>{r.v}</span>
            </div>
          ))}
        </Card>
        <Btn full onClick={()=>{setEnviado(false);setStep(0);setVentas({venta:"",mb:"",promo:"",liq:""});setVisitas({});setMuestras([]);setRutaSel(null);setClienteSel(null);}} color={T.navy}>
          Nuevo informe
        </Btn>
      </div>
    );
  }

  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Stepper */}
      <div style={{display:"flex",gap:4,marginBottom:24}}>
        {PASOS.map((p,i)=>{
          const done=i<step,active=i===step;
          return(
            <button key={p.id} onClick={()=>setStep(i)}
              style={{flex:1,padding:"10px 4px",borderRadius:12,border:`1px solid ${active?usuario.color:done?T.green:T.border}`,
                background:active?usuario.color:done?T.greenL:T.white,
                cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                boxShadow:"0 1px 3px #0001"}}>
              <span style={{fontSize:18}}>{done?"✅":p.icon}</span>
              <span style={{fontSize:9,fontWeight:700,color:active?"#fff":done?T.greenD:T.muted}}>{p.label}</span>
            </button>
          );
        })}
      </div>

      {/* PASO 0 — Ventas */}
      {step===0&&(
        <div>
          <p style={{margin:"0 0 20px",fontSize:17,fontWeight:800,color:T.text}}>💰 ¿Cuánto has vendido esta semana?</p>
          {[
            {k:"venta",label:"Ventas totales",icon:"💰",placeholder:"ej: 24500",sufijo:"€"},
            {k:"mb",label:"Margen bruto (MB%)",icon:"📊",placeholder:"ej: 34",sufijo:"%"},
            {k:"promo",label:"Ventas promo",icon:"🎯",placeholder:"ej: 1200",sufijo:"€"},
            {k:"liq",label:"Liquidación",icon:"📋",placeholder:"ej: 800",sufijo:"€"},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{f.icon} {f.label}</p>
              <div style={{position:"relative"}}>
                <input type="number" value={ventas[f.k]} onChange={e=>setVentas(v=>({...v,[f.k]:e.target.value}))}
                  placeholder={f.placeholder}
                  style={{width:"100%",border:`1.5px solid ${ventas[f.k]?T.blue:T.border}`,borderRadius:11,
                    padding:"13px 40px 13px 14px",fontSize:15,outline:"none",boxSizing:"border-box"}}/>
                <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
                  fontSize:13,fontWeight:700,color:T.muted}}>{f.sufijo}</span>
              </div>
            </div>
          ))}
          <Btn full onClick={()=>setStep(1)} color={usuario.color} disabled={!ventasOk}>
            Siguiente → Visitas
          </Btn>
        </div>
      )}

      {/* PASO 1 — Visitas con flujo de ruta */}
      {step===1&&(()=>{
        // Sub-pantalla: detalle de visita a cliente
        if(clienteSel){
          const vExist=visitas[clienteSel.id];
          const hist=vExist?.historial||[];
          return(
            <div>
              <BackBar label={`Ruta ${rutaSel}`} onBack={()=>setClienteSel(null)}/>
              {/* Ficha cliente */}
              <Card style={{marginBottom:16}}>
                <p style={{margin:"0 0 4px",fontSize:16,fontWeight:800,color:T.text}}>{clienteSel.nombre}</p>
                {clienteSel.tel&&<p style={{margin:"0 0 2px",fontSize:12,color:T.muted}}>📞 {clienteSel.tel}</p>}
                {clienteSel.dir&&<p style={{margin:0,fontSize:12,color:T.muted}}>📍 {clienteSel.dir}</p>}
                {vExist&&(
                  <div style={{marginTop:8,display:"inline-flex",gap:6,padding:"4px 10px",
                    background:T.greenL,borderRadius:6,fontSize:11,color:T.green,fontWeight:700}}>
                    ✓ Ya registrado esta semana
                  </div>
                )}
              </Card>
              {/* Resultado */}
              <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Resultado de la visita</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
                {RESULTADOS.map(r=>(
                  <button key={r.k} onClick={()=>setFormV(f=>({...f,resultado:r.k}))}
                    style={{padding:"9px 14px",borderRadius:10,
                      border:`2px solid ${formV.resultado===r.k?r.color:T.border}`,
                      background:formV.resultado===r.k?r.color+"15":"transparent",
                      color:formV.resultado===r.k?r.color:T.muted,
                      fontWeight:formV.resultado===r.k?700:400,fontSize:12,cursor:"pointer"}}>
                    {r.label}
                  </button>
                ))}
              </div>
              {/* Notas */}
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Notas</p>
              <textarea value={formV.notas} onChange={e=>setFormV(f=>({...f,notas:e.target.value}))} rows={3}
                placeholder="Qué se habló, próximos pasos, interés en productos…"
                style={{width:"100%",border:`1.5px solid ${formV.notas?T.blue:T.border}`,borderRadius:10,
                  padding:"12px",fontSize:13,resize:"none",outline:"none",
                  boxSizing:"border-box",lineHeight:1.5,fontFamily:"inherit",marginBottom:16}}/>
              <button onClick={guardarVisita}
                style={{width:"100%",padding:"14px",borderRadius:12,border:"none",
                  background:T.navy,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:16}}>
                Guardar visita →
              </button>
              {/* Histórico */}
              {hist.length>0&&(
                <div>
                  <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                    🕐 Historial ({hist.length} visita{hist.length!==1?"s":""})
                  </p>
                  {hist.map((h,i)=>{
                    const hr=RESULTADOS.find(r=>r.k===h.resultado);
                    return(
                      <Card key={i} style={{marginBottom:8,padding:"12px 14px"}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:h.notas?4:0}}>
                          {hr&&<Badge label={hr.label} color={hr.color}/>}
                          <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>{h.fecha}</span>
                        </div>
                        {h.notas&&<p style={{margin:0,fontSize:12,color:T.text,lineHeight:1.5}}>{h.notas}</p>}
                      </Card>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }

        // Sub-pantalla: lista de clientes de la ruta seleccionada
        if(rutaSel!==null){
          const clientesRuta=clientes.filter(c=>c.ruta===rutaSel);
          const nuevosDeRuta=nuevosCreados.filter(c=>c.ruta===rutaSel);

          // ── Pantalla: nuevo cliente ──────────────────────────────
          if(showNuevo){
            return(
              <NuevoClienteForm
                ruta={rutaSel}
                onBack={()=>setShowNuevo(false)}
                onGuardar={guardarNuevo}
              />
            );
          }

          return(
            <div>
              <BackBar label="Cambiar ruta" onBack={()=>setRutaSel(null)}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div>
                  <p style={{margin:0,fontSize:17,fontWeight:800,color:T.text}}>Ruta {rutaSel}</p>
                  <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
                    {clientesRuta.length+nuevosDeRuta.length} clientes · {[...clientesRuta,...nuevosDeRuta].filter(c=>visitas[c.id]).length} visitados
                  </p>
                </div>
                <div style={{background:T.greenL,borderRadius:99,padding:"5px 14px"}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.green}}>
                    {[...clientesRuta,...nuevosDeRuta].filter(c=>visitas[c.id]).length}/{clientesRuta.length+nuevosDeRuta.length}
                  </span>
                </div>
              </div>

              {/* Clientes de la ruta */}
              {[...clientesRuta,...nuevosDeRuta].map(c=>{
                const v=visitas[c.id];
                const rOp=RESULTADOS.find(r=>r.k===v?.resultado);
                return(
                  <Card key={c.id} onClick={()=>{setClienteSel(c);setFormV({resultado:"pedido",notas:""}); }}
                    style={{marginBottom:8,padding:"13px 16px",cursor:"pointer",
                      borderLeft:`4px solid ${rOp?rOp.color:T.border}`}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                          <p style={{margin:0,fontSize:13,fontWeight:700,color:T.text,
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                          {c.esNuevo&&<span style={{fontSize:9,fontWeight:700,color:T.purple,
                            background:T.purpleL,borderRadius:99,padding:"1px 7px",flexShrink:0}}>NUEVO</span>}
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                          {rOp?<Badge label={rOp.label} color={rOp.color}/>
                          :<span style={{fontSize:11,color:T.muted}}>Sin registrar</span>}
                          {v?.notas&&<span style={{fontSize:10,color:T.muted,fontStyle:"italic",
                            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>
                            · {v.notas}
                          </span>}
                        </div>
                      </div>
                      {(v?.historial?.length||0)>0&&(
                        <span style={{fontSize:10,fontWeight:700,color:T.blue,
                          background:T.blueL,borderRadius:99,padding:"2px 7px",flexShrink:0}}>
                          {v.historial.length} prev.
                        </span>
                      )}
                      <span style={{color:T.muted,fontSize:18}}>›</span>
                    </div>
                  </Card>
                );
              })}

              {/* Botón nuevo cliente */}
              <button onClick={()=>setShowNuevo(true)}
                style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:16,marginTop:4,
                  border:`2px dashed ${T.purple}`,background:T.purpleL,
                  color:T.purple,fontWeight:700,fontSize:13,cursor:"pointer",
                  display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:18}}>🆕</span> Añadir cliente nuevo
              </button>

              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>setRutaSel(null)} outline color={T.navy}>← Rutas</Btn>
                <Btn full onClick={()=>setStep(2)} color={usuario.color}>Siguiente → Recuperación</Btn>
              </div>
            </div>
          );
        }

        // Pantalla principal: selección de ruta
        return(
          <div>
            <p style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:T.text}}>👥 ¿Qué ruta haces hoy?</p>
            <p style={{margin:"0 0 18px",fontSize:12,color:T.muted}}>Selecciona la ruta para ver tus clientes</p>
            {rutasDisp.map(r=>{
              const cli=clientes.filter(c=>c.ruta===r);
              const visitados=cli.filter(c=>visitas[c.id]).length;
              return(
                <div key={r} onClick={()=>setRutaSel(r)}
                  style={{background:T.white,borderRadius:14,border:`1px solid ${T.border}`,
                    padding:"18px 20px",marginBottom:10,cursor:"pointer",
                    display:"flex",alignItems:"center",gap:16,
                    boxShadow:"0 1px 4px #0001"}}>
                  <div style={{width:48,height:48,borderRadius:12,background:T.navy,
                    color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:22,fontWeight:900,flexShrink:0}}>{r}</div>
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 3px",fontSize:15,fontWeight:700,color:T.text}}>Ruta {r}</p>
                    <p style={{margin:0,fontSize:12,color:T.muted}}>
                      {cli.length} clientes{visitados>0?` · ${visitados} visitados`:""}
                    </p>
                  </div>
                  {visitados>0&&(
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <span style={{fontSize:13,fontWeight:700,
                        color:visitados===cli.length?T.green:T.amber}}>
                        {visitados}/{cli.length}
                      </span>
                    </div>
                  )}
                  <span style={{color:T.muted,fontSize:20}}>›</span>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* PASO 2 — Recuperación de clientes */}
      {step===2&&(
        <RecuperacionStep
          estrategias={misEstrategias}
          onBack={()=>setStep(1)}
          onNext={()=>setStep(3)}
          color={usuario.color}
          uid={usuario.id}
          todosClientes={clientes}
        />
      )}

      {/* PASO 3 — Muestras con buscador */}
      {step===3&&(
        <MuestrasStep
          muestras={muestras}
          onAdd={m=>setMuestras(mm=>[...mm,m])}
          onDel={id=>setMuestras(mm=>mm.filter(m=>m.id!==id))}
          onEdit={m=>setMuestras(mm=>mm.map(x=>x.id===m.id?m:x))}
          clientes={clientes}
          onBack={()=>setStep(2)}
          onNext={()=>setStep(4)}
          color={usuario.color}
        />
      )}

      {/* PASO 4 — Resumen */}
      {step===4&&(
        <div>
          <p style={{margin:"0 0 20px",fontSize:17,fontWeight:800,color:T.text}}>📤 Resumen semanal</p>
          {[
            {icon:"💰",label:"Ventas",       v:`${fmt(parseInt(ventas.venta)||0)}€`,        ok:!!ventas.venta},
            {icon:"📊",label:"Margen",       v:`${ventas.mb||0}%`,                          ok:!!ventas.mb},
            {icon:"👥",label:"Visitas",      v:`${visitasDone}/${clientes.length}`,          ok:visitasDone===clientes.length},
            {icon:"🎯",label:"Recuperación", v:`${Object.keys(avances).length}/${misEstrategias.length} registradas`, ok:Object.keys(avances).length===misEstrategias.length||misEstrategias.length===0},
            {icon:"📦",label:"Muestras",     v:`${muestras.length} productos`,              ok:true},
          ].map(r=>(
            <div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"14px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:14,color:T.muted}}>{r.icon} {r.label}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:14,fontWeight:700,color:T.text}}>{r.v}</span>
                <span style={{fontSize:16}}>{r.ok?"✅":"⚠️"}</span>
              </div>
            </div>
          ))}
          <div style={{height:20}}/>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setStep(3)} outline color={T.muted}>← Atrás</Btn>
            <Btn full onClick={()=>setEnviado(true)} color={T.green}>🚀 Enviar informe</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MIS MUESTRAS ─────────────────────────────────────────────────
function MisMuestras({usuario}){
  const [muestras,setMuestras]=useState(MUESTRAS_SEED);
  const [sel,setSel]=useState(null);
  const [fb,setFb]=useState("positivo");
  const [nota,setNota]=useState("");
  const [filtro,setFiltro]=useState("pendiente");

  const FEEDBACK=[
    {k:"positivo",icon:"✅",label:"Le gusta",color:T.green},
    {k:"pedido",  icon:"🛒",label:"Ha pedido",color:T.blue},
    {k:"ko",      icon:"❌",label:"No le gusta",color:T.red},
  ];

  const guardar=()=>{
    setMuestras(mm=>mm.map(m=>m.id===sel.id?{...m,estado:fb,nota}:m));
    setSel(null); setNota("");
  };

  const visibles=filtro==="todas"?muestras:muestras.filter(m=>m.estado===filtro);
  const pend=muestras.filter(m=>m.estado==="pendiente").length;
  const pos=muestras.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const ko=muestras.filter(m=>m.estado==="ko").length;

  if(sel){
    const fbObj=FEEDBACK.find(f=>f.k===fb);
    return(
      <div style={{padding:"20px 16px 100px"}}>
        <BackBar label="Volver" onBack={()=>setSel(null)}/>
        <Card style={{marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
          <span style={{fontSize:32}}>📦</span>
          <div>
            <p style={{margin:0,fontSize:15,fontWeight:800,color:T.text}}>{sel.prod}</p>
            <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>{sel.cliente} · {sel.tipo} · S{sel.semana}</p>
          </div>
        </Card>
        <p style={{margin:"0 0 12px",fontSize:15,fontWeight:800,color:T.text}}>¿Qué dice el cliente?</p>
        {FEEDBACK.map(f=>(
          <button key={f.k} onClick={()=>setFb(f.k)}
            style={{width:"100%",padding:"16px",borderRadius:13,border:`2px solid ${fb===f.k?f.color:T.border}`,
              background:fb===f.k?f.color+"12":"#fff",display:"flex",gap:14,alignItems:"center",
              cursor:"pointer",marginBottom:10}}>
            <span style={{fontSize:28}}>{f.icon}</span>
            <p style={{margin:0,fontSize:16,fontWeight:fb===f.k?800:500,color:fb===f.k?f.color:T.text}}>{f.label}</p>
            {fb===f.k&&<span style={{marginLeft:"auto",color:f.color,fontSize:20}}>✓</span>}
          </button>
        ))}
        <div style={{marginTop:16,marginBottom:20}}>
          <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:T.text}}>Nota <span style={{color:T.muted,fontWeight:400}}>(opcional)</span></p>
          <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={3}
            placeholder="¿Qué dijo el cliente exactamente?"
            style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"12px",fontSize:14,resize:"none",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <Btn full color={fbObj.color} onClick={guardar}>Guardar feedback</Btn>
      </div>
    );
  }

  return(
    <div style={{padding:"20px 16px 100px"}}>
      <p style={{margin:"0 0 20px",fontSize:20,fontWeight:900,color:T.text}}>📦 Mis muestras</p>

      {/* KPIs */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {[{l:"⏳ Pendiente",v:pend,c:T.amber,f:"pendiente"},{l:"✅ Positivo",v:pos,c:T.green,f:"positivo"},{l:"❌ KO",v:ko,c:T.red,f:"ko"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(x=>x===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":T.white,border:`2px solid ${filtro===k.f?k.c:T.border}`,
              borderRadius:13,padding:"12px 10px",cursor:"pointer",textAlign:"center"}}>
            <p style={{margin:0,fontSize:24,fontWeight:900,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:T.muted}}>{k.l}</p>
          </div>
        ))}
      </div>

      {visibles.length===0?(
        <div style={{textAlign:"center",padding:32,color:T.muted}}>
          <span style={{fontSize:40,display:"block",marginBottom:8}}>📭</span>
          <p style={{margin:0,fontSize:14}}>Sin muestras en este estado</p>
        </div>
      ):(
        visibles.map(m=>{
          const estado={
            pendiente:{icon:"⏳",color:T.amber,label:"Pendiente",bg:T.amberL},
            positivo: {icon:"✅",color:T.green, label:"Positivo", bg:T.greenL},
            pedido:   {icon:"🛒",color:T.blue,  label:"Ha pedido",bg:T.blueL},
            ko:       {icon:"❌",color:T.red,   label:"KO",       bg:T.redL},
          }[m.estado]||{icon:"⏳",color:T.muted,label:"",bg:T.bg};
          return(
            <Card key={m.id} onClick={()=>m.estado==="pendiente"&&setSel(m)}
              style={{marginBottom:10,border:`2px solid ${estado.color}33`,background:estado.bg,
                cursor:m.estado==="pendiente"?"pointer":"default"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:28}}>{estado.icon}</span>
                <div style={{flex:1}}>

                  <p style={{margin:"2px 0 0",fontSize:11,color:T.muted}}>{m.cliente} · S{m.semana}</p>
                  {m.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:estado.color,fontStyle:"italic"}}>"{m.nota}"</p>}
                </div>
                {m.estado==="pendiente"&&<span style={{fontSize:13,color:T.amber,fontWeight:700}}>Registrar →</span>}
                {m.estado!=="pendiente"&&<Badge label={estado.label} color={estado.color}/>}
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ─── TARJETA DE APROBACIÓN POR PRODUCTO ──────────────────────────
// ═══════════════════════════════════════════════════════════════════
// APROBACIÓN DE ESTRATEGIA — por producto, siempre visible
// ═══════════════════════════════════════════════════════════════════
function EstrategiaAprobacionCard({e,usuario,onConfirmar,onRechazar,onEscalar}){
  const ag=USUARIOS.find(u=>u.id===e.agente);
  const director=USUARIOS.find(u=>u.rol==="director");
  const ceo=USUARIOS.find(u=>u.rol==="ceo");
  const ofertas=e.ofertas||[];

  const [dec,setDec]=useState({});       // {oid: "si"|"no"|"subir"}
  const [precios,setPrecios]=useState({}); // {oid: precio}
  const [destinos,setDestinos]=useState({});
  const [notaFinal,setNotaFinal]=useState("");
  const [hecho,setHecho]=useState(false);

  const DEST=usuario.rol==="jefe"&&director?[{id:director.id,nombre:director.nombre,icon:director.icon}]
    :usuario.rol==="director"&&ceo?[{id:ceo.id,nombre:ceo.nombre,icon:ceo.icon}]:[];

  const n=ofertas.length;
  const n_ok=Object.values(dec).filter(Boolean).length;
  const listas=n===0||n_ok===n;

  const confirmar=()=>{
    const ofAct=ofertas.map(o=>{
      const oid=o.id||o.nombre;
      const d=dec[oid];
      if(d==="si")    return {...o,aprobada:true,aprobadaPor:usuario.nombre};
      if(d==="precio") return {...o,aprobada:true,precioFinal:precios[oid]||o.precioFinal,
        precioOriginal:o.precioFinal,modificada:true,aprobadaPor:usuario.nombre};
      if(d==="no")    return {...o,aprobada:false,rechazadaPor:usuario.nombre};
      if(d==="subir") return {...o,aprobada:null,elevadaA:destinos[oid],elevadaPor:usuario.nombre};
      return o;
    });
    setHecho(true);
    onConfirmar(e,ofAct,notaFinal);
  };

  if(hecho) return(
    <div style={{background:T.greenL,borderRadius:14,padding:"14px 16px",marginBottom:10,
      border:`1.5px solid ${T.green}`,display:"flex",gap:12,alignItems:"center"}}>
      <span style={{fontSize:28}}>✅</span>
      <div>
        <p style={{margin:0,fontSize:14,fontWeight:800,color:T.green}}>Aprobación enviada</p>
        <p style={{margin:"2px 0 0",fontSize:12,color:T.green}}>{e.cliente||e.clienteNombre}</p>
      </div>
    </div>
  );

  return(
    <div style={{background:"#fff",borderRadius:16,marginBottom:14,overflow:"hidden",
      border:`2px solid ${T.amber}`}}>

      {/* Cabecera */}
      <div style={{background:"#FFFBEB",padding:"12px 16px",borderBottom:`1px solid ${T.amber}33`}}>
        <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          {ag&&<Badge label={`👤 ${ag.nombre}`} color={ag.color}/>}
          {e.escaladoA&&<Badge label="↑ Escalada" color={T.purple}/>}
        </div>
        <p style={{margin:"0 0 2px",fontSize:15,fontWeight:800,color:T.text}}>{e.cliente||e.clienteNombre}</p>
        <p style={{margin:0,fontSize:12,color:T.muted}}>{e.texto||e.estrategia}</p>
        {e.objetivo&&<p style={{margin:"4px 0 0",fontSize:11,color:T.amber,fontWeight:600}}>🎯 {e.objetivo}</p>}
      </div>

      <div style={{padding:"14px 16px"}}>
        {/* Sin artículos: aprobar/rechazar directamente */}
        {n===0&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>onRechazar(e,"No procede")}
              style={{flex:1,padding:"12px",borderRadius:10,border:`1.5px solid ${T.red}`,
                background:"#fff",color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ❌ Rechazar
            </button>
            <button onClick={()=>onConfirmar(e,[],notaFinal)}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",
                background:T.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ✅ Aprobar
            </button>
          </div>
        )}

        {/* Artículos — decisión por producto */}
        {n>0&&(
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <p style={{margin:0,fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>
                Artículos con precio oferta
              </p>
              <span style={{fontSize:11,color:n_ok===n?T.green:T.amber,fontWeight:700}}>
                {n_ok}/{n} decididos
              </span>
            </div>

            {ofertas.map((o,i)=>{
              const oid=o.id||o.nombre;
              const d=dec[oid];
              return(
                <div key={oid} style={{marginBottom:10,borderRadius:12,overflow:"hidden",
                  border:`1.5px solid ${d==="si"||d==="precio"?T.green:d==="no"?T.red:d==="subir"?T.purple:T.border}`}}>

                  {/* Producto info */}
                  <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",
                    background:d==="si"||d==="precio"?T.greenL:d==="no"?"#FEF2F2":d==="subir"?T.purpleL:"#FAFAFA"}}>
                    <div style={{flex:1,minWidth:0}}>
                      {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:T.blue,fontWeight:700}}>{o.codigo}</p>}
                      <p style={{margin:0,fontSize:13,fontWeight:600}}>{o.nombre}</p>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                      {o.precioBase&&<p style={{margin:0,fontSize:11,color:T.muted,textDecoration:"line-through"}}>{o.precioBase}€</p>}
                      <p style={{margin:0,fontSize:14,fontWeight:900,color:
                        d==="precio"&&precios[oid]?T.amber:T.green}}>
                        {d==="precio"&&precios[oid]?precios[oid]:o.precioFinal||o.precioBase}€
                        <span style={{fontSize:10,fontWeight:400,color:T.muted}}>/kg</span>
                      </p>
                      {o.dto&&<p style={{margin:0,fontSize:10,color:T.red,fontWeight:700}}>-{o.dto}%</p>}
                    </div>
                  </div>

                  {/* Badge decisión */}
                  {d&&(
                    <div style={{padding:"5px 14px",background:d==="si"||d==="precio"?T.greenL:d==="no"?"#FEF2F2":T.purpleL,
                      display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11,fontWeight:700,
                        color:d==="si"||d==="precio"?T.green:d==="no"?T.red:T.purple}}>
                        {d==="si"?"✅ Aprobado al precio solicitado":
                         d==="precio"?"✏️ Aprobado con precio modificado":
                         d==="no"?"❌ Rechazado":
                         `↑ Elevado a ${USUARIOS.find(u=>u.id===destinos[oid])?.nombre||"Superior"}`}
                      </span>
                      <button onClick={()=>setDec(p=>{const n={...p};delete n[oid];return n;})}
                        style={{background:"none",border:"none",fontSize:11,color:T.muted,
                          cursor:"pointer",textDecoration:"underline",padding:0}}>deshacer</button>
                    </div>
                  )}

                  {/* Campo precio personalizado */}
                  {d==="precio"&&(
                    <div style={{padding:"8px 14px",display:"flex",gap:8,alignItems:"center",
                      background:"#FFFBEB",borderTop:`1px solid ${T.amber}44`}}>
                      <p style={{margin:0,fontSize:12,color:T.amber,fontWeight:700,flexShrink:0}}>Precio aprobado:</p>
                      <input type="number" defaultValue={o.precioFinal||o.precioBase}
                        onChange={ev=>setPrecios(p=>({...p,[oid]:ev.target.value}))}
                        style={{flex:1,border:`2px solid ${T.amber}`,borderRadius:8,
                          padding:"7px 10px",fontSize:14,fontWeight:800,outline:"none"}}/>
                      <span style={{fontSize:12,color:T.muted,flexShrink:0}}>€/kg</span>
                    </div>
                  )}

                  {/* Panel subir */}
                  {d==="subir"&&DEST.length>0&&!destinos[oid]&&(
                    <div style={{padding:"10px 14px",background:T.purpleL,borderTop:`1px solid ${T.purple}33`}}>
                      <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:T.purple}}>¿A quién elevas?</p>
                      {DEST.map(dest=>(
                        <button key={dest.id}
                          onClick={()=>setDestinos(p=>({...p,[oid]:dest.id}))}
                          style={{display:"flex",gap:10,alignItems:"center",width:"100%",
                            padding:"10px 12px",borderRadius:9,border:`1.5px solid ${T.purple}`,
                            background:"#fff",cursor:"pointer",marginBottom:4}}>
                          <span style={{fontSize:18}}>{dest.icon}</span>
                          <span style={{fontSize:13,fontWeight:700}}>{dest.nombre}</span>
                          <span style={{marginLeft:"auto",color:T.purple}}>→</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {/* Botones de decisión — solo si sin decidir */}
                  {!d&&(
                    <div style={{display:"grid",gridTemplateColumns:`1fr 1fr 1fr${DEST.length>0?" 1fr":""}`,
                      borderTop:`1px solid ${T.border}`}}>
                      {[
                        {k:"si",    label:"✅ Sí",      bg:"#F0FDF4",color:T.green},
                        {k:"precio",label:"✏️ Precio",  bg:"#FFFBEB",color:T.amber},
                        ...(DEST.length>0?[{k:"subir",label:"↑ Subir",bg:T.purpleL,color:T.purple}]:[]),
                        {k:"no",    label:"❌ No",      bg:"#FEF2F2",color:T.red},
                      ].map((btn,bi,arr)=>(
                        <button key={btn.k} onClick={()=>setDec(p=>({...p,[oid]:btn.k}))}
                          style={{padding:"11px 4px",border:"none",
                            borderLeft:bi>0?`1px solid ${T.border}`:"none",
                            background:btn.bg,color:btn.color,
                            fontWeight:700,fontSize:12,cursor:"pointer"}}>
                          {btn.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Nota + confirmar */}
        <input value={notaFinal} onChange={e=>setNotaFinal(e.target.value)}
          placeholder="Nota para el agente (opcional)…"
          style={{width:"100%",border:`1.5px solid ${T.border}`,borderRadius:9,
            padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10}}/>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onRechazar(e,"No procede")}
            style={{flex:1,padding:"13px",borderRadius:10,border:`1.5px solid ${T.red}`,
              background:"#fff",color:T.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
            ❌ Rechazar todo
          </button>
          <button onClick={confirmar} disabled={n>0&&!listas}
            style={{flex:2,padding:"13px",borderRadius:10,border:"none",
              background:n===0||listas?T.navy:"#CBD5E1",
              color:"#fff",fontWeight:700,fontSize:14,
              cursor:n===0||listas?"pointer":"default"}}>
            {n===0||listas?"✅ Confirmar":"Decide todos los artículos"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ESTRATEGIAS — vista clara por rol
// ═══════════════════════════════════════════════════════════════════
function MisEstrategias({usuario}){
  const esJefe  = usuario?.rol==="jefe"||usuario?.rol==="director"||usuario?.rol==="ceo";
  const esRolJefe = usuario?.rol==="jefe";
  const esRolDir  = usuario?.rol==="director";
  const esRolCeo  = usuario?.rol==="ceo";
  const esAgente  = usuario?.rol==="agente";
  const miEquipo  = usuario?.equipo;

  const [estrategias,setEstrategiasLocal]=useState(()=>GlobalStore.getEstrategias());
  const [cargando,setCargando]=useState(false);
  const [sel,setSel]=useState(null);
  const [filtroSec,setFiltroSec]=useState("todas");

  useEffect(()=>{
    const unsub=GlobalStore.subscribe(data=>setEstrategiasLocal([...data]));
    return unsub;
  },[]);

  const setEstrategias=(updater)=>{
    const next=typeof updater==="function"?updater(GlobalStore.getEstrategias()):updater;
    GlobalStore.setEstrategias(next);
    setEstrategiasLocal([...next]);
  };

  const recargar=()=>{
    setCargando(true);
    fbLeer("estrategias").then(data=>{
      if(data.length>0){
        const fbIds=new Set(data.map(d=>d.id));
        const merged=[...data.filter(d=>!d.eliminada),...ESTRATEGIAS_SEED.filter(s=>!fbIds.has(s.id))];
        GlobalStore.setEstrategias(merged);
        setEstrategiasLocal([...merged]);
      }
    }).finally(()=>setCargando(false));
  };

  const confirmarEstrategia=(e,ofertasAct,nota)=>{
    const elevadas=ofertasAct.filter(o=>o.elevadaA);
    const hayElevadas=elevadas.length>0;
    const destElevacion=elevadas.find(o=>o.elevadaA==="ceo")?.elevadaA||elevadas[0]?.elevadaA||null;
    const aprobadas=ofertasAct.filter(o=>o.aprobada===true);
    const rechazadas=ofertasAct.filter(o=>o.aprobada===false);
    const tipoRes=rechazadas.length===ofertasAct.length&&ofertasAct.length>0?"rechazada":
      aprobadas.length===ofertasAct.length&&ofertasAct.length>0?"aprobada":"aprobada_parcial";
    const entrada={
      accion:hayElevadas?`⚡ Parcial — ${elevadas.length} elevado${elevadas.length>1?"s":""}`:`✅ Resuelto por ${usuario.nombre}`,
      por:usuario.nombre,fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,
      estado:hayElevadas?"pendiente_aprobacion":"en_curso",
      escaladoA:hayElevadas?destElevacion:null,
      resolucion:hayElevadas?null:{tipo:tipoRes,por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota},
      aprobadoPor:usuario.nombre,ofertas:ofertasAct,
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:hayElevadas?"elevada":tipoRes,nota}],
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  const escalarEstrategia=(e,destId,nota)=>{
    const dest=USUARIOS.find(u=>u.id===destId);
    const entrada={accion:`↑ Elevada a ${dest?.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota};
    const updated=estrategias.map(x=>x.id===e.id?{
      ...x,estado:"pendiente_aprobacion",escaladoA:destId,
      historialEscalado:[...(x.historialEscalado||[]),entrada],
    }:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  const rechazar=(e,motivo)=>{
    const entrada={accion:`❌ Rechazada por ${usuario.nombre}`,por:usuario.nombre,
      fecha:new Date().toLocaleDateString("es-ES"),nota:motivo};
    const updated=estrategias.map(x=>x.id===e.id?{...x,estado:"sin_exito",
      resolucion:{tipo:"rechazada",por:usuario.nombre,rol:usuario.rol,
        fecha:new Date().toLocaleDateString("es-ES"),nota:motivo},
      seguimientos:[...(x.seguimientos||[]),{semana:14,resultado:"rechazada",nota:motivo}],
      historialEscalado:[...(x.historialEscalado||[]),entrada]}:x);
    setEstrategias(updated);
    fbEscribir("estrategias",e.id,updated.find(x=>x.id===e.id));
  };

  // Clasificación
  const deEquipo=(e)=>{
    if(esRolJefe){const ag=USUARIOS.find(u=>u.id===e.agente);return ag?.equipo===miEquipo||e.equipo===miEquipo;}
    return true;
  };

  const pendAprobMia=esRolJefe
    ? estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&!e.escaladoA&&deEquipo(e))
    : estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&e.escaladoA===usuario.id);

  const elevadasPorMi=esJefe&&!esRolCeo
    ? estrategias.filter(e=>e.estado==="pendiente_aprobacion"&&e.escaladoA&&e.escaladoA!==usuario.id&&deEquipo(e))
    : [];

  // Para agente: separadas por resolución
  const aprobadas=esAgente
    ? estrategias.filter(e=>e.agente===usuario.id&&e.resolucion&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion&&e.resolucion.por!==usuario.nombre&&
        (e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial"))
    : estrategias.filter(e=>e.resolucion&&(e.resolucion.tipo==="aprobada"||e.resolucion.tipo==="aprobada_parcial")&&
        ((e.historialEscalado||[]).some(h=>h.por===usuario.nombre)||e.agente===usuario.id));

  const rechazadas=esAgente
    ? estrategias.filter(e=>e.agente===usuario.id&&e.resolucion?.tipo==="rechazada")
    : esRolJefe
    ? estrategias.filter(e=>deEquipo(e)&&e.resolucion?.tipo==="rechazada"&&e.resolucion.por!==usuario.nombre)
    : [];

  const enRevisionAgente=esAgente?estrategias.filter(e=>e.agente===usuario.id&&e.estado==="pendiente_aprobacion"):[];
  const activasAgente=esAgente?estrategias.filter(e=>e.agente===usuario.id&&e.estado==="en_curso"&&!e.resolucion):[];
  const misMostrar=esJefe?estrategias.filter(e=>deEquipo(e)&&e.estado==="en_curso"&&!e.resolucion):[];

  // ── DETALLE ─────────────────────────────────────────────────────
  if(sel){
    const esSuya=sel.agente===usuario.id;
    const res=sel.resolucion;
    const escaladoAMi=sel.escaladoA===usuario.id;
    return(
      <div style={{paddingBottom:100}}>
        <BackBar label="Estrategias" onBack={()=>setSel(null)}/>
        <div style={{padding:"16px"}}>
          {/* Estado visual grande */}
          {res&&(
            <div style={{borderRadius:16,padding:"16px",marginBottom:16,
              background:res.tipo==="aprobada"?T.greenL:res.tipo==="rechazada"?"#FEF2F2":T.amberL,
              border:`2px solid ${res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}`}}>
              <p style={{margin:"0 0 4px",fontSize:20,fontWeight:900,
                color:res.tipo==="aprobada"?T.green:res.tipo==="rechazada"?T.red:T.amber}}>
                {res.tipo==="aprobada"?"✅ Aprobada":res.tipo==="rechazada"?"❌ Rechazada":"⚡ Aprobada parcialmente"}
              </p>
              <p style={{margin:"0 0 8px",fontSize:13,color:T.text}}>
                Por <strong>{res.por}</strong> · {res.fecha}
                {res.nota&&<span> — "{res.nota}"</span>}
              </p>
              {/* Resolución por producto */}
              {(sel.ofertas||[]).length>0&&(
                <div style={{borderTop:`1px solid ${res.tipo==="aprobada"?T.green+"44":T.amber+"44"}`,paddingTop:10,marginTop:8}}>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"center",
                      padding:"8px 0",borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:18,flexShrink:0}}>
                        {o.aprobada===true?"✅":o.aprobada===false?"❌":o.elevadaA?"⏳":"—"}
                      </span>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:13,fontWeight:600,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.nombre}</p>
                        {o.aprobada===true&&(
                          <p style={{margin:0,fontSize:12,color:T.green,fontWeight:700}}>
                            {o.modificada?"Precio modificado: ":"Precio aprobado: "}
                            <strong>{o.precioFinal}€/kg</strong>
                            {o.modificada&&o.precioOriginal&&
                              <span style={{color:T.muted,textDecoration:"line-through",marginLeft:6}}>{o.precioOriginal}€</span>}
                          </p>
                        )}
                        {o.aprobada===false&&<p style={{margin:0,fontSize:12,color:T.red}}>No autorizado</p>}
                        {o.elevadaA&&<p style={{margin:0,fontSize:12,color:T.purple}}>Pendiente decisión superior</p>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Tarjeta de aprobación si me toca decidir */}
          {esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion"&&(
            <EstrategiaAprobacionCard e={sel} usuario={usuario}
              onConfirmar={(e,of,n)=>{confirmarEstrategia(e,of,n);setSel(null);}}
              onRechazar={(e,m)=>{rechazar(e,m);setSel(null);}}
              onEscalar={(e,d,n)=>{escalarEstrategia(e,d,n);setSel(null);}}/>
          )}

          {/* Info básica */}
          {!res&&!(esJefe&&escaladoAMi&&sel.estado==="pendiente_aprobacion")&&(
            <Card style={{marginBottom:12}}>
              <p style={{margin:"0 0 6px",fontSize:17,fontWeight:800}}>{sel.cliente||sel.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:13,color:T.muted}}>{sel.texto||sel.estrategia}</p>
              {sel.objetivo&&<p style={{margin:0,fontSize:12,color:T.text}}>🎯 {sel.objetivo}</p>}
              {(sel.ofertas||[]).length>0&&(
                <div style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
                  <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>Artículos solicitados</p>
                  {sel.ofertas.map((o,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",
                      borderBottom:i<sel.ofertas.length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:12}}>{o.nombre}</span>
                      <span style={{fontSize:12,fontWeight:700,color:T.green}}>
                        {o.precioFinal}€/kg <span style={{color:T.red,fontWeight:600}}>-{o.dto}%</span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          )}

          {/* Historial de escalado */}
          {(sel.historialEscalado||[]).length>0&&(
            <Card>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>🕐 Historial</p>
              {[...(sel.historialEscalado||[])].reverse().map((h,i)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:8,marginBottom:8,
                  borderBottom:i<sel.historialEscalado.length-1?`1px solid ${T.border}`:"none"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:T.navy,flexShrink:0,marginTop:4}}/>
                  <div>
                    <p style={{margin:"0 0 1px",fontSize:12,fontWeight:700}}>{h.accion}</p>
                    {h.nota&&<p style={{margin:"0 0 2px",fontSize:11,color:T.text}}>{h.nota}</p>}
                    <p style={{margin:0,fontSize:10,color:T.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      </div>
    );
  }

  // ── LISTA PRINCIPAL ───────────────────────────────────────────────
  const Bloque=({titulo,items,colorTitulo=T.muted,renderItem})=>(
    items.length===0?null:(
      <div style={{marginBottom:24}}>
        <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:colorTitulo,textTransform:"uppercase",letterSpacing:".06em"}}>
          {titulo} ({items.length})
        </p>
        {items.map(renderItem)}
      </div>
    )
  );

  const CardEst=({e,onClick,children})=>{
    const ag=USUARIOS.find(u=>u.id===e.agente);
    return(
      <div onClick={onClick} style={{background:"#fff",borderRadius:14,padding:"14px 16px",
        marginBottom:8,cursor:"pointer",border:`1px solid ${T.border}`,
        boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
          {esJefe&&ag&&<Badge label={ag.nombre} color={ag.color}/>}
          {children}
        </div>
        <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
        <p style={{margin:0,fontSize:12,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {e.texto||e.estrategia}
        </p>
      </div>
    );
  };

  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <p style={{margin:0,fontSize:22,fontWeight:900,color:T.text}}>🎯 Estrategias</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.muted}}>
            {esAgente?"Mis recuperaciones":esRolJefe?`Equipo ${miEquipo}`:esRolDir?"Dirección":"CEO"}
          </p>
        </div>
        <button onClick={recargar} disabled={cargando}
          style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:9,
            padding:"9px 14px",cursor:cargando?"default":"pointer",color:T.muted,fontSize:13}}>
          {cargando?"⏳":"🔄"} Actualizar
        </button>
      </div>

      {/* Filtros rápidos */}
      {(()=>{
        const tabs=[
          ...(esJefe&&pendAprobMia.length>0?[{k:"aprobar",l:`🔔 Aprobar`,n:pendAprobMia.length,c:T.amber}]:[]),
          ...(enRevisionAgente.length>0?[{k:"revision",l:"⏳ En revisión",n:enRevisionAgente.length,c:T.amber}]:[]),
          ...(elevadasPorMi.length>0?[{k:"elevadas",l:"📤 Elevadas",n:elevadasPorMi.length,c:T.purple}]:[]),
          ...(aprobadas.length>0?[{k:"aprobadas",l:"✅ Aprobadas",n:aprobadas.length,c:T.green}]:[]),
          ...(rechazadas.length>0?[{k:"rechazadas",l:"❌ Rechazadas",n:rechazadas.length,c:T.red}]:[]),
          ...([...activasAgente,...misMostrar].length>0?[{k:"curso",l:"🔵 En curso",n:[...activasAgente,...misMostrar].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i).length,c:T.blue}]:[]),
          {k:"todas",l:"Todas",n:null,c:T.navy},
        ];
        if(tabs.length<=2) return null;
        return(
          <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
            {tabs.map(t=>(
              <button key={t.k} onClick={()=>setFiltroSec(f=>f===t.k?"todas":t.k)}
                style={{display:"flex",gap:5,alignItems:"center",padding:"8px 13px",
                  borderRadius:99,flexShrink:0,cursor:"pointer",
                  border:`1.5px solid ${filtroSec===t.k?t.c:T.border}`,
                  background:filtroSec===t.k?t.c+"18":"#fff",
                  color:filtroSec===t.k?t.c:T.muted,
                  fontWeight:filtroSec===t.k?700:400,fontSize:12}}>
                {t.l}
                {t.n!==null&&<span style={{background:filtroSec===t.k?t.c:"#E2E8F0",color:filtroSec===t.k?"#fff":T.muted,
                  borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 7px"}}>{t.n}</span>}
              </button>
            ))}
          </div>
        );
      })()}

      {/* 1. PARA APROBAR — lo más urgente */}
      {(filtroSec==="todas"||filtroSec==="aprobar")&&esJefe&&pendAprobMia.length>0&&(
        <div style={{marginBottom:24}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:800,color:T.amber}}>
            🔔 Para aprobar ({pendAprobMia.length})
          </p>
          {pendAprobMia.map(e=>(
            <EstrategiaAprobacionCard key={e.id} e={e} usuario={usuario}
              onConfirmar={confirmarEstrategia}
              onRechazar={rechazar}
              onEscalar={escalarEstrategia}/>
          ))}
        </div>
      )}

      {/* 2. AGENTE: en revisión */}
      {(filtroSec==="todas"||filtroSec==="revision")&&Bloque({
        titulo:"⏳ En revisión",colorTitulo:T.amber,
        items:enRevisionAgente,
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`📬 En manos de ${USUARIOS.find(u=>u.id===e.escaladoA)?.nombre||"Responsable"}`} color={T.amber}/>
            <span style={{fontSize:10,color:T.muted,marginLeft:"auto"}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* 3. APROBADAS — con precios definitivos */}
      {(filtroSec==="todas"||filtroSec==="aprobadas")&&Bloque({
        titulo:"✅ Aprobadas",colorTitulo:T.green,
        items:aprobadas,
        renderItem:e=>{
          const res=e.resolucion;
          const aP=(e.ofertas||[]).filter(o=>o.aprobada===true).length;
          const rP=(e.ofertas||[]).filter(o=>o.aprobada===false).length;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`2px solid ${T.green}44`,borderLeft:`4px solid ${T.green}`}}>
              <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap",alignItems:"center"}}>
                <Badge label={res?.tipo==="aprobada_parcial"?"⚡ Aprobada parcialmente":"✅ Aprobada"} color={T.green}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              <p style={{margin:"0 0 6px",fontSize:12,color:T.muted}}>{e.texto||e.estrategia}</p>
              {(e.ofertas||[]).length>0&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {aP>0&&<span style={{fontSize:10,color:T.green,fontWeight:700,background:T.greenL,borderRadius:99,padding:"2px 8px"}}>✅ {aP} producto{aP>1?"s":""} aprobado{aP>1?"s":""}</span>}
                  {rP>0&&<span style={{fontSize:10,color:T.red,fontWeight:700,background:T.redL,borderRadius:99,padding:"2px 8px"}}>❌ {rP} rechazado{rP>1?"s":""}</span>}
                </div>
              )}
              <p style={{margin:"6px 0 0",fontSize:11,color:T.green,fontWeight:600}}>Ver precios aprobados →</p>
            </div>
          );
        }
      })}

      {/* 4. RECHAZADAS */}
      {(filtroSec==="todas"||filtroSec==="rechazadas")&&Bloque({
        titulo:"❌ Rechazadas",colorTitulo:T.red,
        items:rechazadas,
        renderItem:e=>{
          const res=e.resolucion;
          return(
            <div key={e.id} onClick={()=>setSel(e)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,
                cursor:"pointer",border:`1px solid ${T.border}`,borderLeft:`4px solid ${T.red}`,opacity:.8}}>
              <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                <Badge label="❌ Rechazada" color={T.red}/>
                <span style={{fontSize:11,color:T.muted}}>por {res?.por} · {res?.fecha}</span>
              </div>
              <p style={{margin:"0 0 2px",fontSize:14,fontWeight:800}}>{e.cliente||e.clienteNombre}</p>
              {res?.nota&&<p style={{margin:0,fontSize:12,color:T.muted}}>Motivo: {res.nota}</p>}
            </div>
          );
        }
      })}

      {/* 4. ELEVADAS — esperando respuesta del superior */}
      {(filtroSec==="todas"||filtroSec==="elevadas")&&Bloque({
        titulo:"📤 Elevadas — esperando respuesta",colorTitulo:T.purple,
        items:elevadasPorMi,
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label={`↑ En manos de ${USUARIOS.find(u=>u.id===e.escaladoA)?.nombre||"Superior"}`} color={T.purple}/>
          </CardEst>
        )
      })}

      {/* 5. EN CURSO — activas sin resolución */}
      {(filtroSec==="todas"||filtroSec==="curso")&&Bloque({
        titulo:"🔵 En curso",colorTitulo:T.blue,
        items:[...activasAgente,...misMostrar].filter((e,i,a)=>a.findIndex(x=>x.id===e.id)===i),
        renderItem:e=>(
          <CardEst key={e.id} e={e} onClick={()=>setSel(e)}>
            <Badge label="🔵 En curso" color={T.blue}/>
            <span style={{fontSize:10,color:T.muted}}>S{e.semana}</span>
          </CardEst>
        )
      })}

      {/* Estado vacío */}
      {pendAprobMia.length===0&&enRevisionAgente.length===0&&aprobadas.length===0&&rechazadas.length===0&&elevadasPorMi.length===0&&activasAgente.length===0&&misMostrar.length===0&&(
        <div style={{textAlign:"center",padding:"48px 16px",color:T.muted}}>
          <p style={{fontSize:36,margin:"0 0 8px"}}>🎯</p>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias activas</p>
        </div>
      )}
    </div>
  );
}

  {id:"i5",tipo:"administracion",prioridad:"baja",estado:"cerrada",autor:"ik2",equipo:"INTERKEY",clienteNombre:"Cortes Premium",descripcion:"Albarán con referencia equivocada. Producto correcto pero documentación errónea.",fecha:"10/04",historialEscalado:[
    {accion:"✅ Incidencia cerrada",por:"Resp. INTERKEY",fecha:"11/04",nota:"Albarán rectificativo emitido. Cliente conforme.",fotos:[]},

  {id:"i7",tipo:"id",prioridad:"media",estado:"en_gestion",autor:"ik2",equipo:"INTERKEY",clienteNombre:"Hiperdino Canarias",descripcion:"Cliente solicita producto adaptado a normativa canaria con etiquetado específico. ¿Podemos hacer una referencia especial?",fecha:"12/04",historialEscalado:[
    {accion:"💬 Nota añadida",por:"Resp. INTERKEY",fecha:"13/04",nota:"Trasladado a I+D para valoración. Respuesta en 5 días.",fotos:[]},
